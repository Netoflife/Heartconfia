<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HeartConfia — Anonymous Relationship Confessions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #0a0a0f;
–surface: #12121a;
–surface2: #1a1a26;
–surface3: #22223a;
–border: rgba(255,255,255,0.07);
–text: #f0eef8;
–text2: #9a96b4;
–text3: #5e5a78;
–rose: #ff4d6d;
–rose-dim: rgba(255,77,109,0.15);
–violet: #7c3aed;
–violet-dim: rgba(124,58,237,0.15);
–amber: #f59e0b;
–teal: #14b8a6;
–glow: 0 0 40px rgba(255,77,109,0.12);
–radius: 16px;
–font-display: ‘Playfair Display’, serif;
–font-body: ‘DM Sans’, sans-serif;
}

html { scroll-behavior: smooth; }
body {
background: var(–bg);
color: var(–text);
font-family: var(–font-body);
min-height: 100vh;
overflow-x: hidden;
}

body::before {
content: ‘’;
position: fixed; inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘0.04’/%3E%3C/svg%3E”);
pointer-events: none; z-index: 9999; opacity: 0.35;
}

#root { min-height: 100vh; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(–bg); }
::-webkit-scrollbar-thumb { background: var(–surface3); border-radius: 2px; }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(18px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes shimmer {
0%   { background-position: -200% 0; }
100% { background-position:  200% 0; }
}
@keyframes heartbeat {
0%,100% { transform: scale(1); }
15%     { transform: scale(1.3); }
30%     { transform: scale(1); }
45%     { transform: scale(1.15); }
60%     { transform: scale(1); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slideIn {
from { opacity: 0; transform: translateX(-10px); }
to   { opacity: 1; transform: translateX(0); }
}
@keyframes popIn {
0%   { transform: scale(0.85); opacity: 0; }
70%  { transform: scale(1.04); }
100% { transform: scale(1); opacity: 1; }
}

.fade-up  { animation: fadeUp  0.45s ease forwards; }
.slide-in { animation: slideIn 0.3s  ease forwards; }

/* ── Skeleton ── */
.skeleton {
background: linear-gradient(90deg, var(–surface) 25%, var(–surface2) 50%, var(–surface) 75%);
background-size: 200% 100%;
animation: shimmer 1.5s infinite;
border-radius: 8px;
}

/* ── Buttons ── */
.btn {
display: inline-flex; align-items: center; gap: 8px;
padding: 10px 20px; border-radius: 50px;
font-family: var(–font-body); font-size: 14px; font-weight: 600;
cursor: pointer; border: none; transition: all 0.2s ease;
text-decoration: none; white-space: nowrap;
}
.btn-primary {
background: linear-gradient(135deg, var(–rose), #c9184a);
color: #fff;
box-shadow: 0 4px 20px rgba(255,77,109,0.3);
}
.btn-primary:hover  { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(255,77,109,0.45); }
.btn-secondary {
background: var(–surface2); color: var(–text);
border: 1px solid var(–border);
}
.btn-secondary:hover { background: var(–surface3); border-color: rgba(255,255,255,0.15); }
.btn-ghost {
background: transparent; color: var(–text2); padding: 8px 14px;
}
.btn-ghost:hover { color: var(–text); background: var(–surface2); }
.btn-violet {
background: linear-gradient(135deg, var(–violet), #5b21b6);
color: #fff; box-shadow: 0 4px 20px rgba(124,58,237,0.3);
}
.btn-violet:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(124,58,237,0.45); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }

/* ── Inputs ── */
.input {
width: 100%; padding: 12px 16px;
background: var(–surface2); border: 1px solid var(–border);
border-radius: 12px; color: var(–text);
font-family: var(–font-body); font-size: 15px;
outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.input:focus { border-color: var(–rose); box-shadow: 0 0 0 3px rgba(255,77,109,0.12); }
.input::placeholder { color: var(–text3); }
textarea.input { resize: vertical; min-height: 120px; line-height: 1.65; }

/* ── Cards ── */
.card {
background: var(–surface); border: 1px solid var(–border);
border-radius: var(–radius); padding: 20px;
transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
}
.card:hover { border-color: rgba(255,77,109,0.2); box-shadow: var(–glow); }

/* ── Tags ── */
.tag {
display: inline-flex; align-items: center;
padding: 3px 10px; border-radius: 50px;
font-size: 11px; font-weight: 700;
text-transform: uppercase; letter-spacing: 0.06em;
}
.tag-cheating     { background: rgba(239,68,68,0.12); color: #ef4444; }
.tag-breakup      { background: var(–rose-dim); color: var(–rose); }
.tag-dating       { background: var(–violet-dim); color: #a78bfa; }
.tag-marriage     { background: rgba(20,184,166,0.12); color: var(–teal); }
.tag-situationship{ background: rgba(245,158,11,0.12); color: var(–amber); }

/* ── Nav ── */
.nav {
position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 100;
background: rgba(10,10,15,0.88); backdrop-filter: blur(20px);
border-bottom: 1px solid var(–border);
display: flex; align-items: center; padding: 0 16px; gap: 12px;
}
.nav-logo {
font-family: var(–font-display); font-size: 20px; font-weight: 900;
color: var(–rose); text-shadow: 0 0 28px rgba(255,77,109,0.45);
cursor: pointer; flex-shrink: 0; user-select: none;
display: inline-flex; align-items: center; gap: 6px;
animation: heartbeat 3.5s ease-in-out infinite;
}
.nav-tabs {
display: flex; gap: 2px; flex: 1; overflow-x: auto; scrollbar-width: none;
}
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab {
padding: 6px 14px; border-radius: 50px;
font-size: 13px; font-weight: 500; cursor: pointer;
color: var(–text2); transition: all 0.2s;
border: none; background: transparent; white-space: nowrap;
font-family: var(–font-body);
}
.nav-tab:hover  { color: var(–text); background: var(–surface2); }
.nav-tab.active { color: var(–rose); background: var(–rose-dim); }

/* ── Layout ── */
.layout { display: grid; grid-template-columns: 1fr min(680px, 100%) 1fr; min-height: 100vh; padding-top: 60px; }
.layout-center { grid-column: 2; padding: 24px 16px 80px; }

/* ── Post card ── */
.post-card {
background: var(–surface); border: 1px solid var(–border);
border-radius: var(–radius); padding: 20px; margin-bottom: 12px;
cursor: pointer; transition: all 0.25s ease;
animation: fadeUp 0.4s ease both; position: relative; overflow: hidden;
}
.post-card::before {
content: ‘’; position: absolute; top: 0; left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, var(–rose), var(–violet));
opacity: 0; transition: opacity 0.2s;
}
.post-card:hover { border-color: rgba(255,77,109,0.28); transform: translateY(-2px); box-shadow: var(–glow); }
.post-card:hover::before { opacity: 1; }

.post-type-badge {
display: inline-flex; align-items: center; gap: 5px;
font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
}
.post-type-badge.confession { color: var(–rose); }
.post-type-badge.advice     { color: #a78bfa; }

.post-title {
font-family: var(–font-display); font-size: 18px; font-weight: 700;
line-height: 1.35; color: var(–text); margin-bottom: 10px;
}
.post-preview {
font-size: 14px; line-height: 1.7; color: var(–text2); margin-bottom: 16px;
display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.post-meta {
display: flex; align-items: center; gap: 10px;
font-size: 13px; color: var(–text3); margin-bottom: 14px; flex-wrap: wrap;
}
.post-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(–text3); flex-shrink: 0; }
.anon-name { color: var(–text2); font-weight: 600; }

.post-reactions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.reaction-btn {
display: flex; align-items: center; gap: 5px;
padding: 6px 12px; border-radius: 50px;
background: var(–surface2); border: 1px solid var(–border);
cursor: pointer; font-size: 13px; font-weight: 500; color: var(–text2);
transition: all 0.2s; font-family: var(–font-body);
}
.reaction-btn:hover  { background: var(–surface3); color: var(–text); transform: scale(1.06); }
.reaction-btn.active { background: var(–rose-dim); border-color: rgba(255,77,109,0.35); color: var(–rose); }
.comment-count { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(–text3); margin-left: auto; }

/* ── Blur / paywall ── */
.blur-wrap { position: relative; max-height: 80px; overflow: hidden; }
.blur-wrap::after {
content: ‘’; position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
background: linear-gradient(transparent, var(–surface));
}
.paywall {
margin: 12px -20px -20px; padding: 24px 20px;
background: linear-gradient(to bottom, transparent, var(–surface) 18%);
text-align: center;
border-top: 1px solid var(–border);
border-radius: 0 0 var(–radius) var(–radius);
}
.paywall-icon  { font-size: 30px; margin-bottom: 8px; }
.paywall-title { font-family: var(–font-display); font-size: 17px; font-weight: 700; color: var(–text); margin-bottom: 6px; }
.paywall-sub   { font-size: 13px; color: var(–text2); margin-bottom: 16px; }
.paywall-btns  { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* ── Auth modal ── */
.modal-overlay {
position: fixed; inset: 0; z-index: 1000;
background: rgba(0,0,0,0.82); backdrop-filter: blur(10px);
display: flex; align-items: center; justify-content: center;
padding: 20px; animation: fadeUp 0.2s ease;
}
.modal {
background: var(–surface); border: 1px solid rgba(255,255,255,0.1);
border-radius: 24px; padding: 36px; width: 100%; max-width: 400px;
position: relative; animation: popIn 0.35s ease;
}
.modal-close {
position: absolute; top: 14px; right: 14px;
background: var(–surface2); border: none; border-radius: 50%;
width: 32px; height: 32px; cursor: pointer; color: var(–text2);
font-size: 14px; display: flex; align-items: center; justify-content: center;
transition: all 0.2s;
}
.modal-close:hover { background: var(–surface3); color: var(–text); }
.modal-logo { font-family: var(–font-display); font-size: 26px; font-weight: 900; color: var(–rose); text-align: center; margin-bottom: 6px; }
.modal-sub  { text-align: center; color: var(–text2); font-size: 14px; margin-bottom: 26px; }
.modal-form { display: flex; flex-direction: column; gap: 14px; }
.form-label { font-size: 13px; font-weight: 500; color: var(–text2); margin-bottom: 5px; display: block; }
.modal-switch { text-align: center; font-size: 14px; color: var(–text2); margin-top: 18px; }
.modal-switch button { background: none; border: none; color: var(–rose); cursor: pointer; font-weight: 600; font-size: 14px; font-family: var(–font-body); }

/* ── Post detail ── */
.post-detail-title {
font-family: var(–font-display);
font-size: clamp(22px,5vw,30px); font-weight: 900; line-height: 1.2;
color: var(–text); margin-bottom: 16px;
}
.post-detail-content { font-size: 16px; line-height: 1.9; color: var(–text2); white-space: pre-wrap; }

/* ── Vote ── */
.vote-section {
background: var(–surface2); border: 1px solid var(–border);
border-radius: var(–radius); padding: 20px; margin: 24px 0;
}
.vote-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(–text3); margin-bottom: 16px; }
.vote-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.vote-btn {
padding: 14px 12px; border-radius: 12px; border: 1px solid var(–border);
background: var(–surface); cursor: pointer; text-align: center;
font-family: var(–font-body); font-size: 14px; font-weight: 600;
color: var(–text2); transition: all 0.2s; line-height: 1.4;
}
.vote-btn:hover         { background: var(–surface3); color: var(–text); }
.vote-btn.voted-a       { background: var(–rose-dim); border-color: rgba(255,77,109,0.4); color: var(–rose); }
.vote-btn.voted-b       { background: var(–violet-dim); border-color: rgba(124,58,237,0.4); color: #a78bfa; }
.vote-bar-track { height: 6px; border-radius: 3px; background: var(–surface3); overflow: hidden; margin-top: 14px; }
.vote-bar-fill  { height: 100%; border-radius: 3px; background: linear-gradient(90deg,var(–rose),#c9184a); transition: width 0.6s ease; }
.vote-foot { display: flex; justify-content: space-between; font-size: 12px; color: var(–text3); margin-top: 6px; }

/* ── Comments ── */
.comment-input-row { display: flex; gap: 12px; margin-bottom: 24px; align-items: flex-start; }
.avatar {
width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
background: linear-gradient(135deg, var(–rose), var(–violet));
display: flex; align-items: center; justify-content: center;
font-size: 12px; font-weight: 700; color: #fff;
}
.comment-card {
padding: 14px 16px; background: var(–surface2); border: 1px solid var(–border);
border-radius: 12px; margin-bottom: 10px; animation: slideIn 0.3s ease;
}
.comment-author { font-size: 13px; font-weight: 600; color: var(–text); }
.comment-time   { font-size: 12px; color: var(–text3); }
.comment-body   { font-size: 14px; line-height: 1.65; color: var(–text2); margin-top: 6px; }
.comment-actions { display: flex; gap: 12px; margin-top: 8px; }
.c-action {
display: flex; align-items: center; gap: 4px;
font-size: 12px; color: var(–text3); background: none; border: none;
cursor: pointer; transition: color 0.2s; font-family: var(–font-body);
}
.c-action:hover { color: var(–rose); }

/* ── Section header ── */
.section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.section-title  { font-family: var(–font-display); font-size: 22px; font-weight: 700; color: var(–text); }
.section-badge  { padding: 3px 10px; border-radius: 50px; background: var(–rose-dim); color: var(–rose); font-size: 12px; font-weight: 700; }

/* ── Filter pills ── */
.pills { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; margin-bottom: 20px; }
.pills::-webkit-scrollbar { display: none; }
.pill {
padding: 7px 16px; border-radius: 50px; font-size: 13px; font-weight: 500;
cursor: pointer; border: 1px solid var(–border); background: var(–surface);
color: var(–text2); transition: all 0.2s; white-space: nowrap; font-family: var(–font-body);
}
.pill:hover  { border-color: rgba(255,77,109,0.3); color: var(–rose); }
.pill.active { background: var(–rose-dim); border-color: rgba(255,77,109,0.4); color: var(–rose); }

/* ── Create prompt ── */
.create-prompt-bar {
background: linear-gradient(135deg, rgba(255,77,109,0.07), rgba(124,58,237,0.05));
border: 1px solid rgba(255,77,109,0.14); border-radius: var(–radius);
padding: 16px 20px; margin-bottom: 20px; cursor: pointer; transition: all 0.2s;
display: flex; align-items: center; gap: 12px;
}
.create-prompt-bar:hover { border-color: rgba(255,77,109,0.3); }
.create-prompt-text { font-size: 14px; color: var(–text3); }

/* ── Hero ── */
.hero {
text-align: center; padding: 40px 0 32px; position: relative;
}
.hero::before {
content: ‘’; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
width: 320px; height: 320px; border-radius: 50%;
background: radial-gradient(circle, rgba(255,77,109,0.1), transparent 70%);
pointer-events: none;
}
.hero-eyebrow {
font-size: 11px; font-weight: 700; text-transform: uppercase;
letter-spacing: 0.18em; color: var(–rose); margin-bottom: 12px;
}
.hero-title {
font-family: var(–font-display); font-size: clamp(34px,9vw,58px);
font-weight: 900; line-height: 1.08;
background: linear-gradient(140deg, var(–text) 35%, var(–rose));
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
margin-bottom: 14px;
}
.hero-sub { font-size: 15px; color: var(–text2); max-width: 360px; margin: 0 auto 26px; line-height: 1.65; }

/* ── Trending ── */
.trending-num { font-family: var(–font-display); font-size: 34px; font-weight: 900; color: var(–border); line-height: 1; min-width: 42px; }
.trending-num.top { color: rgba(255,77,109,0.22); }

/* ── Back btn ── */
.back-btn {
display: inline-flex; align-items: center; gap: 7px;
color: var(–text2); font-size: 14px; font-weight: 500;
cursor: pointer; background: none; border: none; padding: 8px 0;
margin-bottom: 20px; transition: color 0.2s; font-family: var(–font-body);
}
.back-btn:hover { color: var(–text); }

/* ── Utils ── */
.divider   { height: 1px; background: var(–border); margin: 24px 0; }
.error-msg { color: var(–rose); font-size: 13px; margin-top: 4px; }
.spinner   { width: 20px; height: 20px; border: 2px solid var(–border); border-top-color: var(–rose); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
.empty-state { text-align: center; padding: 60px 20px; color: var(–text3); }
.empty-icon  { font-size: 46px; margin-bottom: 12px; }
.empty-title { font-family: var(–font-display); font-size: 20px; color: var(–text2); margin-bottom: 8px; }

/* ── Toast ── */
.toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
.toast {
padding: 13px 18px; border-radius: 12px;
background: var(–surface2); border: 1px solid var(–border);
font-size: 14px; color: var(–text);
box-shadow: 0 8px 30px rgba(0,0,0,0.3);
animation: fadeUp 0.3s ease; display: flex; align-items: center; gap: 10px; min-width: 220px;
}
.toast.success { border-color: rgba(20,184,166,0.4); }
.toast.error   { border-color: rgba(255,77,109,0.4); }

/* ── Config notice ── */
.config-notice {
background: rgba(245,158,11,0.09); border: 1px solid rgba(245,158,11,0.3);
border-radius: 12px; padding: 14px 16px; margin-bottom: 20px;
font-size: 13px; color: var(–amber); line-height: 1.6;
}
.config-notice code { background: rgba(245,158,11,0.15); padding: 1px 5px; border-radius: 4px; font-family: monospace; }

/* ── Verified badge (best answer) ── */
.best-answer { border-color: rgba(20,184,166,0.35) !important; }
.best-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: var(–teal); margin-bottom: 8px; }

@media (max-width: 600px) {
.nav { padding: 0 10px; }
.layout-center { padding: 14px 10px 80px; }
.modal { padding: 28px 18px; border-radius: 20px; }
.vote-options { grid-template-columns: 1fr; }
.post-card { padding: 16px; }
}
</style>

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── SUPABASE CONFIG ───────────────────────────────────────────────────────
   Replace these two values with your Supabase project URL and anon key.
   Find them at: https://supabase.com/dashboard → Settings → API
─────────────────────────────────────────────────────────────────────────── */
const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';

const IS_CONFIGURED = !SUPABASE_URL.includes('YOUR_PROJECT_ID');
const supabase = IS_CONFIGURED ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

/* ─── DEMO DATA ─────────────────────────────────────────────────────────── */
const DEMO_POSTS = [
  {
    id: '1', type: 'confession',
    title: "I've been in love with my best friend's husband for 3 years",
    content: "I know how this sounds. I hate myself for it.\n\nBut every time I see them together, something breaks inside me a little. He doesn't know. She doesn't know. I carry this alone every single day — smiling at their anniversary photos, congratulating them on their new home, holding it together while quietly unravelling inside.\n\nI've tried dating other people, therapy, even moving cities once. Nothing cuts through this feeling. Has anyone ever loved someone they absolutely cannot have and actually found a way to be okay?",
    tags: ['situationship'], anonymous_name: 'Heart_4821',
    created_at: new Date(Date.now() - 2*3600000).toISOString(),
    reaction_counts: {'🔥':847,'😂':12,'😢':1203,'😡':45},
    comment_count: 234, vote_a: 312, vote_b: 589
  },
  {

/* ─── UTILS ─────────────────────────────────────────────────────────────── */
function timeAgo(iso) {
  const s = (Date.now() - new Date(iso).getTime()) / 1000;
  if (s < 60)     return 'just now';
  if (s < 3600)   return `${Math.floor(s/60)}m ago`;
  if (s < 86400)  return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}
function makeAnonName() {
  const pfx = ['Heart','Confess','Soul','Echo','Ache','Muse'];
  return `${pfx[Math.floor(Math.random()*pfx.length)]}_${Math.floor(1000+Math.random()*9000)}`;
}

/* ─── AUTH MODAL ─────────────────────────────────────────────────────────── */
function AuthModal({ initMode='login', onClose, onAuth }) {
  const [mode, setMode]       = useState(initMode);
  const [email, setEmail]     = useState('');
  const [pass, setPass]       = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');
  const [done, setDone]       = useState('');

  async function submit() {
    setError(''); setLoading(true);
    if (!IS_CONFIGURED) {
      await new Promise(r => setTimeout(r, 700));
      onAuth({ id:'demo', email, anonymous_name: makeAnonName() });
      setLoading(false); return;
    }
    try {
      if (mode === 'signup') {
        const { data, error: e } = await supabase.auth.signUp({ email, password: pass });
        if (e) throw e;
        if (data.user) {
          const name = makeAnonName();
          await supabase.from('users').insert({ id: data.user.id, email, anonymous_name: name });
          setDone('Check your inbox to verify your account! 💌');
        }
      } else {
        const { data, error: e } = await supabase.auth.signInWithPassword({ email, password: pass });
        if (e) throw e;
        const { data: profile } = await supabase.from('users').select('*').eq('id', data.user.id).single();
        onAuth({ ...data.user, anonymous_name: profile?.anonymous_name || makeAnonName() });
      }
    } catch (e) { setError(e.message); }
    setLoading(false);
  }

  function switchMode(m) { setMode(m); setError(''); setDone(''); }

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-logo">💔 HeartConfia</div>
        <p className="modal-sub">
          {mode==='login' ? 'Welcome back. Your secrets are safe.' : 'Share anonymously. Feel less alone.'}
        </p>
        {done ? (
          <div style={{textAlign:'center',padding:'20px 0',color:'var(--teal)',fontSize:15,lineHeight:1.6}}>{done}</div>
        ) : (
          <div className="modal-form">
            <div>
              <label className="form-label">Email address</label>
              <input className="input" type="email" placeholder="your@email.com" value={email}
                onChange={e => setEmail(e.target.value)} />
            </div>
            <div>
              <label className="form-label">Password</label>
              <input className="input" type="password" placeholder="••••••••" value={pass}
                onChange={e => setPass(e.target.value)}
                onKeyDown={e => e.key==='Enter' && submit()} />
            </div>
            {error && <p className="error-msg">{error}</p>}
            <button className="btn btn-primary" onClick={submit} disabled={loading||!email||!pass}
              style={{width:'100%',justifyContent:'center',padding:'14px'}}>
              {loading ? <span className="spinner"/> : mode==='login' ? 'Log in' : 'Create account'}
            </button>
          </div>
        )}
        <div className="modal-switch">
          {mode==='login'
            ? <>Don't have an account? <button onClick={()=>switchMode('signup')}>Sign up free</button></>
            : <>Already have an account? <button onClick={()=>switchMode('login')}>Log in</button></>
          }
        </div>
      </div>
    </div>
  );
}

/* ─── POST CARD ──────────────────────────────────────────────────────────── */
function PostCard({ post, user, onClick, onNeedAuth, delay=0 }) {
  const [reactions, setReactions] = useState(post.reaction_counts || {});
  const [mine, setMine]           = useState(null);

  async function react(e, type) {
    e.stopPropagation();
    if (!user) { onNeedAuth('signup'); return; }
    const prev = mine;
    const r = {...reactions};
    if (prev===type) { r[type]=Math.max(0,(r[type]||1)-1); setMine(null); }
    else { if(prev) r[prev]=Math.max(0,(r[prev]||1)-1); r[type]=(r[type]||0)+1; setMine(type); }
    setReactions(r);
    if (supabase && user.id!=='demo') {
      if (prev) await supabase.from('reactions').delete().match({post_id:post.id,user_id:user.id,type:prev});
      if (prev!==type) await supabase.from('reactions').insert({post_id:post.id,user_id:user.id,type});
    }
  }

  const totalRx = Object.values(reactions).reduce((s,v)=>s+v,0);
  const topRx   = Object.entries(reactions).sort(([,a],[,b])=>b-a)[0];

  return (
    <div className="post-card" onClick={onClick} style={{animationDelay:`${delay}s`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
        <span className={`post-type-badge ${post.type}`}>
          {post.type==='confession' ? '💔 Confession' : '💬 Seeking Advice'}
        </span>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
          {post.tags?.slice(0,2).map(t=>(
            <span key={t} className={`tag tag-${t}`}>{t}</span>
          ))}
        </div>
      </div>

      <h2 className="post-title">{post.title}</h2>

      <div className="post-meta">
        <span className="anon-name">@{post.anonymous_name}</span>
        <span className="post-meta-dot"/>
        <span>{timeAgo(post.created_at)}</span>
        {totalRx>0 && <><span className="post-meta-dot"/><span>{topRx[0]} {totalRx.toLocaleString()}</span></>}
      </div>

      {user ? (
        <p className="post-preview">{post.content}</p>
      ) : (
        <>
          <div className="blur-wrap">
            <p style={{fontSize:14,lineHeight:1.7,color:'var(--text2)'}}>{post.content.slice(0,160)}…</p>
          </div>
          <Paywall onSignup={()=>onNeedAuth('signup')} onLogin={()=>onNeedAuth('login')} />
        </>
      )}

      {user && (
        <div className="post-reactions">
          {REACTIONS.map(r=>(
            <button key={r} className={`reaction-btn ${mine===r?'active':''}`} onClick={e=>react(e,r)}>
              {r} <span>{(reactions[r]||0)>0?(reactions[r]||0).toLocaleString():''}</span>
            </button>
          ))}
          <div className="comment-count">💬 {(post.comment_count||0).toLocaleString()}</div>
        </div>
      )}
    </div>
  );
}

/* ─── VOTE SECTION ───────────────────────────────────────────────────────── */
function VoteSection({ post, user, onNeedAuth }) {
  const [vA, setVA] = useState(post.vote_a||0);
  const [vB, setVB] = useState(post.vote_b||0);
  const [voted, setVoted] = useState(null);
  const total = vA+vB;
  const pctA  = total>0 ? Math.round((vA/total)*100) : 50;

  async function vote(type) {
    if (!user)  { onNeedAuth(); return; }
    if (voted)  return;
    type==='A' ? setVA(v=>v+1) : setVB(v=>v+1);
    setVoted(type);
    if (supabase && user.id!=='demo')
      await supabase.from('votes').insert({post_id:post.id,user_id:user.id,vote_type:type});
  }

  return (
    <div className="vote-section">
      <div className="vote-label">⚖️ Who is right?</div>
      <div className="vote-options">
        <button className={`vote-btn ${voted==='A'?'voted-a':''}`} onClick={()=>vote('A')}>
          {voted==='A'?'✓ ':''}OP is right
          <div style={{fontSize:22,fontFamily:'var(--font-display)',marginTop:4,color:voted==='A'?'var(--rose)':'var(--text3)'}}>{pctA}%</div>
        </button>
        <button className={`vote-btn ${voted==='B'?'voted-b':''}`} onClick={()=>vote('B')}>
          {voted==='B'?'✓ ':''}Partner is right
          <div style={{fontSize:22,fontFamily:'var(--font-display)',marginTop:4,color:voted==='B'?'#a78bfa':'var(--text3)'}}>{100-pctA}%</div>
        </button>
      </div>
      <div className="vote-bar-track">
        <div className="vote-bar-fill" style={{width:`${pctA}%`}}/>
      </div>
      <div className="vote-foot">
        <span>{vA.toLocaleString()} votes</span>
        <span>{total.toLocaleString()} total</span>
        <span>{vB.toLocaleString()} votes</span>
      </div>
    </div>
  );
}

/* ─── COMMENTS ───────────────────────────────────────────────────────────── */
function Comments({ postId, user, onNeedAuth }) {
  const [comments, setComments] = useState(DEMO_COMMENTS[postId]||[]);
  const [text, setText]         = useState('');
  const [sending, setSending]   = useState(false);

  useEffect(()=>{
    if (!supabase) return;
    supabase.from('comments').select('*').eq('post_id',postId).order('created_at',{ascending:false})
      .then(({data})=>{ if(data?.length) setComments(data); });
    const ch = supabase.channel(`comments-${postId}`)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'comments',filter:`post_id=eq.${postId}`},
        p=>setComments(prev=>[p.new,...prev]))
      .subscribe();
    return ()=>supabase.removeChannel(ch);
  },[postId]);

  async function post() {
    if (!user) { onNeedAuth(); return; }
    if (!text.trim()) return;
    setSending(true);
    const c = { id:Date.now()+'', anonymous_name:user.anonymous_name, content:text.trim(), created_at:new Date().toISOString(), upvotes:0 };
    setComments(prev=>[c,...prev]);
    setText('');
    if (supabase && user.id!=='demo')
      await supabase.from('comments').insert({post_id:postId,user_id:user.id,content:c.content});
    setSending(false);
  }

  const bestId = comments.sort((a,b)=>(b.upvotes||0)-(a.upvotes||0))[0]?.id;

  return (
    <div>
      <div className="section-header" style={{marginBottom:16}}>
        <span className="section-title" style={{fontSize:18}}>Comments</span>
        <span className="section-badge">{comments.length}</span>
      </div>

      <div className="comment-input-row">
        <div className="avatar">{user?user.anonymous_name?.charAt(0):'?'}</div>
        <div style={{flex:1}}>
          <textarea className="input" rows={3} style={{minHeight:76}}
            placeholder={user?`Share your thoughts as @${user.anonymous_name}…`:'Log in to comment'}
            value={text} onChange={e=>setText(e.target.value)} disabled={!user}/>
          {user
            ? <button className="btn btn-primary" style={{marginTop:8}} onClick={post} disabled={!text.trim()||sending}>
                {sending?<span className="spinner"/>:'Post comment'}
              </button>
            : <button className="btn btn-secondary" style={{marginTop:8}} onClick={onNeedAuth}>Log in to comment</button>
          }
        </div>
      </div>

      {[...comments].sort((a,b)=>{
        if(a.id===bestId) return -1;
        if(b.id===bestId) return 1;
        return (b.upvotes||0)-(a.upvotes||0);
      }).map(c=>(
        <div key={c.id} className={`comment-card ${c.id===bestId&&comments.length>2?'best-answer':''}`}>
          {c.id===bestId&&comments.length>2 && <div className="best-badge">✅ Top answer</div>}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span className="comment-author">@{c.anonymous_name}</span>
            <span className="comment-time">{timeAgo(c.created_at)}</span>
          </div>
          <p className="comment-body">{c.content}</p>
          <div className="comment-actions">
            <button className="c-action">👍 {c.upvotes||0}</button>
            <button className="c-action">↩ Reply</button>
          </div>
        </div>
      ))}
    </div>
  );
}

          <label className="form-label">Your story</label>
          <textarea className="input" rows={9}
            placeholder="Share everything. Be honest. No one knows it's you."
            value={content} onChange={e=>setContent(e.target.value)}/>
        </div>

        {/* Tags */}
        <div>
          <label className="form-label">Tags <span style={{color:'var(--text3)'}}>(up to 3)</span></label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {ALL_TAGS.map(t=>(
              <button key={t} className={`pill ${tags.includes(t)?'active':''}`} onClick={()=>toggleTag(t)}>{t}</button>
            ))}
          </div>
        </div>

        <button className="btn btn-primary" onClick={submit}
          disabled={loading||!title.trim()||!content.trim()}
          style={{justifyContent:'center',padding:'14px',fontSize:15}}>
          {loading?<span className="spinner"/>:'💔 Post anonymously'}
        </button>
      </div>
    </div>
  );
}

/* ─── TRENDING PAGE ──────────────────────────────────────────────────────── */
function TrendingPage({ posts, user, onOpen, onNeedAuth }) {
  const ranked = [...posts].sort((a,b)=>{
    const sa = Object.values(a.reaction_counts||{}).reduce((s,v)=>s+v,0) + (a.comment_count||0)*2;
    const sb = Object.values(b.reaction_counts||{}).reduce((s,v)=>s+v,0) + (b.comment_count||0)*2;
    return sb-sa;
  });

  return (
    <div>
      <div className="hero" style={{paddingTop:16}}>
        <div className="hero-eyebrow">🔥 Right Now</div>
        <h1 className="hero-title">Trending</h1>
        <p className="hero-sub">The most emotional, voted, and debated confessions today.</p>
      </div>

      {ranked.map((post,i)=>(
        <div key={post.id} className="post-card" onClick={()=>onOpen(post)}
          style={{display:'flex',gap:16,alignItems:'flex-start',animationDelay:`${i*0.05}s`}}>
          <div className={`trending-num ${i<3?'top':''}`}>#{i+1}</div>
          <div style={{flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
              <span className={`post-type-badge ${post.type}`}>{post.type==='confession'?'💔':'💬'} {post.type}</span>
              <div style={{display:'flex',gap:6}}>
                {post.tags?.slice(0,1).map(t=><span key={t} className={`tag tag-${t}`}>{t}</span>)}
              </div>
            </div>
            <h3 className="post-title" style={{fontSize:16}}>{post.title}</h3>
            <div className="post-meta">
              <span>@{post.anonymous_name}</span>
              <span className="post-meta-dot"/>
              <span>💬 {(post.comment_count||0).toLocaleString()}</span>
              <span className="post-meta-dot"/>
              <span>🔥 {Object.values(post.reaction_counts||{}).reduce((s,v)=>s+v,0).toLocaleString()}</span>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ─── MAIN APP ───────────────────────────────────────────────────────────── */
function App() {
  const [user, setUser]           = useState(null);
  const [page, setPage]           = useState('home');
  const [posts, setPosts]         = useState(DEMO_POSTS);
  const [active, setActive]       = useState(null);
  const [tagFilter, setTagFilter] = useState('all');
  const [auth, setAuth]           = useState(null);   // null | 'login' | 'signup'
  const [toasts, setToasts]       = useState([]);
  const [loading, setLoading]     = useState(false);

  function addToast(msg, type='info') {
    const id = Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)), 3600);
  }

  /* Supabase session */
  useEffect(()=>{
    if (!supabase) return;
    supabase.auth.getSession().then(({data:{session}})=>{
      if (session?.user) {
        supabase.from('users').select('*').eq('id',session.user.id).single()
          .then(({data})=>setUser({...session.user,anonymous_name:data?.anonymous_name}));
      }
    });
    supabase.auth.onAuthStateChange((ev)=>{ if(ev==='SIGNED_OUT') setUser(null); });
  },[]);

  /* Load posts */
  useEffect(()=>{
    if (!supabase) return;
    setLoading(true);
    supabase.from('posts').select('*,users(anonymous_name)').order('created_at',{ascending:false}).limit(50)
      .then(({data})=>{
        if (data?.length) setPosts(data.map(p=>({...p,anonymous_name:p.users?.anonymous_name})));
        setLoading(false);
      });
  },[]);

  /* Realtime new posts */
  useEffect(()=>{
    if (!supabase) return;
    const ch = supabase.channel('new-posts')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},
        async p=>{
          const {data:u}=await supabase.from('users').select('anonymous_name').eq('id',p.new.user_id).single();
          setPosts(prev=>[{...p.new,anonymous_name:u?.anonymous_name,reaction_counts:{},comment_count:0,vote_a:0,vote_b:0},...prev]);
        })
      .subscribe();
    return ()=>supabase.removeChannel(ch);
  },[]);

  function handleAuth(u) {
    setUser(u); setAuth(null);
    addToast(`Welcome, @${u.anonymous_name}! 💔`,'success');
  }
  function logout() {
    if(supabase) supabase.auth.signOut();
    setUser(null); setPage('home');
    addToast('Logged out. Your secrets are safe.','info');
  }
  function openPost(post) {
    setActive(post); setPage('detail');
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function handleNewPost(post) { setPosts(p=>[post,...p]); setPage('home'); }
  function needAuth(mode='signup') { setAuth(mode); }

  /* Filtered posts */
  function filtered() {
    let f = page==='confessions' ? posts.filter(p=>p.type==='confession')
          : page==='advice'      ? posts.filter(p=>p.type==='advice')
          : posts;
    if (tagFilter!=='all') f=f.filter(p=>p.tags?.includes(tagFilter));
    return f;
  }

  const feed = filtered();
  const isFeed = ['home','confessions','advice'].includes(page);
  const feedTitles = {home:'Latest Stories',confessions:'Confessions',advice:'Seeking Advice'};

  return (
    <>
      {/* NAV */}
      <nav className="nav">
        <div className="nav-logo" onClick={()=>{setPage('home');setActive(null);}}>
          💔 HeartConfia
        </div>
        <div className="nav-tabs">
          {[
            {id:'home',label:'Home'},
            {id:'confessions',label:'Confessions'},
            {id:'advice',label:'Advice'},
            {id:'trending',label:'🔥 Trending'},
          ].map(tab=>(
            <button key={tab.id} className={`nav-tab ${page===tab.id?'active':''}`}
              onClick={()=>{setPage(tab.id);setActive(null);}}>
              {tab.label}
            </button>
          ))}
        </div>
        {user ? (
          <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
            <button className="btn btn-primary" style={{padding:'7px 14px',fontSize:13}} onClick={()=>setPage('create')}>+ Post</button>
            <button className="btn btn-ghost" style={{fontSize:12}} onClick={logout}>@{user.anonymous_name?.split('_')[0]}</button>
          </div>
        ) : (
          <div style={{display:'flex',gap:6,flexShrink:0}}>
            <button className="btn btn-ghost" onClick={()=>setAuth('login')}>Login</button>
            <button className="btn btn-primary" style={{padding:'7px 14px',fontSize:13}} onClick={()=>setAuth('signup')}>Join free</button>
          </div>
        )}
      </nav>

      {/* MAIN */}
      <div className="layout">
        <div className="layout-center">

          {/* CONFIG NOTICE */}
          {!IS_CONFIGURED && (page==='home'||isFeed) && (
            <div className="config-notice">
              <strong>⚙️ Supabase not connected.</strong> Replace <code>SUPABASE_URL</code> and <code>SUPABASE_KEY</code> at the top of this file with your project credentials to enable auth, real posts & realtime. Demo data &amp; simulated auth are shown until then.
            </div>
          )}

          {/* DETAIL */}
          {page==='detail' && active && (
            <PostDetail post={active} user={user}
              onBack={()=>{setPage('home');setActive(null);}}
              onNeedAuth={needAuth}/>
          )}

          {/* FEED */}
          {isFeed && (
            <div>
              {page==='home' && (
                <div className="hero">
                  <div className="hero-eyebrow">anonymous · safe · real</div>
                  <h1 className="hero-title">HeartConfia</h1>
                  <p className="hero-sub">Share the stories you've never told anyone. No names. No judgment. Just hearts.</p>
                  {user ? (
                    <button className="btn btn-primary" onClick={()=>setPage('create')}>💔 Share your confession</button>
                  ) : (
                    <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
                      <button className="btn btn-primary" onClick={()=>setAuth('signup')}>Join anonymously</button>
                      <button className="btn btn-secondary" onClick={()=>setAuth('login')}>Log in</button>
                    </div>
                  )}
                </div>
              )}

              {page!=='home' && (
                <div className="section-header">
                  <h2 className="section-title">{feedTitles[page]}</h2>
                  <span className="section-badge">{feed.length}</span>
                </div>
              )}

              {/* Filter pills */}
              <div className="pills">
                {['all',...ALL_TAGS].map(t=>(
                  <button key={t} className={`pill ${tagFilter===t?'active':''}`} onClick={()=>setTagFilter(t)}>
                    {t==='all'?'All stories':t}
                  </button>
                ))}
              </div>

              {/* Create prompt */}
              {user && (
                <div className="create-prompt-bar" onClick={()=>setPage('create')}>
                  <div className="avatar">{user.anonymous_name?.charAt(0)}</div>
                  <span className="create-prompt-text">
                    Something's weighing on you. Share it anonymously as <strong style={{color:'var(--text2)'}}>@{user.anonymous_name}</strong>…
                  </span>
                </div>
              )}

              {loading ? (
                <div style={{display:'flex',justifyContent:'center',padding:'60px 0'}}>
                  <span className="spinner" style={{width:36,height:36}}/>
                </div>
              ) : feed.length===0 ? (
                <div className="empty-state">
                  <div className="empty-icon">🕊️</div>
                  <div className="empty-title">Nothing here yet</div>
                  <p>Be the first to share.</p>
                </div>
              ) : (
                feed.map((post,i)=>(
                  <PostCard key={post.id} post={post} user={user}
                    onClick={()=>openPost(post)}
                    onNeedAuth={needAuth}
                    delay={Math.min(i*0.05, 0.3)}/>
                ))
              )}
            </div>
          )}

          {/* TRENDING */}
          {page==='trending' && (
            <TrendingPage posts={posts} user={user} onOpen={openPost} onNeedAuth={needAuth}/>
          )}

          {/* CREATE */}
          {page==='create' && (
            user
              ? <CreatePost user={user} onBack={()=>setPage('home')} onPost={handleNewPost} addToast={addToast}/>
              : <div style={{textAlign:'center',padding:'80px 20px'}}>
                  <div style={{fontSize:46,marginBottom:14}}>🔒</div>
                  <div className="section-title">Sign in to share your confession</div>
                  <div style={{marginTop:20,display:'flex',gap:12,justifyContent:'center'}}>
                    <button className="btn btn-primary" onClick={()=>setAuth('signup')}>Sign up free</button>
                    <button className="btn btn-secondary" onClick={()=>setAuth('login')}>Log in</button>
                  </div>
                </div>
          )}

        </div>
      </div>

      {/* AUTH MODAL */}
      {auth && <AuthModal initMode={auth} onClose={()=>setAuth(null)} onAuth={handleAuth}/>}

      {/* TOASTS */}
      <ToastStack toasts={toasts}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<!--
════════════════════════════════════════════════════════════════════
  SUPABASE SQL SCHEMA — paste into Supabase → SQL Editor → Run
════════════════════════════════════════════════════════════════════

-- 1. Extensions
create extension if not exists "uuid-ossp";

-- 2. Users (mirrors auth.users)
create table public.users (
  id            uuid references auth.users(id) on delete cascade primary key,
  email         text not null,
  anonymous_name text not null unique,
  created_at    timestamptz default now()
);

-- 3. Posts
create table public.posts (
  id         uuid default uuid_generate_v4() primary key,
  user_id    uuid references public.users(id) on delete cascade not null,
  title      text not null,
  content    text not null,
  type       text not null check (type in ('confession','advice')),
  tags       text[] default '{}',
  created_at timestamptz default now()
);

-- 4. Comments
create table public.comments (
  id         uuid default uuid_generate_v4() primary key,
  post_id    uuid references public.posts(id) on delete cascade not null,
  user_id    uuid references public.users(id) on delete cascade not null,
  content    text not null,
  upvotes    int default 0,
  created_at timestamptz default now()
);

-- 5. Reactions
create table public.reactions (
  id         uuid default uuid_generate_v4() primary key,
  post_id    uuid references public.posts(id) on delete cascade not null,
  user_id    uuid references public.users(id) on delete cascade not null,
  type       text not null check (type in ('🔥','😂','😢','😡')),
  created_at timestamptz default now(),
  unique(post_id, user_id, type)
);

-- 6. Votes
create table public.votes (
  id         uuid default uuid_generate_v4() primary key,
  post_id    uuid references public.posts(id) on delete cascade not null,
  user_id    uuid references public.users(id) on delete cascade not null,
  vote_type  text not null check (vote_type in ('A','B')),
  created_at timestamptz default now(),
  unique(post_id, user_id)
);

-- 7. Row Level Security
alter table public.users     enable row level security;
alter table public.posts     enable row level security;
alter table public.comments  enable row level security;
alter table public.reactions enable row level security;
alter table public.votes     enable row level security;

-- 8. Policies
create policy "Read users"        on public.users     for select using (true);
create policy "Insert own user"   on public.users     for insert with check (auth.uid()=id);

create policy "Read posts"        on public.posts     for select using (true);
create policy "Auth insert posts" on public.posts     for insert with check (auth.uid()=user_id);

create policy "Read comments"     on public.comments  for select using (true);
create policy "Auth insert comm"  on public.comments  for insert with check (auth.uid()=user_id);

create policy "Read reactions"    on public.reactions for select using (true);
create policy "Own reactions"     on public.reactions for all   using (auth.uid()=user_id);

create policy "Read votes"        on public.votes     for select using (true);
create policy "Own votes"         on public.votes     for insert with check (auth.uid()=user_id);

-- 9. Enable Realtime
alter publication supabase_realtime add table public.comments;
alter publication supabase_realtime add table public.posts;
alter publication supabase_realtime add table public.reactions;
alter publication supabase_realtime add table public.votes;

-- 10. Supabase Auth settings (Dashboard → Authentication → Settings)
--   • Enable "Email" provider
--   • Enable "Confirm email" (email verification)
--   • Set Site URL to your deployed app domain
