<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HeartConfia 💔</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--s1:#0f0f18;--s2:#161622;--s3:#1e1e30;--s4:#252538;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.12);
  --tx:#f2f0ff;--tx2:#a09cbd;--tx3:#5f5b7a;--tx4:#3d3a55;
  --rose:#ff3d5a;--rdim:rgba(255,61,90,0.14);--rglow:rgba(255,61,90,0.28);
  --violet:#8b5cf6;--vdim:rgba(139,92,246,0.14);
  --amber:#f59e0b;--teal:#10b981;
}
html,body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh}
#root{min-height:100vh;background:var(--bg)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}

@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes hb{0%,100%{transform:scale(1)}15%{transform:scale(1.28)}30%{transform:scale(1)}45%{transform:scale(1.12)}60%{transform:scale(1)}}
@keyframes pi{0%{opacity:0;transform:scale(0.88)}70%{transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
@keyframes tk{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes lb{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes bp{0%,100%{border-color:rgba(255,61,90,.25)}50%{border-color:rgba(255,61,90,.7)}}
@keyframes bv{0%{transform:scale(1)}30%{transform:scale(1.4)}60%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes fl{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.6)}}
@keyframes gs{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes fi{from{opacity:0}to{opacity:1}}

.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.bp{background:linear-gradient(135deg,#ff3d5a,#c9184a);color:#fff;box-shadow:0 4px 20px rgba(255,61,90,.3)}
.bp:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,61,90,.45)}
.bs{background:var(--s2);color:var(--tx);border:1px solid var(--bd2)}
.bs:hover{background:var(--s3)}
.bg{background:transparent;color:var(--tx2);padding:8px 14px}
.bg:hover{color:var(--tx);background:var(--s2)}
.bv{background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff}
.bt{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

.inp{width:100%;padding:13px 16px;background:var(--s2);border:1px solid var(--bd);border-radius:12px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:all .2s}
.inp:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(255,61,90,.1)}
.inp::placeholder{color:var(--tx3)}
textarea.inp{resize:vertical;min-height:120px;line-height:1.7}

.nav{position:fixed;top:0;left:0;right:0;height:60px;z-index:200;background:rgba(7,7,13,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px}
.nlogo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--rose);cursor:pointer;flex-shrink:0;user-select:none;animation:hb 4s ease-in-out infinite;display:inline-block;text-shadow:0 0 28px rgba(255,61,90,.5)}
.ntabs{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.ntabs::-webkit-scrollbar{display:none}
.ntab{padding:6px 13px;border-radius:50px;font-size:13px;font-weight:500;cursor:pointer;color:var(--tx2);transition:all .2s;border:none;background:transparent;white-space:nowrap;font-family:'DM Sans',sans-serif}
.ntab:hover{color:var(--tx);background:var(--s2)}
.ntab.on{color:var(--rose);background:var(--rdim);font-weight:600}

.ticker{background:rgba(255,61,90,.07);border-bottom:1px solid rgba(255,61,90,.12);height:32px;overflow:hidden;display:flex;align-items:center;position:fixed;top:60px;left:0;right:0;z-index:199}
.ticker-track{display:inline-flex;animation:tk 50s linear infinite;white-space:nowrap}
.ticker-item{font-size:12px;color:var(--tx2);padding:0 24px;display:inline-flex;align-items:center;gap:8px}
.ticker-dot{width:5px;height:5px;border-radius:50%;background:var(--rose);animation:lb 1.2s ease infinite;flex-shrink:0}

.lay{display:grid;grid-template-columns:1fr min(700px,100%) 1fr;padding-top:92px;min-height:100vh}
.lc{grid-column:2;padding:20px 16px 100px}

.ebadge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.eb-hot{background:rgba(255,61,90,.15);color:#fbbf24;border:1px solid rgba(255,61,90,.3);animation:bp 2s ease infinite}
.eb-trnd{background:rgba(245,158,11,.14);color:#f59e0b;border:1px solid rgba(245,158,11,.28)}
.eb-sad{background:rgba(99,102,241,.14);color:#818cf8;border:1px solid rgba(99,102,241,.28)}
.eb-toxic{background:rgba(239,68,68,.14);color:#f87171;border:1px solid rgba(239,68,68,.28)}
.eb-wild{background:rgba(234,179,8,.14);color:#facc15;border:1px solid rgba(234,179,8,.28)}
.eb-dbt{background:rgba(139,92,246,.14);color:#a78bfa;border:1px solid rgba(139,92,246,.28)}

.pc{background:var(--s1);border:1px solid var(--bd);border-radius:20px;padding:20px;margin-bottom:14px;cursor:pointer;transition:all .3s;animation:fu .4s ease both;position:relative;overflow:hidden}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--rose),var(--violet),var(--amber));opacity:0;transition:opacity .3s}
.pc:hover{border-color:rgba(255,61,90,.22);transform:translateY(-2px);box-shadow:0 16px 50px rgba(0,0,0,.5)}
.pc:hover::before{opacity:1}

.ptb{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.ptb.confession{color:var(--rose)}.ptb.advice{color:#a78bfa}.ptb.hot_take{color:var(--amber)}
.ptitle{font-family:'Playfair Display',serif;font-size:19px;font-weight:900;line-height:1.32;color:var(--tx);margin-bottom:10px}
.pprev{font-size:14px;line-height:1.75;color:var(--tx2);margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.pmeta{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--tx3);margin-bottom:14px;flex-wrap:wrap}
.pdot{width:3px;height:3px;border-radius:50%;background:var(--tx4);flex-shrink:0}
.aname{color:var(--tx2);font-weight:600}

.rxrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rxb{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:50px;background:var(--s2);border:1px solid var(--bd);cursor:pointer;font-size:13px;font-weight:600;color:var(--tx2);transition:all .2s;font-family:'DM Sans',sans-serif}
.rxb:hover{border-color:rgba(255,61,90,.3);transform:scale(1.05)}
.rxb.on{background:var(--rdim);border-color:rgba(255,61,90,.4);color:var(--rose)}
.flt{position:fixed;pointer-events:none;font-size:22px;animation:fl .9s ease forwards;z-index:9999}

.eng{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;background:var(--s2);border-radius:12px;margin-top:12px;flex-wrap:wrap}
.eng-s{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--tx2)}
.eng-s.hot{color:var(--amber)}

.blw{position:relative;max-height:85px;overflow:hidden}
.blw::after{content:'';position:absolute;bottom:0;left:0;right:0;height:70px;background:linear-gradient(transparent,var(--s1))}
.pw{padding:22px 18px;background:linear-gradient(to bottom,transparent,rgba(15,15,24,.98) 20%);text-align:center;border-top:1px solid rgba(255,61,90,.14);margin:0 -20px -20px;border-radius:0 0 20px 20px}
.pw-h{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;color:var(--tx);margin-bottom:6px}
.pw-s{font-size:13px;color:var(--tx2);margin-bottom:16px;line-height:1.6}

.mov{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:16px;animation:fi .2s ease}
.mod{background:var(--s1);border:1px solid var(--bd2);border-radius:22px;padding:28px;width:100%;max-width:420px;position:relative;animation:pi .3s ease;max-height:90vh;overflow-y:auto}
.mclose{position:absolute;top:14px;right:14px;background:var(--s2);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--tx2);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mclose:hover{background:var(--s3);color:var(--tx)}
.flbl{font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:6px;display:block}
.mswitch{text-align:center;font-size:14px;color:var(--tx2);margin-top:14px}
.mswitch button{background:none;border:none;color:var(--rose);cursor:pointer;font-weight:700;font-size:14px;font-family:'DM Sans',sans-serif}
.mtabs{display:flex;gap:4px;background:var(--s2);border-radius:12px;padding:4px;margin-bottom:20px}
.mtab{flex:1;padding:9px;border-radius:9px;border:none;background:transparent;color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.mtab.on{background:var(--rdim);color:var(--rose)}

.wiw{background:linear-gradient(135deg,rgba(255,61,90,.06),rgba(139,92,246,.06));border:1px solid rgba(255,61,90,.18);border-radius:16px;padding:18px;margin:16px 0}
.wiw-ttl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(--tx3);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.wiw-ttl::after{content:'';flex:1;height:1px;background:var(--bd)}
.wiw-opts{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.wbtn{flex:1;min-width:80px;padding:14px 8px;border-radius:14px;border:2px solid var(--bd2);background:var(--s2);cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;transition:all .25s;line-height:1.5;color:var(--tx2)}
.wbtn:hover{transform:translateY(-2px)}
.wbtn.he.sel,.wbtn.he:hover{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.5);color:#f87171}
.wbtn.she.sel,.wbtn.she:hover{background:rgba(139,92,246,.15);border-color:rgba(139,92,246,.5);color:#a78bfa}
.wbtn.both.sel,.wbtn.both:hover{background:rgba(156,163,175,.14);border-color:rgba(156,163,175,.45);color:#d1d5db}
.wbtn.sel{animation:bv .4s ease}
.wico{font-size:20px;display:block;margin-bottom:4px}
.wbars{display:flex;flex-direction:column;gap:8px}
.wrow{display:flex;align-items:center;gap:10px}
.wlbl{width:68px;font-weight:600;color:var(--tx2);flex-shrink:0;font-size:12px}
.wtrk{flex:1;height:8px;border-radius:4px;background:var(--s3);overflow:hidden}
.wfill{height:100%;border-radius:4px;transition:width .8s}
.wfill.he{background:linear-gradient(90deg,#ef4444,#dc2626)}
.wfill.she{background:linear-gradient(90deg,#8b5cf6,#6d28d9)}
.wfill.both{background:linear-gradient(90deg,#9ca3af,#6b7280)}
.wpct{font-weight:700;font-size:12px;min-width:32px;text-align:right}
.wtot{text-align:center;font-size:12px;color:var(--tx3);margin-top:8px}
.wverd{text-align:center;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;margin-top:10px}
.wverd.he{background:rgba(239,68,68,.1);color:#f87171}
.wverd.she{background:rgba(139,92,246,.1);color:#a78bfa}
.wverd.both{background:rgba(156,163,175,.1);color:#d1d5db}

.cmt-sort{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none}
.cmt-sort::-webkit-scrollbar{display:none}
.csb{padding:6px 14px;border-radius:50px;font-size:12px;font-weight:600;border:1px solid var(--bd);background:var(--s2);color:var(--tx2);cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'DM Sans',sans-serif}
.csb.on{background:var(--rdim);border-color:rgba(255,61,90,.4);color:var(--rose)}
.crow{display:flex;gap:12px;margin-bottom:22px;align-items:flex-start}
.ava{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--rose),var(--violet));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.ava.sm{width:30px;height:30px;font-size:11px}
.cc{padding:15px 17px;background:var(--s2);border:1px solid var(--bd);border-radius:14px;margin-bottom:10px;animation:fu .3s ease;transition:border-color .2s}
.cc:hover{border-color:var(--bd2)}
.cc.top{border-color:rgba(245,158,11,.3);background:linear-gradient(135deg,rgba(245,158,11,.04),var(--s2))}
.cc.hot{border-color:rgba(239,68,68,.22)}
.cchead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.ccbody{font-size:14px;line-height:1.7;color:var(--tx2)}
.ccfoot{display:flex;align-items:center;gap:12px;margin-top:9px}
.ccrxb{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:50px;background:var(--s3);border:1px solid var(--bd);cursor:pointer;font-size:12px;font-weight:600;color:var(--tx3);transition:all .2s;font-family:'DM Sans',sans-serif}
.ccrxb:hover,.ccrxb.on{color:var(--rose);border-color:rgba(255,61,90,.3)}
.ccrpl{font-size:12px;color:var(--tx3);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:color .2s}
.ccrpl:hover{color:var(--rose)}
.toplbl{font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.hotlbl{font-size:10px;font-weight:700;color:#f87171;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}

.pills{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:18px}
.pills::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--tx2);transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.pill:hover{border-color:rgba(255,61,90,.35);color:var(--rose)}
.pill.on{background:var(--rdim);border-color:rgba(255,61,90,.45);color:var(--rose)}

.hero{text-align:center;padding:34px 0 26px;position:relative}
.hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(255,61,90,.08),transparent 70%);pointer-events:none}
.hey{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(--rose);margin-bottom:10px}
.htitle{font-family:'Playfair Display',serif;font-size:clamp(34px,9vw,56px);font-weight:900;line-height:1.06;background:linear-gradient(140deg,var(--tx) 30%,var(--rose) 65%,var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;background-size:200% 200%;animation:gs 6s ease infinite}
.hsub{font-size:15px;color:var(--tx2);max-width:360px;margin:0 auto 26px;line-height:1.7}

.sh{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.st{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--tx)}
.sbadge{padding:3px 10px;border-radius:50px;background:var(--rdim);color:var(--rose);font-size:12px;font-weight:700}
.cpbar{background:linear-gradient(135deg,rgba(255,61,90,.07),rgba(139,92,246,.05));border:1px solid rgba(255,61,90,.15);border-radius:16px;padding:15px 18px;margin-bottom:18px;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:12px}
.cpbar:hover{border-color:rgba(255,61,90,.32)}

.statg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.statb{background:var(--s2);border:1px solid var(--bd);border-radius:14px;padding:16px;text-align:center}
.statn{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--tx)}
.statl{font-size:12px;color:var(--tx3);margin-top:4px}

.trn{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;line-height:1;min-width:44px}
.trn.g{background:linear-gradient(135deg,#f59e0b,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.trn.s{background:linear-gradient(135deg,#9ca3af,#6b7280);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.trn.b{background:linear-gradient(135deg,#b45309,#92400e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.trn.d{color:var(--s4)}

.bkbtn{display:inline-flex;align-items:center;gap:7px;color:var(--tx2);font-size:14px;font-weight:600;cursor:pointer;background:none;border:none;padding:8px 0;margin-bottom:18px;transition:color .2s;font-family:'DM Sans',sans-serif}
.bkbtn:hover{color:var(--tx)}
.div{height:1px;background:var(--bd);margin:20px 0}
.spin{width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--rose);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;display:inline-block}
.empty{text-align:center;padding:60px 20px;color:var(--tx3)}
.empi{font-size:48px;margin-bottom:12px}
.empt{font-family:'Playfair Display',serif;font-size:20px;color:var(--tx2);margin-bottom:8px}
.twrap{position:fixed;bottom:22px;right:16px;z-index:2000;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{padding:12px 16px;border-radius:14px;background:var(--s2);border:1px solid var(--bd2);font-size:14px;color:var(--tx);box-shadow:0 12px 40px rgba(0,0,0,.5);animation:fu .3s ease;display:flex;align-items:center;gap:10px;min-width:180px;max-width:300px}
.toast.suc{border-color:rgba(16,185,129,.4)}.toast.er{border-color:rgba(255,61,90,.4)}
.cnote{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:14px;padding:13px 16px;margin-bottom:18px;font-size:13px;color:var(--amber);line-height:1.65}
.cnote code{background:rgba(245,158,11,.15);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:12px}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.tc{background:rgba(239,68,68,.12);color:#f87171}.tb{background:var(--rdim);color:var(--rose)}.td{background:var(--vdim);color:#a78bfa}.tm{background:rgba(16,185,129,.12);color:var(--teal)}.ts{background:rgba(245,158,11,.12);color:var(--amber)}
.notifwrap{position:relative}
.nbtn{background:var(--s2);border:1px solid var(--bd);border-radius:50%;width:36px;height:36px;cursor:pointer;color:var(--tx2);font-size:15px;display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s;flex-shrink:0}
.nbtn:hover{background:var(--s3)}
.nbadge{position:absolute;top:-4px;right:-4px;background:var(--rose);color:#fff;font-size:10px;font-weight:700;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.npanel{position:absolute;top:calc(100% + 10px);right:0;width:290px;background:var(--s1);border:1px solid var(--bd2);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.6);z-index:200;max-height:360px;overflow-y:auto;animation:fu .2s ease}
.nitem{padding:13px 15px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .2s}
.nitem:hover{background:var(--s2)}.nitem.unread{background:rgba(255,61,90,.05)}

  var au=useState(null);    var auth=au[0];      var setAuth=au[1];
  var to=useState([]);      var toasts=to[0];    var setToasts=to[1];
  var ld=useState(false);   var loading=ld[0];   var setLoading=ld[1];

  function addToast(msg, type) {
    var id = Date.now();
    setToasts(function(prev){return prev.concat([{id:id,msg:msg,type:type||'info'}]);});
    setTimeout(function(){setToasts(function(prev){return prev.filter(function(t){return t.id!==id;});});}, 3600);
  }

  // Auth session — all .then()
  useEffect(function() {
    if (!sb) return;
    sb.auth.getSession().then(function(r) {
      if (r.data && r.data.session && r.data.session.user) {
        sb.from('users').select('*').eq('id', r.data.session.user.id).single()
          .then(function(pr) {
            if (pr.data) setUser(Object.assign({}, r.data.session.user, {anonymous_name:pr.data.anonymous_name}));
          });
      }
    });
    var sub = sb.auth.onAuthStateChange(function(ev) {
      if (ev === 'SIGNED_OUT') setUser(null);
    });
    return function() { if (sub && sub.data && sub.data.subscription) sub.data.subscription.unsubscribe(); };
  }, []);

  // Load posts
  useEffect(function() {
    if (!sb) return;
    setLoading(true);
    sb.from('posts').select('*,users(anonymous_name)').order('created_at',{ascending:false}).limit(60)
      .then(function(r) {
        if (r.data && r.data.length) {
          setPosts(r.data.map(function(p) {
            return Object.assign({wiw_he:0,wiw_she:0,wiw_both:0}, p, {anonymous_name:p.users&&p.users.anonymous_name});
          }));
        }
        setLoading(false);
      });
  }, []);

  // Realtime new posts
  useEffect(function() {
    if (!sb) return;
    var ch = sb.channel('feed-rt')
      .on('postgres_changes', {event:'INSERT',schema:'public',table:'posts'}, function(pl) {
        sb.from('users').select('anonymous_name').eq('id', pl.new.user_id).single()
          .then(function(u) {
            setPosts(function(prev) {
              return [Object.assign({wiw_he:0,wiw_she:0,wiw_both:0}, pl.new, {
                anonymous_name:u.data&&u.data.anonymous_name, reaction_counts:{}, comment_count:0, vote_a:0, vote_b:0
              })].concat(prev);

            })),
          user&&h('div',{className:'cpbar',onClick:function(){setPage('create');}},
            h('div',{className:'ava'},user.anonymous_name.charAt(0)),
            h('span',{style:{fontSize:14,color:'var(--tx3)'}},"Something's weighing on you. Share it as ",h('strong',{style:{color:'var(--tx2)'}},'@'+user.anonymous_name),'…')),
          loading
            ? h('div',{style:{display:'flex',justifyContent:'center',padding:'60px 0'}},h('span',{className:'spin',style:{width:34,height:34}}))
            : feed.length===0
            ? h('div',{className:'empty'},h('div',{className:'empi'},'🕊️'),h('div',{className:'empt'},'Nothing here yet'))
            : feed.map(function(post,i){
                return h(PostCard,{key:post.id,post:post,user:user,onClick:function(){openPost(post);},onNeedAuth:needAuth,delay:Math.min(i*.06,.4)});
              })),

        page==='trending'&&h(TrendingPage,{posts:posts,user:user,onOpen:openPost,onNeedAuth:needAuth}),
        page==='create'&&(
          user
            ? h(CreatePost,{user:user,onBack:function(){setPage('home');},onPost:newPost,addToast:addToast})
            : h('div',{style:{textAlign:'center',padding:'80px 20px'}},
                h('div',{style:{fontSize:46,marginBottom:14}},'🔒'),
                h('div',{className:'st'},'Sign in to share your confession'),
                h('div',{style:{marginTop:20,display:'flex',gap:12,justifyContent:'center'}},
                  h('button',{className:'btn bp',onClick:function(){setAuth('signup');}},'Sign up free'),
                  h('button',{className:'btn bs',onClick:function(){setAuth('login');}},'Log in')))),
        page==='profile'&&h(ProfilePage,{user:user,posts:posts,onBack:function(){setPage('home');},addToast:addToast,onNeedAuth:needAuth}),
        page==='admin'&&isAdmin&&h(AdminPanel,{user:user,addToast:addToast}))),

    auth&&h(AuthModal,{initMode:auth,onClose:function(){setAuth(null);},onAuth:handleAuth}),
    h(Toasts,{items:toasts}));
}

/* Boot */
if (!R || !RD) {
  document.getElementById('root').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;padding:20px;text-align:center;background:#07070d">'
    +'<div style="font-size:48px">💔</div>'
    +'<div style="font-family:Georgia,serif;font-size:22px;color:#f0eef8">React failed to load</div>'
    +'<p style="color:#9a96b4;font-size:14px;max-width:360px">Check your internet connection and reload.</p>'
    +'<button onclick="location.reload()" style="background:#ff3d5a;color:#fff;border:none;border-radius:50px;padding:12px 24px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px">Reload</button>'
    +'</div>';
} else {
  try {
    RD.createRoot(document.getElementById('root')).render(h(App, null));
  } catch(e) {
    document.getElementById('root').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;padding:20px;text-align:center;background:#07070d">'
      +'<div style="font-size:48px">💔</div>'
      +'<div style="font-family:Georgia,serif;font-size:22px;color:#f0eef8">App error</div>'
      +'<p style="color:#9a96b4;font-size:14px;max-width:360px">'+e.message+'</p>'
      +'<button onclick="location.reload()" style="background:#ff3d5a;color:#fff;border:none;border-radius:50px;padding:12px 24px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px">Reload</button>'
      +'</div>';
    console.error('HeartConfia error:', e);
  }
}
</script>
</body>
</html>
