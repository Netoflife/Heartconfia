<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>HeartConfia · anonymous confessions</title>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --card: #1e1e32;
      --text: #f0e9ff;
      --text-secondary: #b0a0cc;
      --accent: #ff4d7a;
      --accent-glow: #ff3366;
      --border: #2a2a40;
      --shadow: 0 8px 20px rgba(0,0,0,0.6);
      --radius: 20px;
      --radius-sm: 14px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      padding: 12px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ff4d7a, #ff8fa3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      background: transparent;
      border: none;
      color: var(--text);
      font-weight: 500;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: all 0.2s;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    button.primary {
      background: var(--accent);
      border: none;
      color: white;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(255,77,122,0.4);
      border: none;
    }

    button.primary:hover {
      background: #ff3366;
    }

    button:active { transform: scale(0.96); }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 8px 0;
      scrollbar-width: thin;
      background: var(--bg);
    }

    .tab {
      padding: 8px 18px;
      border-radius: 30px;
      background: var(--surface);
      white-space: nowrap;
      font-weight: 500;
      border: 1px solid var(--border);
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Cards */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.2s;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .post-title {
      font-weight: 700;
      font-size: 1.3rem;
      line-height: 1.3;
    }

    .preview-text {
      color: var(--text-secondary);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .blurred-text {
      filter: blur(5px);
      user-select: none;
      pointer-events: none;
      opacity: 0.6;
    }

    .paywall-overlay {
      background: rgba(15,15,26,0.8);
      backdrop-filter: blur(8px);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px dashed var(--accent);
    }

    .reaction-row {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .reaction-btn {
      background: transparent;
      border: none;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 20px;
    }

    .vote-section {
      display: flex;
      gap: 12px;
      align-items: center;
      font-weight: 600;
    }

    .vote-btn {
      background: #2a2a40;
      padding: 8px 16px;
      border-radius: 30px;
    }

    .comment-thread {
      margin-top: 8px;
      padding-left: 16px;
      border-left: 2px solid var(--border);
    }

    input, textarea, select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      color: white;
      font-family: inherit;
      width: 100%;
      margin: 6px 0;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-content {
      background: var(--surface);
      padding: 24px;
      border-radius: 28px;
      width: 90%;
      max-width: 400px;
    }

    .hidden {
      display: none !important;
    }

    .flex-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
  </style>
</head>
<body>
  <!-- Supabase config (replace with your actual project URL and anon key) -->
  <script>
    // ⚠️ IMPORTANT: Replace with your real Supabase credentials
    const SUPABASE_URL = 'https://your-project-id.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvdXItcHJvamVjdC1pZCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNjc5ODIwMDAwLCJleHAiOjE5OTUzOTYwMDB9.placeholder';
    
    // Initialize Supabase client
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>

  <header class="app-header">
    <div class="logo">HeartConfia</div>
    <div class="nav-actions" id="authButtons">
      <button id="loginBtn" class="primary">Login</button>
      <button id="signupBtn">Sign up</button>
    </div>
    <div id="userInfo" class="hidden nav-actions">
      <span id="anonNameDisplay" style="font-weight:600; color:#ff8fa3;"></span>
      <button id="logoutBtn">Logout</button>
    </div>
  </header>

  <div class="container" id="appContainer">
    <!-- Tabs -->
    <div class="tabs" id="tabNavigation">
      <div class="tab active" data-tab="home">🔥 Home</div>
      <div class="tab" data-tab="confessions">Confessions</div>
      <div class="tab" data-tab="advice">Advice</div>
      <div class="tab" data-tab="trending">Trending</div>
    </div>

    <!-- Dynamic feed -->
    <div id="feedContainer"></div>
    
    <!-- Create post floating button (visible for logged in) -->
    <button id="createFloatingBtn" class="primary hidden" style="position:fixed; bottom:24px; right:24px; z-index:20; border-radius:40px; padding:14px 24px;">+ New Post</button>
  </div>

  <!-- Auth Modal -->
  <div id="authModal" class="modal hidden">
    <div class="modal-content">
      <h2 style="margin-bottom:16px;">💔 Join HeartConfia</h2>
      <input type="email" id="authEmail" placeholder="Email" autocomplete="email">
      <input type="password" id="authPassword" placeholder="Password">
      <div class="flex-row" style="justify-content: space-between; margin: 16px 0;">
        <button id="submitLogin" class="primary">Login</button>
        <button id="submitSignup">Sign Up</button>
      </div>
      <button id="closeAuthModal" style="width:100%;">Cancel</button>
      <p style="font-size:0.8rem; color:var(--text-secondary); margin-top:12px;">Email verification enabled</p>
    </div>
  </div>

  <!-- Create Post Modal -->
  <div id="createPostModal" class="modal hidden">
    <div class="modal-content">
      <h3>New anonymous post</h3>
      <select id="postType">
        <option value="confession">Confession</option>
        <option value="advice">Advice</option>
      </select>
      <input id="postTitle" placeholder="Title" maxlength="100">
      <textarea id="postContent" placeholder="Your story..."></textarea>
      <input id="postTags" placeholder="tags: cheating, breakup (comma separated)">
      <div class="flex-row" style="justify-content: flex-end;">
        <button id="cancelPost">Cancel</button>
        <button id="publishPost" class="primary">Publish anonymously</button>
      </div>
    </div>
  </div>

  <script>
    // ---- Global State ----
    let currentUser = null;
    let currentTab = 'home';
    let postsCache = [];
    
    // Anonymous name generator
    function generateAnonName() {
      const prefix = ['Heart', 'Confess', 'Shadow', 'Mystic', 'Hidden'];
      const num = Math.floor(1000 + Math.random() * 9000);
      return `${prefix[Math.floor(Math.random()*prefix.length)]}_${num}`;
    }

    // UI Helpers
    function showElement(id) { document.getElementById(id)?.classList.remove('hidden'); }
    function hideElement(id) { document.getElementById(id)?.classList.add('hidden'); }
    
    function updateAuthUI() {
      if (currentUser) {
        hideElement('authButtons');
        showElement('userInfo');
        document.getElementById('anonNameDisplay').innerText = currentUser.anonymous_name || 'You';
        showElement('createFloatingBtn');
      } else {
        showElement('authButtons');
        hideElement('userInfo');
        hideElement('createFloatingBtn');
      }
    }

    // Auth functions
    async function signUp(email, password) {
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) { alert(error.message); return null; }
      if (data.user) {
        // create profile with anonymous name
        const anonName = generateAnonName();
        await supabase.from('users').upsert({ id: data.user.id, email: email, anonymous_name: anonName });
        alert('Sign up successful! Check email for verification.');
        return data.user;
      }
    }

    async function login(email, password) {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) { alert(error.message); return null; }
      return data.user;
    }

    async function fetchUserProfile(userId) {
      const { data } = await supabase.from('users').select('*').eq('id', userId).single();
      return data;
    }

    async function loadSession() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        const profile = await fetchUserProfile(session.user.id);
        currentUser = { ...session.user, anonymous_name: profile?.anonymous_name || generateAnonName() };
      } else {
        currentUser = null;
      }
      updateAuthUI();
      loadFeed(currentTab);
    }

    // Fetch posts based on tab
    async function fetchPosts(tab) {
      let query = supabase.from('posts').select('*, users(anonymous_name)').order('created_at', { ascending: false }).limit(20);
      if (tab === 'confessions') query = query.eq('type', 'confession');
      else if (tab === 'advice') query = query.eq('type', 'advice');
      else if (tab === 'trending') {
        // mock trending: most reactions/comments (simplified)
        query = supabase.from('posts').select('*, users(anonymous_name)').order('created_at', { ascending: false }).limit(15);
      }
      const { data } = await query;
      return data || [];
    }

    async function loadFeed(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tab}"]`)?.classList.add('active');
      const posts = await fetchPosts(tab);
      postsCache = posts;
      renderFeed(posts);
    }

    function renderFeed(posts) {
      const container = document.getElementById('feedContainer');
      if (!posts.length) {
        container.innerHTML = '<p style="color:gray; text-align:center; padding:40px;">No confessions yet. Be the first 💔</p>';
        return;
      }
      container.innerHTML = posts.map(post => renderPostCard(post)).join('');
      
      // Attach event listeners for reaction/vote buttons
      document.querySelectorAll('.reaction-btn').forEach(btn => {
        btn.addEventListener('click', (e) => handleReaction(e));
      });
      document.querySelectorAll('.vote-btn').forEach(btn => {
        btn.addEventListener('click', (e) => handleVote(e));
      });
    }

    function renderPostCard(post) {
      const isGuest = !currentUser;
      const anonName = post.users?.anonymous_name || 'Anonymous';
      const previewLength = 120;
      let contentDisplay = post.content;
      let paywallHtml = '';
      
      if (isGuest) {
        const truncated = post.content.substring(0, previewLength) + '...';
        contentDisplay = `<span>${truncated}</span><div class="blurred-text">${post.content.substring(previewLength)}</div>`;
        paywallHtml = `
          <div class="paywall-overlay">
            <span>🔒 Sign up to read full confession</span>
            <button class="primary" onclick="document.getElementById('loginBtn').click()">Unlock 💔</button>
          </div>`;
      }

      return `
        <div class="card" data-post-id="${post.id}">
          <div style="display:flex; justify-content:space-between;">
            <span style="color:#ff8fa3;">${anonName}</span>
            <span style="color:gray; font-size:0.8rem;">${new Date(post.created_at).toLocaleDateString()}</span>
          </div>
          <div class="post-title">${post.title || 'Untitled'}</div>
          <div class="preview-text">${contentDisplay}</div>
          ${paywallHtml}
          <div class="reaction-row">
            <span class="reaction-btn" data-type="🔥">🔥 0</span>
            <span class="reaction-btn" data-type="😂">😂 0</span>
            <span class="reaction-btn" data-type="😢">😢 0</span>
            <span class="reaction-btn" data-type="😡">😡 0</span>
          </div>
          ${post.type === 'advice' ? '<div class="vote-section"><span>Who is right?</span><button class="vote-btn" data-vote="A">❤️ Side A</button><button class="vote-btn" data-vote="B">💔 Side B</button></div>' : ''}
          <div style="color:gray; font-size:0.8rem;">💬 0 comments</div>
        </div>`;
    }

    function handleReaction(e) {
      if (!currentUser) { alert('Login to react'); return; }
      // Placeholder: would insert into reactions table
      alert('Reaction recorded (demo)');
    }

    function handleVote(e) {
      if (!currentUser) { alert('Login to vote'); return; }
      alert('Vote recorded (demo)');
    }

    // Event Listeners
    document.getElementById('loginBtn').addEventListener('click', () => {
      document.getElementById('authModal').classList.remove('hidden');
    });
    document.getElementById('signupBtn').addEventListener('click', () => {
      document.getElementById('authModal').classList.remove('hidden');
    });
    document.getElementById('closeAuthModal').addEventListener('click', () => {
      document.getElementById('authModal').classList.add('hidden');
    });
    document.getElementById('submitSignup').addEventListener('click', async () => {
      const email = document.getElementById('authEmail').value;
      const password = document.getElementById('authPassword').value;
      if (email && password) {
        await signUp(email, password);
        document.getElementById('authModal').classList.add('hidden');
        loadSession();
      }
    });
    document.getElementById('submitLogin').addEventListener('click', async () => {
      const email = document.getElementById('authEmail').value;
      const password = document.getElementById('authPassword').value;
      if (email && password) {
        await login(email, password);
        document.getElementById('authModal').classList.add('hidden');
        loadSession();
      }
    });
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      currentUser = null;
      updateAuthUI();
      loadFeed('home');
    });

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        const tabName = e.target.dataset.tab;
        if (tabName) loadFeed(tabName);
      });
    });

    // Create post modal
    document.getElementById('createFloatingBtn').addEventListener('click', () => {
      if (!currentUser) { alert('Login required'); return; }
      document.getElementById('createPostModal').classList.remove('hidden');
    });
    document.getElementById('cancelPost').addEventListener('click', () => {
      document.getElementById('createPostModal').classList.add('hidden');
    });
    document.getElementById('publishPost').addEventListener('click', async () => {
      if (!currentUser) return;
      const title = document.getElementById('postTitle').value;
      const content = document.getElementById('postContent').value;
      const type = document.getElementById('postType').value;
      const tagsStr = document.getElementById('postTags').value;
      const tags = tagsStr.split(',').map(t => t.trim()).filter(Boolean);
      if (!title || !content) { alert('Title and content required'); return; }
      
      const { error } = await supabase.from('posts').insert({
        user_id: currentUser.id,
        title,
        content,
        type,
        tags
      });
      if (error) alert(error.message);
      else {
        document.getElementById('createPostModal').classList.add('hidden');
        document.getElementById('postTitle').value = '';
        document.getElementById('postContent').value = '';
        document.getElementById('postTags').value = '';
        loadFeed(currentTab);
      }
    });

    // Initialize
    window.addEventListener('load', () => {
      loadSession();
      // Set up auth state listener
      supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
          loadSession();
        } else if (event === 'SIGNED_OUT') {
          currentUser = null;
          updateAuthUI();
          loadFeed('home');
        }
      });
    });
  </script>
</body>
</html>
