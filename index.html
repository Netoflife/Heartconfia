<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>HeartConfia — Anonymous Relationship Confessions</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;--s3:#22223a;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --tx:#f0eef8;--tx2:#9a96b4;--tx3:#5e5a78;
  --rose:#ff4d6d;--rdim:rgba(255,77,109,0.15);--rglow:rgba(255,77,109,0.3);
  --violet:#7c3aed;--vdim:rgba(124,58,237,0.15);
  --amber:#f59e0b;--teal:#14b8a6;
  --r:16px;--fd:'Playfair Display',serif;--fb:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);min-height:100vh;overflow-x:hidden}
#root{min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes hb{0%,100%{transform:scale(1)}15%{transform:scale(1.28)}30%{transform:scale(1)}45%{transform:scale(1.12)}60%{transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes popIn{0%{transform:scale(0.87);opacity:0}70%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
@keyframes pulseR{0%,100%{color:var(--rose)}50%{color:#c9184a}}
.fu{animation:fadeUp .4s ease both}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.bp{background:linear-gradient(135deg,var(--rose),#c9184a);color:#fff;box-shadow:0 4px 18px var(--rglow)}
.bp:hover{transform:translateY(-1px);box-shadow:0 6px 26px rgba(255,77,109,.45)}
.bs{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.bs:hover{background:var(--s3);border-color:var(--bd2)}
.bg{background:transparent;color:var(--tx2);padding:8px 14px}
.bg:hover{color:var(--tx);background:var(--s2)}
.bv{background:linear-gradient(135deg,var(--violet),#5b21b6);color:#fff;box-shadow:0 4px 18px rgba(124,58,237,.3)}
.bt{background:linear-gradient(135deg,var(--teal),#0d9488);color:#fff}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.inp{width:100%;padding:12px 16px;background:var(--s2);border:1px solid var(--bd);border-radius:12px;color:var(--tx);font-family:var(--fb);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(255,77,109,.12)}
.inp::placeholder{color:var(--tx3)}
textarea.inp{resize:vertical;min-height:120px;line-height:1.65}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:20px;transition:border-color .2s,box-shadow .2s}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.tc{background:rgba(239,68,68,.12);color:#ef4444}
.tb{background:var(--rdim);color:var(--rose)}
.td{background:var(--vdim);color:#a78bfa}
.tm{background:rgba(20,184,166,.12);color:var(--teal)}
.ts{background:rgba(245,158,11,.12);color:var(--amber)}

.nlogo{font-family:var(--fd);font-size:20px;font-weight:900;color:var(--rose);cursor:pointer;flex-shrink:0;user-select:none;animation:hb 3.5s ease-in-out infinite;display:inline-block}

.ntab{padding:6px 13px;border-radius:50px;font-size:13px;font-weight:500;cursor:pointer;color:var(--tx2);transition:all .2s;border:none;background:transparent;white-space:nowrap;font-family:var(--fb)}
.ntab:hover{color:var(--tx);background:var(--s2)}

.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.bbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--teal);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.cact{display:flex;gap:12px;margin-top:8px}

.cactb:hover,.cactb.on{color:var(--rose)}
.sh{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.st{font-family:var(--fd);font-size:22px;font-weight:700;color:var(--tx)}
.sbadge{padding:3px 10px;border-radius:50px;background:var(--rdim);color:var(--rose);font-size:12px;font-weight:700}

.pills::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;border-radius:50px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--tx2);transition:all .2s;white-space:nowrap;font-family:var(--fb)}

.cpbar{background:linear-gradient(135deg,rgba(255,77,109,.07),rgba(124,58,237,.05));border:1px solid rgba(255,77,109,.15);border-radius:var(--r);padding:16px 20px;margin-bottom:20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.cpbar:hover{border-color:rgba(255,77,109,.3)}
.hero{text-align:center;padding:40px 0 32px;position:relative}
.hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(255,77,109,.1),transparent 70%);pointer-events:none}
.hey{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--rose);margin-bottom:12px}
.htitle{font-family:var(--fd);font-size:clamp(34px,9vw,56px);font-weight:900;line-height:1.08;background:linear-gradient(140deg,var(--tx) 35%,var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
.hsub{font-size:15px;color:var(--tx2);max-width:360px;margin:0 auto 26px;line-height:1.65}

.statb{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:16px;text-align:center}
.statn{font-family:var(--fd);font-size:28px;font-weight:900;color:var(--tx)}
.statl{font-size:12px;color:var(--tx3);margin-top:4px}
.bdrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.bdc{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:50px;background:var(--s2);border:1px solid var(--bd);font-size:13px;font-weight:600;color:var(--tx2)}
.trn{font-family:var(--fd);font-size:34px;font-weight:900;color:var(--bd);line-height:1;min-width:42px}
.trn.top{color:rgba(255,77,109,.22)}
.bkbtn{display:inline-flex;align-items:center;gap:7px;color:var(--tx2);font-size:14px;font-weight:500;cursor:pointer;background:none;border:none;padding:8px 0;margin-bottom:20px;transition:color .2s;font-family:var(--fb)}
.bkbtn:hover{color:var(--tx)}
.div{height:1px;background:var(--bd);margin:24px 0}
.err{color:var(--rose);font-size:13px;margin-top:4px}

.spin{width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--rose);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

.toast{padding:13px 18px;border-radius:12px;background:var(--s2);border:1px solid var(--bd);font-size:14px;color:var(--tx);box-shadow:0 8px 30px rgba(0,0,0,.35);animation:fadeUp .3s ease;display:flex;align-items:center;gap:10px;min-width:220px}
.toast.suc{border-color:rgba(20,184,166,.4)}.toast.er{border-color:rgba(255,77,109,.4)}
.cnote{background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:14px 16px;margin-bottom:20px;font-size:13px;color:var(--amber);line-height:1.6}
.cnote code{background:rgba(245,158,11,.15);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:12px}
.notifwrap{position:relative}
.nbtn{background:var(--s2);border:1px solid var(--bd);border-radius:50%;width:36px;height:36px;cursor:pointer;color:var(--tx2);font-size:15px;display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s}
.nbtn:hover{background:var(--s3);color:var(--tx)}

    if(loaded>=scripts.length){bootApp();return;}

  }
  next();
})();

<script>
function bootApp(){
  try{
    /* ─── CONFIG ─────────────────────────────────────────────── */
    var SUPABASE_URL  = 'https://rihritdkzvmqoeckleud.supabase.co';
    /* ⚠️  Paste your ANON (public) key below — NOT the service role key.
       Find it: Supabase Dashboard → Settings → API → anon / public key     */
    var SUPABASE_KEY  = 'PASTE_YOUR_ANON_KEY_HERE';
    var ADMIN_EMAIL   = 'netlifesocaial@gmail.com';
    var HOT_TTL       = 48*3600*1000;

    var IS_CFG = SUPABASE_KEY !== 'PASTE_YOUR_ANON_KEY_HERE';
    var sb = IS_CFG ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

    /* ─── UTILS ─────────────────────────────────────────────── */
    var {useState,useEffect,useRef,useCallback,Component} = React;
    var h = React.createElement;

    function ago(iso){
      var s=(Date.now()-new Date(iso).getTime())/1000;
      if(s<60) return 'just now';
      if(s<3600) return Math.floor(s/60)+'m ago';
      if(s<86400) return Math.floor(s/3600)+'h ago';
      return Math.floor(s/86400)+'d ago';
    }
    function makeName(){
      var p=['Heart','Confess','Soul','Echo','Ache','Muse','Pulse','Veil'];
      return p[Math.floor(Math.random()*p.length)]+'_'+Math.floor(1000+Math.random()*9000);
    }
    function feedScore(p){
      var rx=Object.values(p.reaction_counts||{}).reduce(function(a,v){return a+v},0);
      var eng=rx+(p.comment_count||0)*2.5+((p.vote_a||0)+(p.vote_b||0))*1.5;
      var age=(Date.now()-new Date(p.created_at).getTime())/3600000;
      return eng/Math.pow(age+2,1.8);
    }
    function controversyScore(p){
      var tot=(p.vote_a||0)+(p.vote_b||0);
      if(tot<5) return 0;
      return Math.pow(tot,1.5)/(Math.abs((p.vote_a||0)-(p.vote_b||0))+1);
    }
    function hotLeft(created){
      var rem=new Date(created).getTime()+HOT_TTL-Date.now();
      if(rem<=0) return null;
      return Math.floor(rem/3600000)+'h '+Math.floor((rem%3600000)/60000)+'m';
    }
    function getStreak(){
      try{return JSON.parse(localStorage.getItem('hc_sk')||'{"count":0,"last":""}');}
      catch(e){return{count:0,last:''};}
    }
    function bumpStreak(){

        p.addToast('Account deleted. Take care of yourself. 💔','info');
        setTimeout(function(){window.location.reload();},1500);
      }

      return h('div',{className:'fu'},
        h('button',{className:'bkbtn',onClick:p.onBack},'← Back'),
        h('div',{style:{textAlign:'center',marginBottom:28}},
          h('div',{style:{width:64,height:64,borderRadius:'50%',background:'linear-gradient(135deg,var(--rose),var(--violet))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,fontWeight:700,color:'#fff',margin:'0 auto 12px'}},p.user.anonymous_name.charAt(0)),
          h('div',{style:{fontFamily:'var(--fd)',fontSize:22,fontWeight:700}},p.user.anonymous_name),
          h('div',{style:{fontSize:13,color:'var(--tx3)',marginTop:4}},p.user.email)),
        h('div',{className:'statg'},
          h('div',{className:'statb'},h('div',{className:'statn'},karma.toLocaleString()),h('div',{className:'statl'},'💜 Karma')),
          h('div',{className:'statb'},h('div',{className:'statn'},streak.count),h('div',{className:'statl'},'🔥 Streak')),
          h('div',{className:'statb'},h('div',{className:'statn'},myPosts.length),h('div',{className:'statl'},'📝 Posts'))),
        badges.length>0&&h('div',{style:{marginBottom:24}},
          h('div',{style:{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx3)',marginBottom:12}},'Badges earned'),
          h('div',{className:'bdrow'},badges.map(function(b){return h('div',{key:b.l,className:'bdc'},b.i+' '+b.l);}))),
        myPosts.length>0&&h('div',{style:{marginBottom:24}},
          h('div',{className:'sh'},h('span',{className:'st',style:{fontSize:18}},'My Confessions')),
          myPosts.map(function(mp){return h('div',{key:mp.id,className:'card',style:{marginBottom:10}},
            h('div',{style:{fontFamily:'var(--fd)',fontSize:15,fontWeight:700,marginBottom:6}},mp.title),
            h('div',{className:'pmeta'},h('span',null,ago(mp.created_at)),h('span',{className:'pdot'}),h('span',null,'💬 '+(mp.comment_count||0)),h('span',{className:'pdot'}),h('span',null,'🔥 '+Object.values(mp.reaction_counts||{}).reduce(function(a,v){return a+v;},0))));})),
        h('div',{className:'div'}),
        !showDel
          ?h('button',{className:'btn bs',style:{color:'#ef4444',borderColor:'rgba(239,68,68,.3)'},onClick:function(){setShowDel(true);}},'🗑 Delete account & data (GDPR)')
          :h('div',{className:'card',style:{borderColor:'rgba(239,68,68,.25)'}},
            h('p',{style:{fontSize:14,color:'var(--tx2)',marginBottom:12}},'This permanently deletes your account and all data. Type DELETE to confirm.'),
            h('input',{className:'inp',placeholder:'Type DELETE',value:delC,onChange:function(e){setDelC(e.target.value);},style:{marginBottom:10}}),
            h('div',{style:{display:'flex',gap:10}},
              h('button',{className:'btn',style:{background:'linear-gradient(135deg,#ef4444,#dc2626)',color:'#fff'},onClick:delAcc,disabled:delC!=='DELETE'},'Confirm delete'),
              h('button',{className:'btn bg',onClick:function(){setShowDel(false);setDelC('');}}))));
    }

    /* ─── ADMIN ──────────────────────────────────────────────── */
    function AdminPanel(p){
      var rs=useState([]);var reports=rs[0];var setReports=rs[1];
      var ld=useState(true);var loading=ld[0];var setLoading=ld[1];

      useEffect(function(){
        if(!sb) return;
        sb.from('reports').select('*,posts(title),comments(content)').order('created_at',{ascending:false})
          .then(function(r){if(r.data)setReports(r.data);setLoading(false);});
      },[]);

      async function dismiss(id){
        setReports(function(prev){return prev.filter(function(r){return r.id!==id;});});
        if(sb) await sb.from('reports').delete().eq('id',id);
        p.addToast('Report dismissed','success');
      }
      async function remove(report){
        if(sb){
          if(report.post_id) await sb.from('posts').delete().eq('id',report.post_id);
          if(report.comment_id) await sb.from('comments').delete().eq('id',report.comment_id);
          await sb.from('reports').delete().eq('id',report.id);
        }
        setReports(function(prev){return prev.filter(function(r){return r.id!==report.id;});});
        p.addToast('Content removed','success');
      }

      return h('div',{className:'fu'},
        h('div',{style:{marginBottom:24}},
          h('h1',{style:{fontFamily:'var(--fd)',fontSize:28,fontWeight:900}},'🛡 Admin Panel'),
          h('p',{style:{color:'var(--tx2)',fontSize:14}},'Moderation queue · '+reports.length+' open reports')),
        loading?h('div',{style:{display:'flex',justifyContent:'center',padding:40}},h('span',{className:'spin',style:{width:32,height:32}}))
          :reports.length===0?h('div',{className:'empty'},h('div',{className:'empi'},'✅'),h('div',{className:'empt'},'Queue clear'),h('p',null,'No pending reports.'))
          :reports.map(function(r){
            return h('div',{key:r.id,className:'adm'},
              h('div',{style:{flex:1}},
                h('div',{style:{fontSize:12,color:'var(--rose)',fontWeight:700,marginBottom:6,textTransform:'uppercase'}},r.reason),
                h('p',{style:{fontSize:14,color:'var(--tx2)',marginBottom:6}},(r.posts&&r.posts.title)||(r.comments&&r.comments.content)||'Content unavailable'),
                h('div',{style:{fontSize:12,color:'var(--tx3)'}},(ago(r.created_at)))),
              h('div',{style:{display:'flex',gap:8,flexShrink:0,flexDirection:'column'}},
                h('button',{className:'btn bs',style:{padding:'6px 12px',fontSize:12},onClick:function(){dismiss(r.id);}},'Dismiss'),
                h('button',{className:'btn',style:{background:'linear-gradient(135deg,#ef4444,#dc2626)',color:'#fff',padding:'6px 12px',fontSize:12},onClick:function(){remove(r);}},'Remove')));
          }));
    }

    /* ─── APP ────────────────────────────────────────────────── */
    function App(){
      var us=useState(null);var user=us[0];var setUser=us[1];
      var pg=useState('home');var page=pg[0];var setPage=pg[1];
      var ps=useState(DPOSTS);var posts=ps[0];var setPosts=ps[1];
      var ac=useState(null);var active=ac[0];var setActive=ac[1];
      var tf=useState('all');var tagFilter=tf[0];var setTagFilter=tf[1];
      var au=useState(null);var auth=au[0];var setAuth=au[1];
      var to=useState([]);var toasts=to[0];var setToasts=to[1];
      var ld=useState(false);var loading=ld[0];var setLoading=ld[1];
      var sp=useState(false);var showPro=sp[0];var setShowPro=sp[1];

      function addToast(msg,type){
        var id=Date.now();
        setToasts(function(p){return p.concat([{id:id,msg:msg,type:type||'info'}]);});
        setTimeout(function(){setToasts(function(p){return p.filter(function(t){return t.id!==id;});});},3600);
      }

      useEffect(function(){
        if(!sb) return;
        sb.auth.getSession().then(function(r){
          if(r.data.session&&r.data.session.user)
            sb.from('users').select('*').eq('id',r.data.session.user.id).single()
              .then(function(pr){if(pr.data)setUser(Object.assign({},r.data.session.user,{anonymous_name:pr.data.anonymous_name}));});
        });
        sb.auth.onAuthStateChange(function(ev){if(ev==='SIGNED_OUT')setUser(null);});
      },[]);

      useEffect(function(){
        if(!sb) return;
        setLoading(true);
        sb.from('posts').select('*,users(anonymous_name)').order('created_at',{ascending:false}).limit(60)
          .then(function(r){
            if(r.data&&r.data.length)
              setPosts(r.data.map(function(p){return Object.assign({},p,{anonymous_name:p.users&&p.users.anonymous_name});
            }));
            setLoading(false);
          });
      },[]);

      useEffect(function(){
        if(!sb) return;
        var ch=sb.channel('feed-rt')
          .on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},async function(pl){
            var u=await sb.from('users').select('anonymous_name').eq('id',pl.new.user_id).single();
            setPosts(function(prev){return [Object.assign({},pl.new,{anonymous_name:u.data&&u.data.anonymous_name,reaction_counts:{},comment_count:0,vote_a:0,vote_b:0})].concat(prev);});
          }).subscribe();
        return function(){sb.removeChannel(ch);};
      },[]);

      function handleAuth(u){setUser(u);setAuth(null);bumpStreak();addToast('Welcome, @'+u.anonymous_name+'! 💔','success');}
      function logout(){if(sb)sb.auth.signOut();setUser(null);setPage('home');addToast('Logged out. Your secrets are safe.','info');}
      function openPost(post){setActive(post);setPage('detail');window.scrollTo({top:0,behavior:'smooth'});}
      function newPost(post){setPosts(function(p){return [post].concat(p);});setPage('home');}
      function needAuth(mode){setAuth(mode||'signup');}

      function getFeed(){
        var f=page==='confessions'?posts.filter(function(p){return p.type==='confession';})
              :page==='advice'?posts.filter(function(p){return p.type==='advice';})
              :posts;
        if(tagFilter!=='all') f=f.filter(function(p){return (p.tags||[]).includes(tagFilter);});
        var boosted=f.filter(function(p){return p.boosted;});
        var rest=[].concat(f.filter(function(p){return !p.boosted;})).sort(function(a,b){return feedScore(b)-feedScore(a);});
        return boosted.concat(rest);
      }

      var feed=getFeed();
      var isFeed=['home','confessions','advice'].includes(page);
      var titles={home:'Latest Stories',confessions:'Confessions',advice:'Seeking Advice'};
      var isAdmin=user&&user.email===ADMIN_EMAIL;
      var navTabs=[{id:'home',l:'Home'},{id:'confessions',l:'Confessions'},{id:'advice',l:'Advice'},{id:'trending',l:'🔥 Trending'},{id:'profile',l:'👤 Profile'}];
      if(isAdmin) navTabs.push({id:'admin',l:'🛡 Admin'});
      var streak=getStreak();

      return h('div',null,
        /* NAV */
        h('nav',{className:'nav'},
          h('div',{className:'nlogo',onClick:function(){setPage('home');setActive(null);}},'💔 HeartConfia'),
          h('div',{className:'ntabs'},navTabs.map(function(t){
            return h('button',{key:t.id,className:'ntab '+(page===t.id?'on':''),onClick:function(){setPage(t.id);setActive(null);}},t.l);
          })),
          h('div',{style:{display:'flex',alignItems:'center',gap:8,flexShrink:0}},
            user&&streak.count>0&&h('div',{className:'streakc',onClick:function(){setPage('profile');},title:'Your posting streak'},'🔥'+streak.count),
            user&&h(NotifBell,{user:user}),
            user?h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
              h('button',{className:'btn bp',style:{padding:'7px 12px',fontSize:13},onClick:function(){setPage('create');}},'+ Post'),
              h('button',{className:'btn bg',style:{fontSize:12,padding:'6px 10px'},onClick:logout},'Out'))
            :h('div',{style:{display:'flex',gap:6}},
              h('button',{className:'btn bg',style:{fontSize:12},onClick:function(){setAuth('login');}},'Login'),
              h('button',{className:'btn bp',style:{padding:'7px 12px',fontSize:13},onClick:function(){setAuth('signup');}},'Join free')))),

        /* LAYOUT */
        h('div',{className:'lay'},h('div',{className:'lc'},

          /* Config notice */
          !IS_CFG&&isFeed&&h('div',{className:'cnote'},
            h('strong',null,'⚙️ Action needed:'),
            ' Go to your Supabase dashboard → Settings → API and copy the ',
            h('code',null,'anon / public'),
            ' key. Replace ',h('code',null,'PASTE_YOUR_ANON_KEY_HERE'),' at the top of this file.',
            h('br',null),
            h('span',{style:{color:'rgba(245,158,11,.7)',fontSize:11}},'⚠️ Never use the service_role key in browser code — it bypasses all security.')),

          /* Detail */
          page==='detail'&&active&&h(PostDetail,{post:active,user:user,onBack:function(){setPage('home');setActive(null);},onNeedAuth:needAuth}),

          /* Feed */
          isFeed&&h('div',null,
            page==='home'&&h('div',{className:'hero'},
              h('div',{className:'hey'},'anonymous · safe · real'),
              h('h1',{className:'htitle'},'HeartConfia'),
              h('p',{className:'hsub'},'Share the stories you\'ve never told anyone. No names. No judgment. Just hearts.'),
              user?h('div',{style:{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}},
                h('button',{className:'btn bp',onClick:function(){setPage('create');}},'💔 Share your confession'),
                h('button',{className:'btn bs',onClick:function(){setShowPro(true);}},'💎 Go Pro'))
                :h('div',{style:{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}},
                  h('button',{className:'btn bp',onClick:function(){setAuth('signup');}},'Join anonymously'),
                  h('button',{className:'btn bs',onClick:function(){setAuth('login');}},'Log in'))),
            page!=='home'&&h('div',{className:'sh'},
              h('h2',{className:'st'},titles[page]),h('span',{className:'sbadge'},feed.length)),
            h('div',{className:'pills'},['all'].concat(TAGS).map(function(t){
              return h('button',{key:t,className:'pill '+(tagFilter===t?'on':''),onClick:function(){setTagFilter(t);}},t==='all'?'All stories':t);
            })),
            user&&h('div',{className:'cpbar',onClick:function(){setPage('create');}},
              h('div',{className:'ava'},user.anonymous_name.charAt(0)),
              h('span',{style:{fontSize:14,color:'var(--tx3)'}},'Something\'s weighing on you. Share it as @'+user.anonymous_name+'…')),
            loading?h('div',{style:{display:'flex',justifyContent:'center',padding:'60px 0'}},h('span',{className:'spin',style:{width:36,height:36}}))
              :feed.length===0?h('div',{className:'empty'},h('div',{className:'empi'},'🕊️'),h('div',{className:'empt'},'Nothing here yet'),h('p',null,'Be the first to share.'))
              :feed.map(function(post,i){return h(PostCard,{key:post.id,post:post,user:user,onClick:function(){openPost(post);},onNeedAuth:needAuth,delay:Math.min(i*.05,.3)});})),

          /* Trending */
          page==='trending'&&h(TrendingPage,{posts:posts,user:user,onOpen:openPost,onNeedAuth:needAuth}),

          /* Create */
          page==='create'&&(user
            ?h(CreatePost,{user:user,onBack:function(){setPage('home');},onPost:newPost,addToast:addToast})
            :h('div',{style:{textAlign:'center',padding:'80px 20px'}},
              h('div',{style:{fontSize:46,marginBottom:14}},'🔒'),
              h('div',{className:'st'},'Sign in to share your confession'),
              h('div',{style:{marginTop:20,display:'flex',gap:12,justifyContent:'center'}},
                h('button',{className:'btn bp',onClick:function(){setAuth('signup');}},'Sign up free'),
                h('button',{className:'btn bs',onClick:function(){setAuth('login');}},'Log in')))),

          /* Profile */
          page==='profile'&&h(ProfilePage,{user:user,posts:posts,onBack:function(){setPage('home');},addToast:addToast,onNeedAuth:needAuth}),

          /* Admin */
          page==='admin'&&isAdmin&&h(AdminPanel,{user:user,addToast:addToast}))),

        /* Modals & Toasts */
        auth&&h(AuthModal,{initMode:auth,onClose:function(){setAuth(null);},onAuth:handleAuth}),
        showPro&&h(ProModal,{onClose:function(){setShowPro(false);}}),
        h(Toasts,{items:toasts}));
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
  } catch(e) {
    document.getElementById('root').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;padding:20px;text-align:center">'
      +'<div style="font-size:48px">💔</div>'
      +'<div style="font-family:Georgia,serif;font-size:22px;color:#f0eef8">Something went wrong</div>'
      +'<p style="color:#9a96b4;font-size:14px;max-width:400px">'+e.message+'</p>'
      +'<button onclick="location.reload()" style="background:linear-gradient(135deg,#ff4d6d,#c9184a);color:#fff;border:none;border-radius:50px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px">Reload</button>'
      +'</div>';
    console.error('HeartConfia boot error:',e);
  }
}
</script>
