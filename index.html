<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HeartConfia 💔</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--c1:#0f0f18;--c2:#161622;--c3:#1e1e30;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --t1:#f0eeff;--t2:#9d99b8;--t3:#5a566f;
  --rose:#ff3d5a;--rdim:rgba(255,61,90,.14);
  --vio:#8b5cf6;--amb:#f59e0b;--tel:#10b981;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{background:var(--bg);color:var(--t1);font-family:var(--font);min-height:100vh;overflow-x:hidden}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes in{from{opacity:0}to{opacity:1}}
@keyframes hb{0%,100%{transform:scale(1)}20%{transform:scale(1.3)}40%{transform:scale(1)}}
@keyframes tk{to{transform:translateX(-50%)}}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.spin{width:26px;height:26px;border:2px solid rgba(255,61,90,.25);border-top-color:var(--rose);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;height:54px;background:rgba(7,7,13,.97);border-bottom:1px solid var(–b1);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:100}
#logo{font-size:20px;font-weight:800;color:var(–rose);cursor:pointer;flex-shrink:0;animation:hb 4s ease-in-out infinite;display:inline-block}
#tabs{display:flex;gap:2px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch}
#tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 12px;border-radius:50px;font-size:13px;font-weight:500;cursor:pointer;color:var(–t2);border:none;background:transparent;white-space:nowrap;font-family:var(–font);-webkit-tap-highlight-color:transparent}
.tab.on{color:var(–rose);background:var(–rdim);font-weight:600}
#nav-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* TICKER */
#ticker{position:fixed;top:54px;left:0;right:0;height:28px;background:rgba(255,61,90,.07);border-bottom:1px solid rgba(255,61,90,.12);overflow:hidden;display:flex;align-items:center;z-index:99}
#tick-inner{display:inline-flex;animation:tk 45s linear infinite;white-space:nowrap}
.ti{font-size:11px;color:var(–t2);padding:0 20px;display:inline-flex;align-items:center;gap:7px}
.td{width:5px;height:5px;border-radius:50%;background:var(–rose);animation:bl 1.2s ease infinite;flex-shrink:0}

/* MAIN */
#app{max-width:680px;margin:0 auto;padding:82px 12px 90px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:50px;font-family:var(–font);font-size:14px;font-weight:600;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.btn:active{opacity:.75}
.btn:disabled{opacity:.4;pointer-events:none}
.bp{background:linear-gradient(135deg,#ff3d5a,#c9184a);color:#fff;box-shadow:0 4px 16px rgba(255,61,90,.3)}
.bs{background:var(–c2);color:var(–t1);border:1px solid var(–b2)}
.bg{background:transparent;color:var(–t2)}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-full{width:100%;padding:13px}

/* INPUTS */
.inp{width:100%;padding:12px 14px;background:var(–c2);border:1px solid var(–b1);border-radius:12px;color:var(–t1);font-family:var(–font);font-size:15px;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(–rose)}
.inp::placeholder{color:var(–t3)}
textarea.inp{resize:vertical;min-height:100px;line-height:1.65}

/* CARDS */
.card{background:var(–c1);border:1px solid var(–b1);border-radius:18px;padding:17px;margin-bottom:12px;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden}
.card.clickable{cursor:pointer}
.card.clickable:active{opacity:.85}

/* POST TYPES */
.ptype{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em}
.ptype-confession{color:var(–rose)}
.ptype-advice{color:#a78bfa}
.ptype-hot_take{color:var(–amb)}
.ptitle{font-size:17px;font-weight:700;line-height:1.35;color:var(–t1);margin:7px 0}
.pmeta{font-size:12px;color:var(–t3);margin-bottom:11px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pname{color:var(–t2);font-weight:600}
.pbody{font-size:14px;line-height:1.7;color:var(–t2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;margin-bottom:12px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:50px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.b-hot{background:rgba(245,158,11,.14);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.b-sad{background:rgba(99,102,241,.14);color:#818cf8;border:1px solid rgba(99,102,241,.28)}
.b-trnd{background:var(–rdim);color:var(–rose);border:1px solid rgba(255,61,90,.25)}
.b-dbt{background:rgba(139,92,246,.14);color:#a78bfa;border:1px solid rgba(139,92,246,.28)}
.b-toxic{background:rgba(239,68,68,.14);color:#f87171;border:1px solid rgba(239,68,68,.28)}

/* TAGS */
.tag{display:inline-flex;padding:2px 8px;border-radius:50px;font-size:10px;font-weight:700;text-transform:uppercase}
.t-cheating{background:rgba(239,68,68,.12);color:#f87171}
.t-breakup{background:var(–rdim);color:var(–rose)}
.t-dating{background:rgba(139,92,246,.14);color:#a78bfa}
.t-marriage{background:rgba(16,185,129,.12);color:#10b981}
.t-situationship{background:rgba(245,158,11,.12);color:#f59e0b}

/* REACTIONS */
.rx-row{display:flex;gap:5px;flex-wrap:wrap}
.rxb{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:50px;background:var(–c2);border:1px solid var(–b1);cursor:pointer;font-size:13px;font-weight:600;color:var(–t2);font-family:var(–font);-webkit-tap-highlight-color:transparent}
.rxb.on{background:var(–rdim);border-color:rgba(255,61,90,.4);color:var(–rose)}
.rxb:active{opacity:.7}
.eng-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;background:var(–c2);border-radius:10px;margin-top:10px;font-size:13px;color:var(–t2);font-weight:500}

/* WIW */
.wiw{background:linear-gradient(135deg,rgba(255,61,90,.06),rgba(139,92,246,.06));border:1px solid rgba(255,61,90,.18);border-radius:14px;padding:15px;margin:12px 0}
.wiw-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(–t3);margin-bottom:11px}
.wiw-opts{display:flex;gap:7px;margin-bottom:11px}
.wb{flex:1;padding:11px 6px;border-radius:11px;border:2px solid var(–b2);background:var(–c2);cursor:pointer;text-align:center;font-family:var(–font);font-weight:700;font-size:12px;color:var(–t2);-webkit-tap-highlight-color:transparent}
.wb:active{opacity:.7}
.wb-he{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.12);color:#f87171}
.wb-she{border-color:rgba(139,92,246,.5);background:rgba(139,92,246,.12);color:#a78bfa}
.wb-both{border-color:rgba(156,163,175,.4);background:rgba(156,163,175,.1);color:#d1d5db}
.wi{font-size:16px;display:block;margin-bottom:3px}
.wbar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.wbar-lbl{width:60px;font-size:11px;font-weight:600;color:var(–t2);flex-shrink:0}
.wbar-track{flex:1;height:7px;border-radius:4px;background:var(–c3);overflow:hidden}
.wbar-fill{height:100%;border-radius:4px;transition:width .6s}
.wf-he{background:linear-gradient(90deg,#ef4444,#dc2626)}
.wf-she{background:linear-gradient(90deg,#8b5cf6,#6d28d9)}
.wf-both{background:#9ca3af}
.wpct{font-size:11px;font-weight:700;min-width:28px;text-align:right}
.wtot{text-align:center;font-size:12px;color:var(–t3);margin-top:7px}
.wverd{text-align:center;padding:8px;border-radius:8px;font-size:13px;font-weight:700;margin-top:8px}
.wv-he{background:rgba(239,68,68,.1);color:#f87171}
.wv-she{background:rgba(139,92,246,.1);color:#a78bfa}
.wv-both{background:rgba(156,163,175,.1);color:#d1d5db}

/* PAYWALL */
.blw{position:relative;max-height:72px;overflow:hidden}
.blw::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:55px;background:linear-gradient(transparent,var(–c1))}
.pw{padding:18px 14px;text-align:center;border-top:1px solid rgba(255,61,90,.14);margin:0 -17px -17px;border-radius:0 0 18px 18px;background:linear-gradient(to bottom,transparent,rgba(15,15,24,.97) 15%)}
.pw h3{font-size:16px;font-weight:700;color:var(–t1);margin-bottom:5px}
.pw p{font-size:13px;color:var(–t2);margin-bottom:13px;line-height:1.55}

/* COMMENTS */
.cmt-sort{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.cmt-sort::-webkit-scrollbar{display:none}
.csb{padding:6px 12px;border-radius:50px;font-size:12px;font-weight:600;border:1px solid var(–b1);background:var(–c2);color:var(–t2);cursor:pointer;white-space:nowrap;font-family:var(–font);-webkit-tap-highlight-color:transparent}
.csb.on{background:var(–rdim);border-color:rgba(255,61,90,.4);color:var(–rose)}
.crow{display:flex;gap:10px;margin-bottom:16px;align-items:flex-start}
.ava{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(–rose),var(–vio));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.ava.sm{width:26px;height:26px;font-size:10px}
.cc{padding:12px 14px;background:var(–c2);border:1px solid var(–b1);border-radius:12px;margin-bottom:8px}
.cc.top{border-color:rgba(245,158,11,.3)}
.cc.hot{border-color:rgba(239,68,68,.22)}
.cc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.cc-body{font-size:14px;line-height:1.68;color:var(–t2)}
.cc-foot{display:flex;align-items:center;gap:10px;margin-top:8px}
.ccrxb{display:flex;align-items:center;gap:3px;padding:4px 9px;border-radius:50px;background:var(–c3);border:1px solid var(–b1);cursor:pointer;font-size:12px;font-weight:600;color:var(–t3);font-family:var(–font)}
.ccrxb.on{color:var(–rose)}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;padding:14px;animation:in .2s}
.modal{background:var(–c1);border:1px solid var(–b2);border-radius:20px;padding:24px;width:100%;max-width:390px;position:relative;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mclose{position:absolute;top:12px;right:12px;background:var(–c2);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;color:var(–t2);font-size:13px;display:flex;align-items:center;justify-content:center;font-family:var(–font)}
.flbl{font-size:13px;font-weight:600;color:var(–t2);margin-bottom:5px;display:block}
.mtabs{display:flex;gap:3px;background:var(–c2);border-radius:10px;padding:3px;margin-bottom:16px}
.mtab{flex:1;padding:8px;border-radius:8px;border:none;background:transparent;color:var(–t2);font-size:13px;font-weight:600;cursor:pointer;font-family:var(–font)}
.mtab.on{background:var(–rdim);color:var(–rose)}

/* TOGGLE */
.tgl{width:40px;height:22px;border-radius:11px;background:var(–c3);border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.tgl::after{content:’’;position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s}
.tgl.on{background:var(–rose)}
.tgl.on::after{transform:translateX(18px)}

/* MISC */
.pills{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:14px;padding-bottom:2px}
.pills::-webkit-scrollbar{display:none}
.pill{padding:6px 14px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(–b1);background:var(–c1);color:var(–t2);white-space:nowrap;font-family:var(–font);-webkit-tap-highlight-color:transparent}
.pill.on{background:var(–rdim);border-color:rgba(255,61,90,.4);color:var(–rose)}
.hero{text-align:center;padding:24px 0 20px}
.hero h1{font-size:clamp(30px,10vw,50px);font-weight:800;color:var(–t1);margin-bottom:8px;line-height:1.1}
.hero h1 span{color:var(–rose)}
.hero p{font-size:14px;color:var(–t2);max-width:300px;margin:0 auto 20px;line-height:1.65}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.sttl{font-size:18px;font-weight:800;color:var(–t1)}
.sbadge{padding:2px 9px;border-radius:50px;background:var(–rdim);color:var(–rose);font-size:12px;font-weight:700}
.cpbar{background:linear-gradient(135deg,rgba(255,61,90,.07),rgba(139,92,246,.05));border:1px solid rgba(255,61,90,.15);border-radius:14px;padding:13px 15px;margin-bottom:14px;cursor:pointer;display:flex;align-items:center;gap:10px;-webkit-tap-highlight-color:transparent}
.cpbar:active{opacity:.75}
.bkbtn{display:inline-flex;align-items:center;gap:6px;color:var(–t2);font-size:14px;font-weight:600;cursor:pointer;background:none;border:none;padding:6px 0;margin-bottom:12px;font-family:var(–font)}
.divider{height:1px;background:var(–b1);margin:16px 0}
.err{color:var(–rose);font-size:13px;margin-top:4px}
.empty{text-align:center;padding:50px 16px;color:var(–t3)}
.toasts{position:fixed;bottom:18px;right:12px;z-index:500;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{padding:11px 14px;border-radius:12px;background:var(–c2);border:1px solid var(–b2);font-size:13px;color:var(–t1);box-shadow:0 8px 28px rgba(0,0,0,.5);animation:up .3s;display:flex;align-items:center;gap:7px;max-width:270px}
.toast.suc{border-color:rgba(16,185,129,.4)}
.toast.er{border-color:rgba(255,61,90,.4)}
.cnote{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:#f59e0b;line-height:1.6}
.cnote code{background:rgba(245,158,11,.15);padding:1px 4px;border-radius:4px;font-family:monospace;font-size:11px}
.streakc{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:50px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);color:#f59e0b;font-size:12px;font-weight:700;cursor:pointer}
.upcard{background:rgba(16,185,129,.04);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:10px 13px;margin-bottom:7px}
.uplbl{font-size:10px;color:#10b981;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em}
.repopt{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;border:1px solid var(–b1);background:var(–c2);cursor:pointer;font-size:13px;color:var(–t2);margin-bottom:7px;-webkit-tap-highlight-color:transparent}
.repopt.on{background:var(–rdim);border-color:rgba(255,61,90,.45);color:var(–rose)}
.statg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px}
.statb{background:var(–c2);border:1px solid var(–b1);border-radius:12px;padding:13px;text-align:center}
.statn{font-size:24px;font-weight:800;color:var(–t1)}
.statl{font-size:11px;color:var(–t3);margin-top:2px}
.trn{font-size:30px;font-weight:800;line-height:1;min-width:38px}
.trn-g{color:#d97706}.trn-s{color:#6b7280}.trn-b{color:#92400e}.trn-d{color:var(–c3)}
.tgl-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(–b1)}
.tgl-row:last-child{border-bottom:none}
.rate-warn{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:11px 13px;margin-bottom:12px;font-size:13px;color:#f87171}
.search-wrap{position:relative;margin-bottom:12px}
.search-inp{width:100%;padding:10px 38px 10px 13px;background:var(–c2);border:1px solid var(–b1);border-radius:50px;color:var(–t1);font-family:var(–font);font-size:14px;outline:none;-webkit-appearance:none}
.search-inp:focus{border-color:var(–rose)}
.search-inp::placeholder{color:var(–t3)}
.search-ico{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(–t3);pointer-events:none}
.search-res{background:var(–c1);border:1px solid var(–b2);border-radius:12px;margin-top:5px;overflow:hidden;display:none}
.search-res.show{display:block}
.sr{padding:11px 13px;border-bottom:1px solid var(–b1);cursor:pointer;-webkit-tap-highlight-color:transparent}
.sr:last-child{border-bottom:none}
.sr:active{background:var(–c2)}
.sr-title{font-size:13px;font-weight:600;color:var(–t1);margin-bottom:2px;line-height:1.3}
.sr-meta{font-size:11px;color:var(–t3)}
.ob-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;padding:14px}
.ob-card{background:var(–c1);border:1px solid rgba(255,61,90,.2);border-radius:20px;padding:28px 22px;max-width:360px;width:100%;text-align:center}
.ob-dots{display:flex;justify-content:center;gap:5px;margin-bottom:20px}
.ob-dot{width:7px;height:7px;border-radius:50%;background:var(–c3);transition:all .3s}
.ob-dot.on{background:var(–rose);width:22px;border-radius:4px}
.ob-icon{font-size:46px;margin-bottom:12px}
.ob-name{background:rgba(255,61,90,.12);border:1px solid rgba(255,61,90,.25);border-radius:8px;padding:7px 14px;display:inline-block;color:var(–rose);font-size:14px;font-weight:700;margin-bottom:14px}
.nbtn{background:var(–c2);border:1px solid var(–b1);border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(–t2);font-size:14px;display:flex;align-items:center;justify-content:center;position:relative;-webkit-tap-highlight-color:transparent}
.nbadge{position:absolute;top:-4px;right:-4px;background:var(–rose);color:#fff;font-size:9px;font-weight:700;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(–bg)}
.npanel{position:absolute;top:calc(100% + 8px);right:0;width:265px;background:var(–c1);border:1px solid var(–b2);border-radius:14px;box-shadow:0 14px 40px rgba(0,0,0,.6);z-index:200;max-height:320px;overflow-y:auto;display:none}
.npanel.show{display:block}
.nitem{padding:11px 13px;border-bottom:1px solid var(–b1)}
.nitem:last-child{border-bottom:none}
.nitem.unread{background:rgba(255,61,90,.05)}
.ndot{width:6px;height:6px;border-radius:50%;background:var(–rose);flex-shrink:0;margin-top:4px}

/* Post add-on panels */
.post-full .pbody{display:block;-webkit-line-clamp:unset}
.mswitch{text-align:center;font-size:14px;color:var(–t2);margin-top:12px}
.mswitch button{background:none;border:none;color:var(–rose);font-weight:700;font-size:14px;font-family:var(–font);cursor:pointer}
@media(max-width:480px){
nav{padding:0 8px}
#app{padding:82px 10px 90px}
.modal{padding:20px 13px;border-radius:18px}
.wiw-opts{flex-direction:column}
}
</style>

</head>
<body>

<!-- NAV -->

<nav>
  <div id="logo" onclick="goHome()">💔</div>
  <div id="tabs">
    <button class="tab on" data-page="home" onclick="setPage('home')">Home</button>
    <button class="tab" data-page="confessions" onclick="setPage('confessions')">Confessions</button>
    <button class="tab" data-page="advice" onclick="setPage('advice')">Advice</button>
    <button class="tab" data-page="trending" onclick="setPage('trending')">🔥 Trending</button>
    <button class="tab" data-page="profile" onclick="setPage('profile')">👤 Profile</button>
  </div>
  <div id="nav-right"></div>
</nav>

<!-- TICKER -->

<div id="ticker"><div id="tick-inner">Loading…</div></div>

<!-- APP -->

<div id="app"><div style="display:flex;justify-content:center;padding:60px 0"><span class="spin"></span></div></div>

<!-- TOASTS -->

<div class="toasts" id="toasts"></div>

<!-- Supabase ONLY - no React -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
/* ══════════════════════════════════════

function ago(iso) {
  var s = (Date.now() - new Date(iso).getTime()) / 1000;
  if (s < 60)    return 'just now';
  if (s < 3600)  return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
function rnd(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function makeName(){
  var p=['Heart','Confess','Soul','Echo','Ache','Muse','Pulse','Veil','Rift','Dusk'];
  return p[rnd(0,p.length-1)]+'_'+rnd(1000,9999);
}
function esc(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getStreak(){try{return JSON.parse(localStorage.getItem('hc_sk')||'{"c":0,"l":""}');}catch(e){return{c:0,l:''};}}
function bumpStreak(){var t=new Date().toDateString();var d=getStreak();if(d.l===t)return d;var nd={c:d.l===new Date(Date.now()-86400000).toDateString()?d.c+1:1,l:t};localStorage.setItem('hc_sk',JSON.stringify(nd));return nd;}
function feedScore(p){var rx=Object.values(p.reaction_counts||{}).reduce(function(a,v){return a+v;},0);var eng=rx+(p.comment_count||0)*3+((p.vote_a||0)+(p.vote_b||0))*1.5;var age=(Date.now()-new Date(p.created_at).getTime())/3600000;return eng/Math.pow(age+2,1.8);}
function cscore(p){var t=(p.vote_a||0)+(p.vote_b||0);if(t<3)return 0;return Math.pow(t,1.5)/(Math.abs((p.vote_a||0)-(p.vote_b||0))+1);}
function totalRx(p){return Object.values(p.reaction_counts||{}).reduce(function(a,v){return a+v;},0);}
function wiwTotal(p){return (p.wiw_he||0)+(p.wiw_she||0)+(p.wiw_both||0);}
function notify(type,payload){
  if(!IS_CFG) return;
  fetch(NOTIFY_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},body:JSON.stringify({type:type,payload:payload})}).catch(function(){});
}
function emoBadges(p){
  var b=[];
  var ageH=(Date.now()-new Date(p.created_at).getTime())/3600000;
  var s=feedScore(p);
  if(s>200&&ageH<24) b.push('<span class="badge b-hot">🔥 Trending Now</span>');
  else if(s>80)      b.push('<span class="badge b-trnd">🔥 Trending</span>');
  if((p.reaction_counts&&p.reaction_counts['😢']||0)>200) b.push('<span class="badge b-sad">💔 Saddest</span>');
  if((p.reaction_counts&&p.reaction_counts['😡']||0)>300) b.push('<span class="badge b-toxic">😳 Toxic</span>');
  return b.slice(0,2).join('');
}
function tagBadges(tags){
  return (tags||[]).slice(0,2).map(function(t){return '<span class="tag t-'+t+'">'+t+'</span>';}).join('');
}
function tagClass(t){return 't-'+t;}

if(btn){btn.disabled=true;btn.innerHTML=’<span class="spin"></span>’;}
var np={id:‘new-’+Date.now(),title:title.trim(),content:body.trim(),type:_postType,tags:[].concat(_postTags),
anonymous_name:STATE.user.anonymous_name,created_at:new Date().toISOString(),
reaction_counts:{‘🔥’:0,‘😂’:0,‘😢’:0,‘😡’:0},comment_count:0,vote_a:0,vote_b:0,

bumpStreak();

}

function doReact(ev, pid, type, inDetail) {
ev.stopPropagation();
if(!STATE.user){showAuth(‘signup’);return;}
var prev = STATE.reactions[pid]&&STATE.reactions[pid]._mine;
if(!STATE.reactions[pid]) STATE.reactions[pid]={};
var r=STATE.reactions[pid];
var post=STATE.posts.find(function(p){return p.id===pid;});
var rc=post?Object.assign({},post.reaction_counts||{}):Object.assign({},r);
if(prev===type){rc[type]=Math.max(0,(rc[type]||1)-1);r._mine=null;}
else{if(prev)rc[prev]=Math.max(0,(rc[prev]||1)-1);rc[type]=(rc[type]||0)+1;r._mine=type;}
Object.assign(r,rc);
if(post) post.reaction_counts=Object.assign({},rc);
// Re-render just the reaction row
var rowEl=document.getElementById(inDetail?‘rx-detail-’+pid:‘rx-row-’+pid);
if(rowEl){
rowEl.innerHTML=RXLIST.map(function(rr){
var mine2=r._mine;
var cnt=rc[rr]||0;
return ‘<button class="rxb'+(mine2===rr?' on':'')+'" onclick="doReact(event,\''+pid+'\',\''+rr+'\','+inDetail+')">’+rr+’<span style="margin-left:3px">’+(cnt>0?cnt.toLocaleString():’’)+’</span></button>’;
}).join(’’);
}
if(sb&&STATE.user.id!==‘demo’){
if(prev)sb.from(‘reactions’).delete().match({post_id:pid,user_id:STATE.user.id,type:prev});
if(r._mine){
sb.from(‘reactions’).insert({post_id:pid,user_id:STATE.user.id,type:type}).then(function(){

function doAuth(){

var pass=(document.getElementById(‘auth-pass’)||{}).value||’’;
var btn=document.getElementById(‘auth-btn’);
var errEl=document.getElementById(‘auth-err’);
var doneEl=document.getElementById(‘auth-done’);

if(!email){if(errEl){errEl.style.display=’’;errEl.textContent=‘Enter your email’;}return;}
if(btn){btn.disabled=true;btn.innerHTML=’<span class="spin"></span>’;}
if(errEl) errEl.style.display=‘none’;

if(!IS_CFG){
setTimeout(function(){
handleAuthSuccess({id:‘demo’,email:email,anonymous_name:makeName(),notify_email:true});
},700);
return;
}
function fail(msg){if(errEl){errEl.style.display=’’;errEl.textContent=msg;}if(btn){btn.disabled=false;btn.innerHTML=mode===‘login’?‘Log in’:mode===‘signup’?‘Create account’:‘Send reset link’;}}
if(mode===‘reset’){
sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.href}).then(function(r){if(r.error)fail(r.error.message);else{if(doneEl){doneEl.style.display=’’;doneEl.textContent=‘Reset link sent 📧’;}if(formEl)formEl.style.display=‘none’;}});
} else if(mode===‘signup’){

if(r.error){fail(r.error.message);return;}
if(r.data&&r.data.user){
var n=makeName();
sb.from(‘users’).insert({id:r.data.user.id,email:email,anonymous_name:n,notify_email:true}).then(function(){
if(doneEl){doneEl.style.display=’’;doneEl.textContent=‘Verify your email to continue 💌’;}
if(formEl)formEl.style.display=‘none’;
});
}
});
} else {
sb.auth.signInWithPassword({email:email,password:pass}).then(function(r){
if(r.error){fail(r.error.message);return;}
sb.from(‘users’).select(’*’).eq(‘id’,r.data.user.id).single().then(function(pr){
handleAuthSuccess(Object.assign({},r.data.user,{anonymous_name:(pr.data&&pr.data.anonymous_name)||makeName(),notify_email:(pr.data&&pr.data.notify_email)!==false}));

});
}
}

render();
}
renderNavRight();
}

function loadComments(pid){
if(!sb) return;
var post=STATE.posts.find(function(p){return p.id===pid;});
if(!post||post.id.startsWith(‘p’)) return; // demo posts
sb.from(‘comments’).select(’*’).eq(‘post_id’,pid).order(‘upvotes’,{ascending:false}).then(function(r){
if(r.data&&r.data.length){
STATE.comments[pid]=r.data;
var el=document.getElementById(‘comments-’+pid);
if(el) el.innerHTML=renderComments(pid);
}
});
// Realtime
sb.channel(‘c-’+pid).on(‘postgres_changes’,{event:‘INSERT’,schema:‘public’,table:‘comments’,filter:‘post_id=eq.’+pid},function(pl){
if(!STATE.comments[pid]) STATE.comments[pid]=[];
STATE.comments[pid].unshift(Object.assign({},pl.new,{heated:Math.random()>.7}));
var el=document.getElementById(‘comments-’+pid);
if(el) el.innerHTML=renderComments(pid);
}).subscribe();
}

function loadNotifications(){
if(!sb||!STATE.user) return;
sb.from(‘notifications’).select(’*’).eq(‘user_id’,STATE.user.id).order(‘created_at’,{ascending:false}).limit(20).then(function(r){
if(r.data) STATE.notifs=r.data;
renderNavRight();
});
sb.channel(‘n-’+STATE.user.id).on(‘postgres_changes’,{event:‘INSERT’,schema:‘public’,table:‘notifications’,filter:‘user_id=eq.’+STATE.user.id},function(pl){
STATE.notifs.unshift(pl.new);
renderNavRight();
}).subscribe();
}

/* ══════════════════════════════════════
BOOT
══════════════════════════════════════ */
function boot(){
initPosts();
initComments();
// Load real posts
if(sb){
sb.from(‘posts’).select(’*,users(anonymous_name)’).order(‘created_at’,{ascending:false}).limit(50).then(function(r){
if(r.data&&r.data.length){
STATE.posts=r.data.map(function(p){return Object.assign({wiw_he:0,wiw_she:0,wiw_both:0,view_count:0},p,{anonymous_name:p.users&&p.users.anonymous_name});});
render();
}
});
// Auth session
sb.auth.getSession().then(function(r){
if(r.data&&r.data.session&&r.data.session.user){
sb.from(‘users’).select(’*’).eq(‘id’,r.data.session.user.id).single().then(function(pr){
if(pr.data){
STATE.user=Object.assign({},r.data.session.user,{anonymous_name:pr.data.anonymous_name,notify_email:pr.data.notify_email!==false});
renderNavRight();
loadNotifications();
// Load rate count
sb.from(‘post_rate’).select(‘count’).eq(‘user_id’,STATE.user.id).eq(‘day_bucket’,new Date().toISOString().split(‘T’)[0]).single().then(function(rr){if(rr.data)STATE._rateCount=rr.data.count||0;});
}
});
}
});
sb.auth.onAuthStateChange(function(ev){if(ev===‘SIGNED_OUT’){STATE.user=null;renderNavRight();}});
// Realtime feed
sb.channel(‘feed’).on(‘postgres_changes’,{event:‘INSERT’,schema:‘public’,table:‘posts’},function(pl){
sb.from(‘users’).select(‘anonymous_name’).eq(‘id’,pl.new.user_id).single().then(function(u){
STATE.posts.unshift(Object.assign({wiw_he:0,wiw_she:0,wiw_both:0,view_count:0},pl.new,{anonymous_name:u.data&&u.data.anonymous_name,reaction_counts:{},comment_count:0,vote_a:0,vote_b:0}));
if(STATE.page===‘home’) render();
});
}).subscribe();
}
render();
// Admin
if(STATE.user&&STATE.user.email===ADMIN_EMAIL){
document.getElementById(‘tabs’).insertAdjacentHTML(‘beforeend’,’<button class="tab" data-page="admin" onclick="setPage(\'admin\');loadAdminReports()">🛡 Admin</button>’);
}
}

// Override setPage to handle admin
var _origSetPage=setPage;
window.setPage=function(p){
_origSetPage(p);
if(p===‘admin’) loadAdminReports();
};

boot();
</script>
