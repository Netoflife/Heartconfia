<!# html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HeartConfia 💔</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<!-- Load all deps synchronously — most reliable on mobile -->
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;--s3:#22223a;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --tx:#f0eef8;--tx2:#9a96b4;--tx3:#5e5a78;
  --rose:#ff4d6d;--rdim:rgba(255,77,109,0.15);--rglow:rgba(255,77,109,0.3);
  --violet:#7c3aed;--vdim:rgba(124,58,237,0.15);
  --amber:#f59e0b;--teal:#14b8a6;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
#root{min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes hb{0%,100%{transform:scale(1)}15%{transform:scale(1.28)}30%{transform:scale(1)}45%{transform:scale(1.12)}60%{transform:scale(1)}}
@keyframes popIn{0%{transform:scale(0.87);opacity:0}70%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
@keyframes pr{0%,100%{color:var(–rose)}50%{color:#c9184a}}

.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-family:‘DM Sans’,sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;white-space:nowrap;text-decoration:none}
.bp{background:linear-gradient(135deg,var(–rose),#c9184a);color:#fff;box-shadow:0 4px 18px var(–rglow)}
.bp:hover{transform:translateY(-1px);box-shadow:0 6px 26px rgba(255,77,109,.45)}
.bs{background:var(–s2);color:var(–tx);border:1px solid var(–bd)}
.bs:hover{background:var(–s3)}
.bg{background:transparent;color:var(–tx2);padding:8px 14px}
.bg:hover{color:var(–tx);background:var(–s2)}
.bv{background:linear-gradient(135deg,var(–violet),#5b21b6);color:#fff}
.bt{background:linear-gradient(135deg,var(–teal),#0d9488);color:#fff}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}

.inp{width:100%;padding:12px 16px;background:var(–s2);border:1px solid var(–bd);border-radius:12px;color:var(–tx);font-family:‘DM Sans’,sans-serif;font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(–rose);box-shadow:0 0 0 3px rgba(255,77,109,.12)}
.inp::placeholder{color:var(–tx3)}
textarea.inp{resize:vertical;min-height:120px;line-height:1.65}

.card{background:var(–s1);border:1px solid var(–bd);border-radius:16px;padding:20px}

.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.tc{background:rgba(239,68,68,.12);color:#ef4444}
.tb{background:var(–rdim);color:var(–rose)}
.td{background:var(–vdim);color:#a78bfa}
.tm{background:rgba(20,184,166,.12);color:var(–teal)}
.ts{background:rgba(245,158,11,.12);color:var(–amber)}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;height:60px;z-index:100;background:rgba(10,10,15,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(–bd);display:flex;align-items:center;padding:0 14px;gap:10px}
.nlogo{font-family:‘Playfair Display’,serif;font-size:19px;font-weight:900;color:var(–rose);cursor:pointer;flex-shrink:0;user-select:none;animation:hb 3.5s ease-in-out infinite;display:inline-block}
.ntabs{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.ntabs::-webkit-scrollbar{display:none}
.ntab{padding:6px 13px;border-radius:50px;font-size:13px;font-weight:500;cursor:pointer;color:var(–tx2);transition:all .2s;border:none;background:transparent;white-space:nowrap;font-family:‘DM Sans’,sans-serif}
.ntab:hover{color:var(–tx);background:var(–s2)}
.ntab.on{color:var(–rose);background:var(–rdim)}

/* Layout */
.lay{display:grid;grid-template-columns:1fr min(700px,100%) 1fr;min-height:100vh;padding-top:60px}
.lc{grid-column:2;padding:24px 16px 80px}

/* Post card */
.pc{background:var(–s1);border:1px solid var(–bd);border-radius:16px;padding:20px;margin-bottom:12px;cursor:pointer;transition:all .25s;animation:fadeUp .4s ease both;position:relative;overflow:hidden}
.pc::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(–rose),var(–violet));opacity:0;transition:opacity .2s}
.pc:hover{border-color:rgba(255,77,109,.28);transform:translateY(-2px);box-shadow:0 0 40px rgba(255,77,109,.12)}
.pc:hover::before{opacity:1}
.ptb{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.ptb.confession{color:var(–rose)}.ptb.advice{color:#a78bfa}.ptb.hot_take{color:var(–amber);animation:pr 2s ease infinite}
.ptitle{font-family:‘Playfair Display’,serif;font-size:18px;font-weight:700;line-height:1.35;color:var(–tx);margin-bottom:10px}
.pprev{font-size:14px;line-height:1.7;color:var(–tx2);margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.pmeta{display:flex;align-items:center;gap:10px;font-size:13px;color:var(–tx3);margin-bottom:14px;flex-wrap:wrap}
.pdot{width:3px;height:3px;border-radius:50%;background:var(–tx3);flex-shrink:0}
.aname{color:var(–tx2);font-weight:600}
.rxrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rxb{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:50px;background:var(–s2);border:1px solid var(–bd);cursor:pointer;font-size:13px;font-weight:500;color:var(–tx2);transition:all .2s;font-family:‘DM Sans’,sans-serif}
.rxb:hover{background:var(–s3);color:var(–tx);transform:scale(1.05)}
.rxb.on{background:var(–rdim);border-color:rgba(255,77,109,.35);color:var(–rose)}

/* Blur / Paywall */
.blw{position:relative;max-height:80px;overflow:hidden}
.blw::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,var(–s1))}
.pw{margin:12px -20px -20px;padding:24px 20px;background:linear-gradient(to bottom,transparent,var(–s1) 18%);text-align:center;border-top:1px solid var(–bd);border-radius:0 0 16px 16px}

/* Modal */
.mov{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeUp .2s ease}
.mod{background:var(–s1);border:1px solid var(–bd2);border-radius:24px;padding:32px;width:100%;max-width:420px;position:relative;animation:popIn .3s ease;max-height:92vh;overflow-y:auto}
.mclose{position:absolute;top:14px;right:14px;background:var(–s2);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(–tx2);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mclose:hover{background:var(–s3);color:var(–tx)}
.flbl{font-size:13px;font-weight:500;color:var(–tx2);margin-bottom:5px;display:block}
.mswitch{text-align:center;font-size:14px;color:var(–tx2);margin-top:16px}
.mswitch button{background:none;border:none;color:var(–rose);cursor:pointer;font-weight:600;font-size:14px;font-family:‘DM Sans’,sans-serif}
.mtabs{display:flex;gap:4px;background:var(–s2);border-radius:12px;padding:4px;margin-bottom:22px}
.mtab{flex:1;padding:8px;border-radius:9px;border:none;background:transparent;color:var(–tx2);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:‘DM Sans’,sans-serif}
.mtab.on{background:var(–rdim);color:var(–rose)}

/* Vote */
.vbox{background:var(–s2);border:1px solid var(–bd);border-radius:16px;padding:20px;margin:24px 0}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.vbtn{padding:14px 12px;border-radius:12px;border:1px solid var(–bd);background:var(–s1);cursor:pointer;text-align:center;font-family:‘DM Sans’,sans-serif;font-size:14px;font-weight:600;color:var(–tx2);transition:all .2s;line-height:1.4}
.vbtn:hover{background:var(–s3);color:var(–tx)}
.vbtn.va{background:var(–rdim);border-color:rgba(255,77,109,.4);color:var(–rose)}
.vbtn.vb{background:var(–vdim);border-color:rgba(124,58,237,.4);color:#a78bfa}
.vtrack{height:8px;border-radius:4px;background:var(–s3);overflow:hidden;margin-top:14px;display:flex}
.vfa{height:100%;background:linear-gradient(90deg,var(–rose),#c9184a);transition:width .6s ease}
.vfb{height:100%;background:linear-gradient(90deg,var(–violet),#5b21b6);transition:width .6s ease}
.vfoot{display:flex;justify-content:space-between;font-size:12px;color:var(–tx3);margin-top:6px}

/* Comments */
.crow{display:flex;gap:12px;margin-bottom:24px;align-items:flex-start}
.ava{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(–rose),var(–violet));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.cc{padding:14px 16px;background:var(–s2);border:1px solid var(–bd);border-radius:12px;margin-bottom:10px;animation:fadeUp .3s ease}
.cc.best{border-color:rgba(20,184,166,.35)}
.cact{display:flex;gap:12px;margin-top:8px}
.cactb{display:flex;align-items:center;gap:4px;font-size:12px;color:var(–tx3);background:none;border:none;cursor:pointer;transition:color .2s;font-family:‘DM Sans’,sans-serif}
.cactb:hover,.cactb.on{color:var(–rose)}

/* Pills */
.pills{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:20px}
.pills::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;border-radius:50px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(–bd);background:var(–s1);color:var(–tx2);transition:all .2s;white-space:nowrap;font-family:‘DM Sans’,sans-serif}
.pill:hover{border-color:rgba(255,77,109,.3);color:var(–rose)}
.pill.on{background:var(–rdim);border-color:rgba(255,77,109,.4);color:var(–rose)}

/* Hero */
.hero{text-align:center;padding:40px 0 32px;position:relative}
.hero::before{content:’’;position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(255,77,109,.1),transparent 70%);pointer-events:none}
.hey{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(–rose);margin-bottom:12px}
.htitle{font-family:‘Playfair Display’,serif;font-size:clamp(34px,9vw,56px);font-weight:900;line-height:1.08;background:linear-gradient(140deg,var(–tx) 35%,var(–rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
.hsub{font-size:15px;color:var(–tx2);max-width:360px;margin:0 auto 26px;line-height:1.65}

/* Stats */
.statg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.statb{background:var(–s2);border:1px solid var(–bd);border-radius:12px;padding:16px;text-align:center}
.statn{font-family:‘Playfair Display’,serif;font-size:28px;font-weight:900;color:var(–tx)}
.statl{font-size:12px;color:var(–tx3);margin-top:4px}

/* Trending */
.trn{font-family:‘Playfair Display’,serif;font-size:34px;font-weight:900;color:var(–bd);line-height:1;min-width:42px}
.trn.top{color:rgba(255,77,109,.22)}

/* Misc */
.sh{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.st{font-family:‘Playfair Display’,serif;font-size:22px;font-weight:700;color:var(–tx)}
.sbadge{padding:3px 10px;border-radius:50px;background:var(–rdim);color:var(–rose);font-size:12px;font-weight:700}
.bkbtn{display:inline-flex;align-items:center;gap:7px;color:var(–tx2);font-size:14px;font-weight:500;cursor:pointer;background:none;border:none;padding:8px 0;margin-bottom:20px;transition:color .2s;font-family:‘DM Sans’,sans-serif}
.bkbtn:hover{color:var(–tx)}
.div{height:1px;background:var(–bd);margin:24px 0}
.err{color:var(–rose);font-size:13px;margin-top:4px}
.spin{width:20px;height:20px;border:2px solid var(–bd);border-top-color:var(–rose);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;display:inline-block}
.empty{text-align:center;padding:60px 20px;color:var(–tx3)}
.empi{font-size:46px;margin-bottom:12px}
.empt{font-family:‘Playfair Display’,serif;font-size:20px;color:var(–tx2);margin-bottom:8px}
.twrap{position:fixed;bottom:24px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{padding:13px 16px;border-radius:12px;background:var(–s2);border:1px solid var(–bd);font-size:14px;color:var(–tx);box-shadow:0 8px 30px rgba(0,0,0,.4);animation:fadeUp .3s ease;display:flex;align-items:center;gap:10px;min-width:200px;max-width:320px}
.toast.suc{border-color:rgba(20,184,166,.4)}.toast.er{border-color:rgba(255,77,109,.4)}
.cnote{background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:14px 16px;margin-bottom:20px;font-size:13px;color:var(–amber);line-height:1.65}
.cnote code{background:rgba(245,158,11,.15);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:12px}
.notifwrap{position:relative}
.nbtn{background:var(–s2);border:1px solid var(–bd);border-radius:50%;width:36px;height:36px;cursor:pointer;color:var(–tx2);font-size:15px;display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s;flex-shrink:0}
.nbtn:hover{background:var(–s3);color:var(–tx)}
.nbadge{position:absolute;top:-4px;right:-4px;background:var(–rose);color:#fff;font-size:10px;font-weight:700;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(–bg)}
.npanel{position:absolute;top:calc(100% + 10px);right:0;width:300px;background:var(–s1);border:1px solid var(–bd);border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,.5);z-index:200;max-height:380px;overflow-y:auto;animation:fadeUp .2s ease}
.nitem{padding:12px 16px;border-bottom:1px solid var(–bd);cursor:pointer;transition:background .2s}
.nitem:hover{background:var(–s2)}
.nitem.unread{background:rgba(255,77,109,.05)}
.ndot{width:7px;height:7px;border-radius:50%;background:var(–rose);flex-shrink:0;margin-top:5px}
.hottimer{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:50px;background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.25);font-size:12px;font-weight:700;color:var(–rose)}
.upcard{background:rgba(20,184,166,.04);border:1px solid rgba(20,184,166,.2);border-radius:12px;padding:12px 16px;margin-bottom:8px}
.uplbl{font-size:11px;color:var(–teal);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em}
.repopt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1px solid var(–bd);background:var(–s2);cursor:pointer;transition:all .2s;font-size:14px;color:var(–tx2);margin-bottom:8px}
.repopt:hover{border-color:rgba(255,77,109,.3);color:var(–tx)}
.repopt.sel{background:var(–rdim);border-color:rgba(255,77,109,.4);color:var(–rose)}
.cpbar{background:linear-gradient(135deg,rgba(255,77,109,.07),rgba(124,58,237,.05));border:1px solid rgba(255,77,109,.15);border-radius:16px;padding:16px 20px;margin-bottom:20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.cpbar:hover{border-color:rgba(255,77,109,.3)}
.streakc{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:50px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);color:var(–amber);font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.adm{background:var(–s2);border:1px solid var(–bd);border-radius:12px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.prorow{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(–bd)}
.prorow:last-child{border-bottom:none}
.bdrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.bdc{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:50px;background:var(–s2);border:1px solid var(–bd);font-size:13px;font-weight:600;color:var(–tx2)}

@media(max-width:600px){
.nav{padding:0 8px;gap:6px}
.lc{padding:12px 10px 80px}
.mod{padding:22px 14px;border-radius:18px}
.vgrid{grid-template-columns:1fr}
.pc{padding:16px}
.npanel{width:260px}
}
</style>

</head>

  var age = (Date.now()-new Date(p.created_at).getTime())/3600000;
  return eng / Math.pow(age+2,1.8);
}
function controvScore(p) {
  var tot = (p.vote_a||0)+(p.vote_b||0);
  if (tot < 5) return 0;
  return Math.pow(tot,1.5) / (Math.abs((p.vote_a||0)-(p.vote_b||0))+1);
}
function hotLeft(created) {
  var rem = new Date(created).getTime() + HOT_TTL - Date.now();
  if (rem <= 0) return null;
  return Math.floor(rem/3600000)+'h '+Math.floor((rem%3600000)/60000)+'m';
}
function getStreak() {
  try { return JSON.parse(localStorage.getItem('hc_sk')||'{"count":0,"last":""}'); }
  catch(e) { return {count:0,last:''}; }
}
function bumpStreak() {
  var today = new Date().toDateString();
  var d = getStreak();
  if (d.last === today) return d;
  var nd = {count: d.last===new Date(Date.now()-86400000).toDateString() ? d.count+1 : 1, last:today};
  localStorage.setItem('hc_sk', JSON.stringify(nd));
  return nd;
}
function calcKarma(myPosts) {
  return myPosts.reduce(function(k,p) {
    return k + Object.values(p.reaction_counts||{}).reduce(function(a,v){return a+v;},0) + (p.comment_count||0) + 10;
  }, 0);
}
function getBadges(karma, myPosts, streak) {
  var b = [];
  if (myPosts.length>=1)  b.push({i:'🌱',l:'First Confession'});
  if (karma>=50)          b.push({i:'⭐',l:'Rising Star'});
  if (karma>=250)         b.push({i:'🔥',l:'On Fire'});
  if (karma>=1000)        b.push({i:'👑',l:'Legend'});
  if (streak>=3)          b.push({i:'📅',l:'Dedicated'});
  if (streak>=7)          b.push({i:'🏆',l:'Week Warrior'});
  return b;
}

      .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:'user_id=eq.'+p.user.id},

      .subscribe();

  useEffect(function(){

  },[]);

  function toggle(){
    var o=!open; setOpen(o);
    if(o&&unread>0){
      setNotifs(function(prev){return prev.map(function(n){return Object.assign({},n,{read:true});});});

  var icons={comment:'💬',reaction:'🔥',vote:'⚖️',trending:'🚀'};
  return h('div',{className:'notifwrap',ref:ref},
    h('button',{className:'nbtn',onClick:toggle},'🔔',

function VoteSection(p) {
  var as=useState(p.post.vote_a||0),vA=as[0],setVA=as[1];
  var bs=useState(p.post.vote_b||0),vB=bs[0],setVB=bs[1];
  var vs=useState(null),voted=vs[0],setVoted=vs[1];
  var total=vA+vB, pA=total>0?Math.round((vA/total)*100):50;

  function vote(type){
    if(!p.user){p.onNeedAuth();return;}
    if(voted) return;
    type==='A'?setVA(function(v){return v+1;}):setVB(function(v){return v+1;});
    setVoted(type);
    if(sb&&p.user.id!=='demo'){
      (async function(){
        await sb.from('votes').insert({post_id:p.post.id,user_id:p.user.id,vote_type:type});
        if(p.post.user_id&&p.post.user_id!==p.user.id)
          await sb.from('notifications').insert({user_id:p.post.user_id,type:'vote',post_id:p.post.id,actor_name:p.user.anonymous_name,message:'Someone voted on your confession',read:false});
      })();
    }
  }
  return h('div',{className:'vbox'},
    h('div',{style:{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx3)',marginBottom:16}},'⚖️ Who is right?'),
    h('div',{className:'vgrid'},
      h('button',{className:'vbtn '+(voted==='A'?'va':''),onClick:function(){vote('A');}},
        (voted==='A'?'✓ ':'')+'OP is right',
        h('div',{style:{fontSize:22,fontFamily:"'Playfair Display',serif",marginTop:4,color:voted==='A'?'var(--rose)':'var(--tx3)'}},pA+'%')),
      h('button',{className:'vbtn '+(voted==='B'?'vb':''),onClick:function(){vote('B');}},
        (voted==='B'?'✓ ':'')+'Partner is right',
        h('div',{style:{fontSize:22,fontFamily:"'Playfair Display',serif",marginTop:4,color:voted==='B'?'#a78bfa':'var(--tx3)'}},( 100-pA)+'%'))),
    h('div',{className:'vtrack'},
      h('div',{className:'vfa',style:{width:pA+'%'}}),
      h('div',{className:'vfb',style:{width:(100-pA)+'%'}})),
    h('div',{className:'vfoot'},
      h('span',null,vA.toLocaleString()+' for OP'),
      h('span',null,total.toLocaleString()+' total'),
      h('span',null,vB.toLocaleString()+' for Partner')));
}

/* ── Comments ── */
function Comments(p) {
  var cs=useState((DCOMS[p.postId]||[])),comments=cs[0],setComments=cs[1];
  var ts=useState(''),text=ts[0],setText=ts[1];
  var ld=useState(false),sending=ld[0],setSending=ld[1];
  var uv=useState({}),upvoted=uv[0],setUpvoted=uv[1];
  var rp=useState(null),showRep=rp[0],setShowRep=rp[1];

  useEffect(function(){
    if(!sb) return;
    sb.from('comments').select('*').eq('post_id',p.postId).order('upvotes',{ascending:false})
      .then(function(r){if(r.data&&r.data.length)setComments(r.data);});
    var ch=sb.channel('comments-'+p.postId)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'comments',filter:'post_id=eq.'+p.postId},
        function(pl){setComments(function(prev){return [pl.new].concat(prev);});})
      .subscribe();
    return function(){sb.removeChannel(ch);};
  },[p.postId]);

  function postComment(){
    if(!p.user){p.onNeedAuth();return;}
    if(!text.trim()) return;
    setSending(true);
    var c={id:Date.now()+'',anonymous_name:p.user.anonymous_name,content:text.trim(),created_at:new Date().toISOString(),upvotes:0,user_id:p.user.id};
    setComments(function(prev){return [c].concat(prev);});
    setText('');
    if(sb&&p.user.id!=='demo'){
      (async function(){
        await sb.from('comments').insert({post_id:p.postId,user_id:p.user.id,content:c.content});
        if(p.postOwnerId&&p.postOwnerId!==p.user.id)
          await sb.from('notifications').insert({user_id:p.postOwnerId,type:'comment',post_id:p.postId,actor_name:p.user.anonymous_name,message:'@'+p.user.anonymous_name+' commented on your confession',read:false});
        setSending(false);
      })();
    } else { setTimeout(function(){setSending(false);},400); }
  }

  function upvote(cid){
    if(!p.user){p.onNeedAuth();return;}
    if(upvoted[cid]) return;
    setComments(function(prev){return prev.map(function(c){return c.id===cid?Object.assign({},c,{upvotes:(c.upvotes||0)+1}):c;});});
    setUpvoted(function(prev){var o=Object.assign({},prev);o[cid]=true;return o;});
  }

  var sorted=[].concat(comments).sort(function(a,b){return (b.upvotes||0)-(a.upvotes||0);});
  var bestId=comments.length>2&&sorted[0]?sorted[0].id:null;

  return h('div',null,
    h('div',{className:'sh',style:{marginBottom:16}},
      h('span',{className:'st',style:{fontSize:18}},'Comments'),
      h('span',{className:'sbadge'},comments.length)),
    h('div',{className:'crow'},
      h('div',{className:'ava'},p.user?p.user.anonymous_name.charAt(0):'?'),
      h('div',{style:{flex:1}},
        h('textarea',{className:'inp',rows:3,style:{minHeight:76},
          placeholder:p.user?'Reply as @'+p.user.anonymous_name+'…':'Log in to comment',
          value:text,onChange:function(ev){setText(ev.target.value);},disabled:!p.user}),
        p.user
          ?h('button',{className:'btn bp',style:{marginTop:8},onClick:postComment,disabled:!text.trim()||sending},
            sending?h('span',{className:'spin'}):'Post comment')
          :h('button',{className:'btn bs',style:{marginTop:8},onClick:p.onNeedAuth},'Log in to comment'))),
    sorted.map(function(c){
      return h('div',{key:c.id,className:'cc '+(c.id===bestId?'best':'')},
        c.id===bestId&&h('div',{style:{display:'inline-flex',alignItems:'center',gap:5,fontSize:11,fontWeight:700,color:'var(--teal)',marginBottom:8,textTransform:'uppercase',letterSpacing:'.06em'}},'✅ Top answer'),
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
          h('span',{style:{fontSize:13,fontWeight:600,color:'var(--tx)'}},'@'+c.anonymous_name),
          h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
            h('span',{style:{fontSize:12,color:'var(--tx3)'}},ago(c.created_at)),
            h('button',{style:{background:'none',border:'none',color:'var(--tx3)',cursor:'pointer',fontSize:14,lineHeight:1},onClick:function(){setShowRep(c.id);}},'⋯'))),
        h('p',{style:{fontSize:14,lineHeight:1.65,color:'var(--tx2)',marginTop:6}},c.content),
        h('div',{className:'cact'},
          h('button',{className:'cactb '+(upvoted[c.id]?'on':''),onClick:function(){upvote(c.id);}},
            (upvoted[c.id]?'❤️':'🤍')+' '+(c.upvotes||0).toLocaleString()),
          h('button',{className:'cactb'},'↩ Reply')));
    }),
    showRep&&h(ReportModal,{commentId:showRep,user:p.user,onClose:function(){setShowRep(null);}}));
}

/* ── Story Updates ── */
function StoryUpdates(p) {
  var us=useState([]),updates=us[0],setUpdates=us[1];
  var ts=useState(''),text=ts[0],setText=ts[1];
  var ld=useState(false),loading=ld[0],setLoading=ld[1];
  var isOwner=p.user&&p.user.id===p.post.user_id;

  useEffect(function(){
    if(!sb) return;
    sb.from('post_updates').select('*').eq('post_id',p.post.id).order('created_at',{ascending:true})
      .then(function(r){if(r.data)setUpdates(r.data);});
  },[p.post.id]);

  function add(){
    if(!text.trim()) return;
    setLoading(true);
    var u={id:Date.now()+'',content:text.trim(),created_at:new Date().toISOString()};
    setUpdates(function(prev){return prev.concat([u]);});
    setText('');
    if(sb&&p.user.id!=='demo')
      sb.from('post_updates').insert({post_id:p.post.id,user_id:p.user.id,content:text.trim()});
    setTimeout(function(){setLoading(false);},400);
  }

  if(!isOwner&&updates.length===0) return null;
  return h('div',{style:{marginBottom:20}},
    h('div',{style:{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--teal)',marginBottom:12}},'📰 Updates from OP'),
    updates.map(function(u,i){
      return h('div',{key:u.id,className:'upcard'},
        h('div',{className:'uplbl'},'Update #'+(i+1)+' · '+ago(u.created_at)),
        h('p',{style:{fontSize:14,color:'var(--tx2)',lineHeight:1.65}},u.content));
    }),
    isOwner&&h('div',{style:{marginTop:12}},
      h('textarea',{className:'inp',rows:3,style:{minHeight:76},placeholder:'Add an update to your story…',value:text,onChange:function(ev){setText(ev.target.value);}}),
      h('button',{className:'btn bt',style:{marginTop:8},onClick:add,disabled:!text.trim()||loading},
        loading?h('span',{className:'spin'}):'📰 Post Update')));
}

function PostDetail(p) {
  var rs=useState(p.post.reaction_counts||{}),reactions=rs[0],setReactions=rs[1];
  var ms=useState(null),mine=ms[0],setMine=ms[1];

  if(!p.user) return h('div',{style:{animation:'fadeUp .4s ease both'}},
    h('button',{className:'bkbtn',onClick:p.onBack},'← Back'),
    h('div',{className:'card'},
      h('span',{className:'ptb '+p.post.type},p.post.type==='confession'?'💔 Confession':p.post.type==='advice'?'💬 Seeking Advice':'🌶 Hot Take'),
      h('h1',{style:{fontFamily:"'Playfair Display',serif",fontSize:'clamp(22px,5vw,30px)',fontWeight:900,lineHeight:1.2,color:'var(--tx)',margin:'10px 0 16px'}},p.post.title),
      h('div',{className:'pmeta',style:{marginBottom:20}},
        h('span',{className:'aname'},'@'+p.post.anonymous_name),h('span',{className:'pdot'}),h('span',null,ago(p.post.created_at))),
      h('div',{className:'blw',style:{maxHeight:110}},
        h('p',{style:{fontSize:16,lineHeight:1.9,color:'var(--tx2)',whiteSpace:'pre-wrap'}},p.post.content.slice(0,280)+'…')),
      h(Paywall,{onSignup:function(){p.onNeedAuth('signup');},onLogin:function(){p.onNeedAuth('login');}})));

  function react(type){
    var prev=mine,r=Object.assign({},reactions);
    if(prev===type){r[type]=Math.max(0,(r[type]||1)-1);setMine(null);}
    else{if(prev)r[prev]=Math.max(0,(r[prev]||1)-1);r[type]=(r[type]||0)+1;setMine(type);}

  return h('div',{style:{animation:'fadeUp .4s ease both'}},
    h('button',{className:'bkbtn',onClick:p.onBack},'← Back to feed'),
    h('div',{className:'card',style:{marginBottom:14}},

          h('span',{className:'ptb '+p.post.type},p.post.type==='confession'?'💔 Confession':p.post.type==='advice'?'💬 Seeking Advice':'🌶 Hot Take'),
          p.post.type==='hot_take'&&(function(){var t=hotLeft(p.post.created_at);return t?h('span',{className:'hottimer'},'⏱ '+t+' left'):h('span',{style:{fontSize:12,color:'var(--tx3)'}},'⏰ Expired');})()),
        h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}},
          (p.post.tags||[]).map(function(t){return h('span',{key:t,className:'tag '+(TCLASS[t]||'')},t);}))),
      h('h1',{style:{fontFamily:"'Playfair Display',serif",fontSize:'clamp(22px,5vw,30px)',fontWeight:900,lineHeight:1.2,color:'var(--tx)',marginBottom:16}},p.post.title),
      h('div',{className:'pmeta',style:{marginBottom:20}},
        h('span',{className:'aname'},'@'+p.post.anonymous_name),h('span',{className:'pdot'}),
        h('span',null,ago(p.post.created_at)),h('span',{className:'pdot'}),
        h('span',null,'💬 '+(p.post.comment_count||0).toLocaleString())),
      h('p',{style:{fontSize:16,lineHeight:1.9,color:'var(--tx2)',whiteSpace:'pre-wrap'}},p.post.content),
      h('div',{className:'div'}),
      h('div',{className:'rxrow'},
        RX.map(function(r){
          return h('button',{key:r,className:'rxb '+(mine===r?'on':''),onClick:function(){react(r);}},
            r,' ',h('span',null,(reactions[r]||0).toLocaleString()));
        }))),
    h(StoryUpdates,{post:p.post,user:p.user}),
    h(VoteSection,{post:p.post,user:p.user,onNeedAuth:function(){p.onNeedAuth('signup');}}),

/* ── Create Post ── */
function CreatePost(p) {
  var ti=useState(''),title=ti[0],setTitle=ti[1];
  var co=useState(''),content=co[0],setContent=co[1];
  var ty=useState('confession'),type=ty[0],setType=ty[1];
  var tg=useState([]),tags=tg[0],setTags=tg[1];
  var ld=useState(false),loading=ld[0],setLoading=ld[1];

  function toggleTag(t){setTags(function(prev){return prev.includes(t)?prev.filter(function(x){return x!==t;}):[].concat(prev,[t]).slice(0,3);});}

  function submit(){
    if(!title.trim()||!content.trim()){p.addToast('Please fill in title and story','error');return;}
    setLoading(true);
    var np={id:Date.now()+'',title:title.trim(),content:content.trim(),type:type,tags:tags,
      anonymous_name:p.user.anonymous_name,created_at:new Date().toISOString(),
      reaction_counts:{'🔥':0,'😂':0,'😢':0,'😡':0},comment_count:0,vote_a:0,vote_b:0,user_id:p.user.id};
    if(sb&&p.user.id!=='demo'){
      (async function(){
        var r=await sb.from('posts').insert({title:np.title,content:np.content,type:type,tags:tags,user_id:p.user.id}).select().single();
        if(r.error){p.addToast(r.error.message,'error');setLoading(false);return;}
        np.id=r.data.id;
        var sk=bumpStreak();
        p.onPost(np);
        p.addToast(sk.count>1?'Posted! 🔥 '+sk.count+'-day streak!':'Posted anonymously 💔','success');
        setLoading(false);
      })();
    } else {
      setTimeout(function(){
        var sk=bumpStreak();
        p.onPost(np);
        p.addToast(sk.count>1?'Posted! 🔥 '+sk.count+'-day streak!':'Posted anonymously 💔','success');
        setLoading(false);
      },600);
    }
  }

  var types=[{id:'confession',icon:'💔',label:'Confession'},{id:'advice',icon:'💬',label:'Seeking Advice'},{id:'hot_take',icon:'🌶',label:'Hot Take (48h)'}];
  return h('div',{style:{animation:'fadeUp .4s ease both'}},
    h('button',{className:'bkbtn',onClick:p.onBack},'← Back'),
    h('div',{style:{marginBottom:24}},
      h('h1',{style:{fontFamily:"'Playfair Display',serif",fontSize:'clamp(24px,6vw,32px)',fontWeight:900,marginBottom:8}},'Share anonymously'),
      h('p',{style:{color:'var(--tx2)',fontSize:14}},'You\'ll appear as ',h('strong',{style:{color:'var(--rose)'}},'@'+p.user.anonymous_name))),
    h('div',{className:'card',style:{display:'flex',flexDirection:'column',gap:18}},
      h('div',null,
        h('label',{className:'flbl'},'Post type'),
        h('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
          types.map(function(t){
            return h('button',{key:t.id,className:'btn '+(type===t.id?'bp':'bs'),onClick:function(){setType(t.id);},style:{flex:'1 1 auto',justifyContent:'center'}},t.icon+' '+t.label);
          })),
        type==='hot_take'&&h('p',{style:{fontSize:12,color:'var(--amber)',marginTop:8}},'⏱ Hot takes expire after 48 hours.')),
      h('div',null,
        h('label',{className:'flbl'},'Title'),
        h('input',{className:'inp',placeholder:'Give your story a title that stops the scroll…',value:title,onChange:function(ev){setTitle(ev.target.value);},maxLength:120}),
        h('div',{style:{textAlign:'right',fontSize:12,color:'var(--tx3)',marginTop:4}},title.length+'/120')),
      h('div',null,
        h('label',{className:'flbl'},'Your story'),
        h('textarea',{className:'inp',rows:9,placeholder:'Share everything. Be honest. No one knows it\'s you.',value:content,onChange:function(ev){setContent(ev.target.value);}})),
      h('div',null,
        h('label',{className:'flbl'},'Tags ',h('span',{style:{color:'var(--tx3)'}},'(up to 3)')),
        h('div',{className:'pills'},
          TAGS.map(function(t){
            return h('button',{key:t,className:'pill '+(tags.includes(t)?'on':''),onClick:function(){toggleTag(t);}},t);
          }))),
      h('button',{className:'btn bp',onClick:submit,disabled:loading||!title.trim()||!content.trim(),
        style:{justifyContent:'center',padding:'14px',fontSize:15}},
        loading?h('span',{className:'spin'}):'💔 Post anonymously')));
}

    !showDel
      ?h('button',{className:'btn bs',style:{color:'#ef4444',borderColor:'rgba(239,68,68,.3)'},onClick:function(){setShowDel(true);}},'🗑 Delete account & data (GDPR)')
      :h('div',{className:'card',style:{borderColor:'rgba(239,68,68,.25)'}},
        h('p',{style:{fontSize:14,color:'var(--tx2)',marginBottom:12}},'Permanently deletes everything. Type DELETE to confirm.'),
        h('input',{className:'inp',placeholder:'Type DELETE',value:delC,onChange:function(ev){setDelC(ev.target.value);},style:{marginBottom:10}}),
        h('div',{style:{display:'flex',gap:10}},
          h('button',{className:'btn',style:{background:'linear-gradient(135deg,#ef4444,#dc2626)',color:'#fff'},onClick:delAccount,disabled:delC!=='DELETE'},'Confirm delete'),
          h('button',{className:'btn bg',onClick:function(){setShowDel(false);setDelC('');}}))));
}

/* ── Admin ── */
function AdminPanel(p) {
  var rs=useState([]),reports=rs[0],setReports=rs[1];
  var ld=useState(true),loading=ld[0],setLoading=ld[1];

  useEffect(function(){
    if(!sb) return;
    sb.from('reports').select('*,posts(title),comments(content)').order('created_at',{ascending:false})
      .then(function(r){if(r.data)setReports(r.data);setLoading(false);});
  },[]);

  function dismiss(id){
    setReports(function(prev){return prev.filter(function(r){return r.id!==id;});});
    if(sb) sb.from('reports').delete().eq('id',id);
    p.addToast('Dismissed','success');
  }
  function remove(report){
    if(sb){
      if(report.post_id) sb.from('posts').delete().eq('id',report.post_id);
      if(report.comment_id) sb.from('comments').delete().eq('id',report.comment_id);
      sb.from('reports').delete().eq('id',report.id);
    }
    setReports(function(prev){return prev.filter(function(r){return r.id!==report.id;});});
    p.addToast('Content removed','success');
  }

  return h('div',{style:{animation:'fadeUp .4s ease both'}},
    h('div',{style:{marginBottom:24}},
      h('h1',{style:{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:900}},'🛡 Admin'),
      h('p',{style:{color:'var(--tx2)',fontSize:14}},reports.length+' open reports')),
    loading
      ?h('div',{style:{display:'flex',justifyContent:'center',padding:40}},h('span',{className:'spin',style:{width:32,height:32}}))
      :reports.length===0
      ?h('div',{className:'empty'},h('div',{className:'empi'},'✅'),h('div',{className:'empt'},'Queue clear'))
      :reports.map(function(r){
        return h('div',{key:r.id,className:'adm'},
          h('div',{style:{flex:1}},
            h('div',{style:{fontSize:12,color:'var(--rose)',fontWeight:700,marginBottom:6,textTransform:'uppercase'}},r.reason),
            h('p',{style:{fontSize:14,color:'var(--tx2)',marginBottom:6}},(r.posts&&r.posts.title)||(r.comments&&r.comments.content)||'—'),
            h('div',{style:{fontSize:12,color:'var(--tx3)'}},ago(r.created_at))),
          h('div',{style:{display:'flex',gap:8,flexDirection:'column'}},
            h('button',{className:'btn bs',style:{padding:'6px 12px',fontSize:12},onClick:function(){dismiss(r.id);}},'Dismiss'),
            h('button',{className:'btn',style:{background:'linear-gradient(135deg,#ef4444,#dc2626)',color:'#fff',padding:'6px 12px',fontSize:12},onClick:function(){remove(r);}},'Remove')));
      }));
}

/* ════════════════════════════════════════════════════
   MAIN APP
════════════════════════════════════════════════════ */
function App() {
  var us=useState(null),user=us[0],setUser=us[1];
  var pg=useState('home'),page=pg[0],setPage=pg[1];
  var ps=useState(DPOSTS),posts=ps[0],setPosts=ps[1];
  var ac=useState(null),active=ac[0],setActive=ac[1];
  var tf=useState('all'),tagFilter=tf[0],setTagFilter=tf[1];
  var au=useState(null),auth=au[0],setAuth=au[1];
  var to=useState([]),toasts=to[0],setToasts=to[1];
  var ld=useState(false),loading=ld[0],setLoading=ld[1];
  var sp=useState(false),showPro=sp[0],setShowPro=sp[1];

  function addToast(msg,type) {
    var id=Date.now();
    setToasts(function(prev){return prev.concat([{id:id,msg:msg,type:type||'info'}]);});
    setTimeout(function(){setToasts(function(prev){return prev.filter(function(t){return t.id!==id;});});},3600);
  }

  // Supabase auth
  useEffect(function(){
    if(!sb) return;
    sb.auth.getSession().then(function(r){
      if(r.data&&r.data.session&&r.data.session.user) {
        sb.from('users').select('*').eq('id',r.data.session.user.id).single()
          .then(function(pr){if(pr.data)setUser(Object.assign({},r.data.session.user,{anonymous_name:pr.data.anonymous_name}));});
      }
    });
    var sub=sb.auth.onAuthStateChange(function(ev){if(ev==='SIGNED_OUT')setUser(null);});
    return function(){if(sub&&sub.data&&sub.data.subscription)sub.data.subscription.unsubscribe();};
  },[]);

  // Load posts
  useEffect(function(){
    if(!sb) return;
    setLoading(true);
    sb.from('posts').select('*,users(anonymous_name)').order('created_at',{ascending:false}).limit(60)
      .then(function(r){
        if(r.data&&r.data.length)
          setPosts(r.data.map(function(p){return Object.assign({},p,{anonymous_name:p.users&&p.users.anonymous_name});}));
        setLoading(false);
      });
  },[]);

  // Realtime new posts
  useEffect(function(){
    if(!sb) return;
    var ch=sb.channel('feed-rt')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},function(pl){
        sb.from('users').select('anonymous_name').eq('id',pl.new.user_id).single()
          .then(function(u){
            setPosts(function(prev){return [Object.assign({},pl.new,{anonymous_name:u.data&&u.data.anonymous_name,reaction_counts:{},comment_count:0,vote_a:0,vote_b:0})].concat(prev);});
          });
      }).subscribe();
    return function(){sb.removeChannel(ch);};
  },[]);

  function handleAuth(u){setUser(u);setAuth(null);bumpStreak();addToast('Welcome, @'+u.anonymous_name+'! 💔','success');}
  function logout(){if(sb)sb.auth.signOut();setUser(null);setPage('home');addToast('Logged out. Your secrets are safe.','info');}
  function openPost(post){setActive(post);setPage('detail');window.scrollTo({top:0,behavior:'smooth'});}
  function newPost(post){setPosts(function(prev){return [post].concat(prev);});setPage('home');}
  function needAuth(mode){setAuth(mode||'signup');}

  function getFeed() {
    var f = page==='confessions'?posts.filter(function(p){return p.type==='confession';})
           :page==='advice'?posts.filter(function(p){return p.type==='advice';})
           :posts;
    if(tagFilter!=='all') f=f.filter(function(p){return (p.tags||[]).includes(tagFilter);});
    var boosted=f.filter(function(p){return p.boosted;});
    var rest=[].concat(f.filter(function(p){return !p.boosted;})).sort(function(a,b){return feedScore(b)-feedScore(a);});
    return boosted.concat(rest);
  }

  var feed=getFeed();
  var isFeed=['home','confessions','advice'].includes(page);
  var titles={home:'Latest Stories',confessions:'Confessions',advice:'Seeking Advice'};
  var isAdmin=user&&user.email===ADMIN_EMAIL;
  var streak=getStreak();
  var navTabs=[{id:'home',l:'Home'},{id:'confessions',l:'Confessions'},{id:'advice',l:'Advice'},{id:'trending',l:'🔥 Trending'},{id:'profile',l:'👤 Profile'}];
  if(isAdmin) navTabs.push({id:'admin',l:'🛡 Admin'});

  return h('div',null,
    /* NAV */
    h('nav',{className:'nav'},
      h('div',{className:'nlogo',onClick:function(){setPage('home');setActive(null);}},'💔 HeartConfia'),
      h('div',{className:'ntabs'},
        navTabs.map(function(t){
          return h('button',{key:t.id,className:'ntab '+(page===t.id?'on':''),onClick:function(){setPage(t.id);setActive(null);}},t.l);
        })),
      h('div',{style:{display:'flex',alignItems:'center',gap:8,flexShrink:0}},
        user&&streak.count>0&&h('div',{className:'streakc',onClick:function(){setPage('profile');}},'🔥'+streak.count),
        user&&h(NotifBell,{user:user}),
        user
          ?h('div',{style:{display:'flex',gap:6,alignItems:'center'}},
            h('button',{className:'btn bp',style:{padding:'7px 12px',fontSize:13},onClick:function(){setPage('create');}},'+ Post'),
            h('button',{className:'btn bg',style:{fontSize:12,padding:'6px 8px'},onClick:logout},'Out'))
          :h('div',{style:{display:'flex',gap:6}},
            h('button',{className:'btn bg',style:{fontSize:12},onClick:function(){setAuth('login');}},'Login'),
            h('button',{className:'btn bp',style:{padding:'7px 12px',fontSize:13},onClick:function(){setAuth('signup');}},'Join free')))),

    /* LAYOUT */
    h('div',{className:'lay'},
      h('div',{className:'lc'},

        /* Config notice */
        !IS_CFG&&isFeed&&h('div',{className:'cnote'},
          h('strong',null,'⚙️ One step remaining:'),' Go to ',
          h('strong',null,'Supabase → Settings → API'),' and copy your ',
          h('code',null,'anon / public'),' key (NOT the service role key). ',
          'Replace ',h('code',null,'PASTE_ANON_KEY_HERE'),' in this file.',
          h('br',null),
          h('span',{style:{fontSize:12,color:'rgba(245,158,11,.7)'}},'Demo data is shown below so you can see the app working.')),

        /* Detail */
        page==='detail'&&active&&h(PostDetail,{post:active,user:user,onBack:function(){setPage('home');setActive(null);},onNeedAuth:needAuth}),

        /* Feed */
        isFeed&&h('div',null,
          page==='home'&&h('div',{className:'hero'},
            h('div',{className:'hey'},'anonymous · safe · real'),
            h('h1',{className:'htitle'},'HeartConfia'),
            h('p',{className:'hsub'},'Share the stories you\'ve never told anyone. No names. No judgment. Just hearts.'),
            user
              ?h('div',{style:{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}},
                h('button',{className:'btn bp',onClick:function(){setPage('create');}},'💔 Share your confession'),
                h('button',{className:'btn bs',onClick:function(){setShowPro(true);}},'💎 Go Pro'))
              :h('div',{style:{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}},
                h('button',{className:'btn bp',onClick:function(){setAuth('signup');}},'Join anonymously'),
                h('button',{className:'btn bs',onClick:function(){setAuth('login');}},'Log in'))),
          page!=='home'&&h('div',{className:'sh'},
            h('h2',{className:'st'},titles[page]),
            h('span',{className:'sbadge'},feed.length)),
          h('div',{className:'pills'},
            ['all'].concat(TAGS).map(function(t){
              return h('button',{key:t,className:'pill '+(tagFilter===t?'on':''),onClick:function(){setTagFilter(t);}},t==='all'?'All stories':t);
            })),
          user&&h('div',{className:'cpbar',onClick:function(){setPage('create');}},
            h('div',{className:'ava'},user.anonymous_name.charAt(0)),
            h('span',{style:{fontSize:14,color:'var(--tx3)'}},'Something\'s weighing on you. Share it as @'+user.anonymous_name+'…')),
          loading
            ?h('div',{style:{display:'flex',justifyContent:'center',padding:'60px 0'}},h('span',{className:'spin',style:{width:36,height:36}}))
            :feed.length===0
            ?h('div',{className:'empty'},h('div',{className:'empi'},'🕊️'),h('div',{className:'empt'},'Nothing here yet'),h('p',null,'Be the first to share.'))
            :feed.map(function(post,i){
              return h(PostCard,{key:post.id,post:post,user:user,onClick:function(){openPost(post);},onNeedAuth:needAuth,delay:Math.min(i*.06,.4)});
            })),

        /* Trending */
        page==='trending'&&h(TrendingPage,{posts:posts,user:user,onOpen:openPost,onNeedAuth:needAuth}),

        /* Create */
        page==='create'&&(user
          ?h(CreatePost,{user:user,onBack:function(){setPage('home');},onPost:newPost,addToast:addToast})
          :h('div',{style:{textAlign:'center',padding:'80px 20px'}},
            h('div',{style:{fontSize:46,marginBottom:14}},'🔒'),
            h('div',{className:'st'},'Sign in to share your confession'),
            h('div',{style:{marginTop:20,display:'flex',gap:12,justifyContent:'center'}},
              h('button',{className:'btn bp',onClick:function(){setAuth('signup');}},'Sign up free'),
              h('button',{className:'btn bs',onClick:function(){setAuth('login');}},'Log in')))),

        /* Profile */
        page==='profile'&&h(ProfilePage,{user:user,posts:posts,onBack:function(){setPage('home');},addToast:addToast,onNeedAuth:needAuth,onOpenPost:openPost}),

        /* Admin */
        page==='admin'&&isAdmin&&h(AdminPanel,{user:user,addToast:addToast}))),

    /* Modals */
    auth&&h(AuthModal,{initMode:auth,onClose:function(){setAuth(null);},onAuth:handleAuth}),
    showPro&&h(ProModal,{onClose:function(){setShowPro(false);}}),
    h(Toasts,{items:toasts}));
}

/* ════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════ */
try {
  RD.createRoot(document.getElementById('root')).render(h(App,null));
} catch(e) {
  document.getElementById('root').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;padding:20px;text-align:center">'
    +'<div style="font-size:48px">💔</div>'
    +'<div style="font-family:Georgia,serif;font-size:22px;color:#f0eef8">Something went wrong</div>'
    +'<p style="color:#9a96b4;font-size:14px;max-width:380px">'+e.message+'</p>'
    +'<button onclick="location.reload()" style="background:#ff4d6d;color:#fff;border:none;border-radius:50px;padding:12px 24px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px">Reload</button>'
    +'</div>';
}

})();
