<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<!-- Open Graph / Social Sharing -->
<meta property="og:title" content="HeartConfia — Anonymous Relationship Confessions"/>
<meta property="og:description" content="Share the stories you've never told anyone. No names. No judgment. Just hearts."/>
<meta property="og:type" content="website"/>
<meta property="og:image" content="https://heartconfia.com/og.png"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="HeartConfia"/>
<meta name="twitter:description" content="Anonymous relationship confessions. Read, react, vote."/>
<title>HeartConfia — Anonymous Relationship Confessions</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#22223a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0eef8;--text2:#9a96b4;--text3:#5e5a78;
  --rose:#ff4d6d;--rose-dim:rgba(255,77,109,0.15);--rose-glow:rgba(255,77,109,0.3);
  --violet:#7c3aed;--violet-dim:rgba(124,58,237,0.15);
  --amber:#f59e0b;--teal:#14b8a6;--green:#22c55e;
  --glow:0 0 40px rgba(255,77,109,0.12);
  --radius:16px;
  --font-display:'Playfair Display',serif;
  --font-body:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.3}
#root{min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes heartbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.3)}30%{transform:scale(1)}45%{transform:scale(1.15)}60%{transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{0%{transform:scale(0.85);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes countdownPulse{0%,100%{color:var(–rose)}50%{color:#c9184a}}

.fade-up{animation:fadeUp .45s ease forwards}
.pop-in{animation:popIn .3s ease forwards}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:50px;font-family:var(–font-body);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s ease;text-decoration:none;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(–rose),#c9184a);color:#fff;box-shadow:0 4px 20px var(–rose-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(255,77,109,.45)}
.btn-secondary{background:var(–surface2);color:var(–text);border:1px solid var(–border)}
.btn-secondary:hover{background:var(–surface3);border-color:var(–border2)}
.btn-ghost{background:transparent;color:var(–text2);padding:8px 14px}
.btn-ghost:hover{color:var(–text);background:var(–surface2)}
.btn-violet{background:linear-gradient(135deg,var(–violet),#5b21b6);color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.3)}
.btn-violet:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(124,58,237,.45)}
.btn-teal{background:linear-gradient(135deg,var(–teal),#0d9488);color:#fff;box-shadow:0 4px 16px rgba(20,184,166,.3)}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}

/* Inputs */
.input{width:100%;padding:12px 16px;background:var(–surface2);border:1px solid var(–border);border-radius:12px;color:var(–text);font-family:var(–font-body);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
.input:focus{border-color:var(–rose);box-shadow:0 0 0 3px rgba(255,77,109,.12)}
.input::placeholder{color:var(–text3)}
textarea.input{resize:vertical;min-height:120px;line-height:1.65}

/* Cards */
.card{background:var(–surface);border:1px solid var(–border);border-radius:var(–radius);padding:20px;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:rgba(255,77,109,.2);box-shadow:var(–glow)}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.tag-cheating{background:rgba(239,68,68,.12);color:#ef4444}
.tag-breakup{background:var(–rose-dim);color:var(–rose)}
.tag-dating{background:var(–violet-dim);color:#a78bfa}
.tag-marriage{background:rgba(20,184,166,.12);color:var(–teal)}
.tag-situationship{background:rgba(245,158,11,.12);color:var(–amber)}
.tag-hot{background:rgba(255,77,109,.2);color:var(–rose);animation:countdownPulse 2s ease infinite}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;height:60px;z-index:100;background:rgba(10,10,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(–border);display:flex;align-items:center;padding:0 14px;gap:10px}
.nav-logo{font-family:var(–font-display);font-size:19px;font-weight:900;color:var(–rose);text-shadow:0 0 28px rgba(255,77,109,.45);cursor:pointer;flex-shrink:0;user-select:none;display:inline-flex;align-items:center;gap:5px;animation:heartbeat 3.5s ease-in-out infinite}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:6px 12px;border-radius:50px;font-size:13px;font-weight:500;cursor:pointer;color:var(–text2);transition:all .2s;border:none;background:transparent;white-space:nowrap;font-family:var(–font-body)}
.nav-tab:hover{color:var(–text);background:var(–surface2)}
.nav-tab.active{color:var(–rose);background:var(–rose-dim)}

/* Layout */
.layout{display:grid;grid-template-columns:1fr min(700px,100%) 1fr;min-height:100vh;padding-top:60px}
.layout-center{grid-column:2;padding:24px 16px 80px}

/* Post card */
.post-card{background:var(–surface);border:1px solid var(–border);border-radius:var(–radius);padding:20px;margin-bottom:12px;cursor:pointer;transition:all .25s ease;animation:fadeUp .4s ease both;position:relative;overflow:hidden}
.post-card::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(–rose),var(–violet));opacity:0;transition:opacity .2s}
.post-card:hover{border-color:rgba(255,77,109,.28);transform:translateY(-2px);box-shadow:var(–glow)}
.post-card:hover::before{opacity:1}
.post-card.boosted{border-color:rgba(245,158,11,.3)!important}
.post-card.boosted::before{opacity:1;background:linear-gradient(90deg,var(–amber),var(–rose))!important}
.post-card.hot-take{border-color:rgba(255,77,109,.25)!important}

.post-type-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.post-type-badge.confession{color:var(–rose)}
.post-type-badge.advice{color:#a78bfa}
.post-type-badge.hot_take{color:var(–amber);animation:countdownPulse 2s ease infinite}

.post-title{font-family:var(–font-display);font-size:18px;font-weight:700;line-height:1.35;color:var(–text);margin-bottom:10px}
.post-preview{font-size:14px;line-height:1.7;color:var(–text2);margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.post-meta{display:flex;align-items:center;gap:10px;font-size:13px;color:var(–text3);margin-bottom:14px;flex-wrap:wrap}
.post-meta-dot{width:3px;height:3px;border-radius:50%;background:var(–text3);flex-shrink:0}
.anon-name{color:var(–text2);font-weight:600}

/* Reactions */
.post-reactions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.reaction-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:50px;background:var(–surface2);border:1px solid var(–border);cursor:pointer;font-size:13px;font-weight:500;color:var(–text2);transition:all .2s;font-family:var(–font-body)}
.reaction-btn:hover{background:var(–surface3);color:var(–text);transform:scale(1.06)}
.reaction-btn.active{background:var(–rose-dim);border-color:rgba(255,77,109,.35);color:var(–rose)}
.comment-count{display:flex;align-items:center;gap:5px;font-size:13px;color:var(–text3)}

/* Blur / Paywall */
.blur-wrap{position:relative;max-height:80px;overflow:hidden}
.blur-wrap::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,var(–surface))}
.paywall{margin:12px -20px -20px;padding:24px 20px;background:linear-gradient(to bottom,transparent,var(–surface) 18%);text-align:center;border-top:1px solid var(–border);border-radius:0 0 var(–radius) var(–radius)}
.paywall-icon{font-size:30px;margin-bottom:8px}
.paywall-title{font-family:var(–font-display);font-size:17px;font-weight:700;color:var(–text);margin-bottom:6px}
.paywall-sub{font-size:13px;color:var(–text2);margin-bottom:16px}
.paywall-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* Auth modal */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeUp .2s ease}
.modal{background:var(–surface);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:36px;width:100%;max-width:420px;position:relative;animation:popIn .35s ease;max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:14px;right:14px;background:var(–surface2);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(–text2);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:var(–surface3);color:var(–text)}
.modal-logo{font-family:var(–font-display);font-size:26px;font-weight:900;color:var(–rose);text-align:center;margin-bottom:6px}
.modal-sub{text-align:center;color:var(–text2);font-size:14px;margin-bottom:26px}
.modal-form{display:flex;flex-direction:column;gap:14px}
.form-label{font-size:13px;font-weight:500;color:var(–text2);margin-bottom:5px;display:block}
.modal-switch{text-align:center;font-size:14px;color:var(–text2);margin-top:18px}
.modal-switch button{background:none;border:none;color:var(–rose);cursor:pointer;font-weight:600;font-size:14px;font-family:var(–font-body)}
.modal-tabs{display:flex;gap:4px;background:var(–surface2);border-radius:12px;padding:4px;margin-bottom:24px}
.modal-tab{flex:1;padding:8px;border-radius:9px;border:none;background:transparent;color:var(–text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:var(–font-body)}
.modal-tab.active{background:var(–rose-dim);color:var(–rose)}

/* Notification */
.notif-wrap{position:relative}
.notif-btn{background:var(–surface2);border:1px solid var(–border);border-radius:50%;width:36px;height:36px;cursor:pointer;color:var(–text2);font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative}
.notif-btn:hover{background:var(–surface3);color:var(–text)}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(–rose);color:#fff;font-size:10px;font-weight:700;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(–bg)}
.notif-panel{position:absolute;top:calc(100% + 10px);right:-8px;width:320px;background:var(–surface);border:1px solid var(–border);border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,.5);z-index:200;max-height:400px;overflow-y:auto;animation:fadeUp .2s ease}
.notif-item{padding:12px 16px;border-bottom:1px solid var(–border);transition:background .2s;cursor:pointer}
.notif-item:hover{background:var(–surface2)}
.notif-item.unread{background:rgba(255,77,109,.05)}
.notif-item:last-child{border-bottom:none}
.notif-msg{font-size:13px;color:var(–text2);line-height:1.5;margin-bottom:3px}
.notif-time{font-size:11px;color:var(–text3)}
.notif-dot{width:7px;height:7px;border-radius:50%;background:var(–rose);flex-shrink:0;margin-top:4px}
.notif-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(–border)}

/* Streak & Karma chips */
.streak-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:50px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);color:var(–amber);font-size:12px;font-weight:700;cursor:pointer}
.karma-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:50px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.25);color:#a78bfa;font-size:12px;font-weight:700;cursor:pointer}

/* Countdown timer */
.hot-timer{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:50px;background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.25);font-size:12px;font-weight:700;color:var(–rose);animation:pulse 2s ease infinite}

/* Post detail */
.post-detail-title{font-family:var(–font-display);font-size:clamp(22px,5vw,30px);font-weight:900;line-height:1.2;color:var(–text);margin-bottom:16px}
.post-detail-content{font-size:16px;line-height:1.9;color:var(–text2);white-space:pre-wrap}

/* Vote */
.vote-section{background:var(–surface2);border:1px solid var(–border);border-radius:var(–radius);padding:20px;margin:24px 0}
.vote-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(–text3);margin-bottom:16px}
.vote-options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.vote-btn{padding:14px 12px;border-radius:12px;border:1px solid var(–border);background:var(–surface);cursor:pointer;text-align:center;font-family:var(–font-body);font-size:14px;font-weight:600;color:var(–text2);transition:all .2s;line-height:1.4}
.vote-btn:hover{background:var(–surface3);color:var(–text)}
.vote-btn.voted-a{background:var(–rose-dim);border-color:rgba(255,77,109,.4);color:var(–rose)}
.vote-btn.voted-b{background:var(–violet-dim);border-color:rgba(124,58,237,.4);color:#a78bfa}
.vote-bar-track{height:8px;border-radius:4px;background:var(–surface3);overflow:hidden;margin-top:14px;display:flex}
.vote-bar-a{height:100%;background:linear-gradient(90deg,var(–rose),#c9184a);transition:width .6s ease}
.vote-bar-b{height:100%;background:linear-gradient(90deg,var(–violet),#5b21b6);transition:width .6s ease}
.vote-foot{display:flex;justify-content:space-between;font-size:12px;color:var(–text3);margin-top:6px}

/* Comments */
.comment-input-row{display:flex;gap:12px;margin-bottom:24px;align-items:flex-start}
.avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(–rose),var(–violet));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.avatar.sm{width:28px;height:28px;font-size:10px}
.comment-card{padding:14px 16px;background:var(–surface2);border:1px solid var(–border);border-radius:12px;margin-bottom:10px;animation:slideIn .3s ease}
.comment-card.best{border-color:rgba(20,184,166,.35)}
.comment-author{font-size:13px;font-weight:600;color:var(–text)}
.comment-time{font-size:12px;color:var(–text3)}
.comment-body{font-size:14px;line-height:1.65;color:var(–text2);margin-top:6px}
.comment-actions{display:flex;gap:12px;margin-top:8px}
.c-btn{display:flex;align-items:center;gap:4px;font-size:12px;color:var(–text3);background:none;border:none;cursor:pointer;transition:color .2s;font-family:var(–font-body)}
.c-btn:hover{color:var(–rose)}
.c-btn.upvoted{color:var(–rose)}
.best-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(–teal);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}

/* Story updates */
.update-card{background:rgba(20,184,166,.04);border:1px solid rgba(20,184,166,.2);border-radius:12px;padding:12px 16px;margin-bottom:8px}
.update-label{font-size:11px;color:var(–teal);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em}

/* Section */
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.section-title{font-family:var(–font-display);font-size:22px;font-weight:700;color:var(–text)}
.section-badge{padding:3px 10px;border-radius:50px;background:var(–rose-dim);color:var(–rose);font-size:12px;font-weight:700}
.section-badge.violet{background:var(–violet-dim);color:#a78bfa}
.section-badge.teal{background:rgba(20,184,166,.12);color:var(–teal)}
.section-badge.amber{background:rgba(245,158,11,.12);color:var(–amber)}

/* Filter pills */
.pills{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:20px}
.pills::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;border-radius:50px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(–border);background:var(–surface);color:var(–text2);transition:all .2s;white-space:nowrap;font-family:var(–font-body)}
.pill:hover{border-color:rgba(255,77,109,.3);color:var(–rose)}
.pill.active{background:var(–rose-dim);border-color:rgba(255,77,109,.4);color:var(–rose)}
.pill.violet.active{background:var(–violet-dim);border-color:rgba(124,58,237,.4);color:#a78bfa}

/* Create prompt */
.create-prompt-bar{background:linear-gradient(135deg,rgba(255,77,109,.07),rgba(124,58,237,.05));border:1px solid rgba(255,77,109,.14);border-radius:var(–radius);padding:16px 20px;margin-bottom:20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.create-prompt-bar:hover{border-color:rgba(255,77,109,.3)}
.create-prompt-text{font-size:14px;color:var(–text3)}

/* Hero */
.hero{text-align:center;padding:40px 0 32px;position:relative}
.hero::before{content:’’;position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(255,77,109,.1),transparent 70%);pointer-events:none}
.hero-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(–rose);margin-bottom:12px}
.hero-title{font-family:var(–font-display);font-size:clamp(34px,9vw,58px);font-weight:900;line-height:1.08;background:linear-gradient(140deg,var(–text) 35%,var(–rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
.hero-sub{font-size:15px;color:var(–text2);max-width:360px;margin:0 auto 26px;line-height:1.65}

/* Profile stats */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-box{background:var(–surface2);border:1px solid var(–border);border-radius:12px;padding:16px;text-align:center}
.stat-num{font-family:var(–font-display);font-size:28px;font-weight:900;color:var(–text)}
.stat-lbl{font-size:12px;color:var(–text3);margin-top:4px}

/* Badge chips */
.badge-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.badge-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:50px;background:var(–surface2);border:1px solid var(–border);font-size:13px;font-weight:600;color:var(–text2)}

/* Pro */
.pro-feature{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(–border)}
.pro-feature:last-child{border-bottom:none}

/* Controversy meter */
.controversy-bar{height:6px;border-radius:3px;background:var(–surface3);overflow:hidden;display:flex;margin-top:6px}
.controversy-fill-a{height:100%;background:linear-gradient(90deg,var(–rose),#c9184a);transition:width .5s ease}
.controversy-fill-b{height:100%;background:linear-gradient(90deg,var(–violet),#5b21b6);transition:width .5s ease}

/* Report modal */

});

}

/* ═══════════════════════════════════════════════════════════════  NOTIFICATION BELL  */
function NotifBell({user}){
const [notifs,setNotifs]=useState([]);
const [open,setOpen]=useState(false);
const ref=useRef();
const unread=notifs.filter(n=>!n.read).length;

useEffect(()=>{
if(!supabase||!user) return;
supabase.from(‘notifications’).select(’*’).eq(‘user_id’,user.id)
.order(‘created_at’,{ascending:false}).limit(25)
.then(({data})=>{if(data) setNotifs(data);});
const ch=supabase.channel(`notifs-${user.id}`)
.on(‘postgres_changes’,{event:‘INSERT’,schema:‘public’,table:‘notifications’,filter:`user_id=eq.${user.id}`},
p=>setNotifs(prev=>[p.new,…prev])).subscribe();
return()=>supabase.removeChannel(ch);
},[user?.id]);

useEffect(()=>{
function close(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
document.addEventListener(‘mousedown’,close);
return()=>document.removeEventListener(‘mousedown’,close);
},[]);

function toggleOpen(){
setOpen(o=>!o);
if(!open && unread>0){
setNotifs(p=>p.map(n=>({…n,read:true})));
if(supabase) supabase.from(‘notifications’).update({read:true}).eq(‘user_id’,user.id);
}
}

const icons={comment:‘💬’,reaction:‘🔥’,vote:‘⚖️’,trending:‘🚀’,reply:‘↩’};

return (

/* ═══════════════════════════════════════════════════════════════  POST CARD  */
function PostCard({post,user,onClick,onNeedAuth,delay=0}){
const [reactions,setReactions]=useState(post.reaction_counts||{});
const [mine,setMine]=useState(null);
const [timer,setTimer]=useState(post.type===‘hot_take’?hotTakeRemaining(post.created_at):null);
const [showReport,setShowReport]=useState(false);
const [addToast]=useState(()=>()=>{});

useEffect(()=>{
if(post.type!==‘hot_take’) return;
const iv=setInterval(()=>setTimer(hotTakeRemaining(post.created_at)),60000);
return()=>clearInterval(iv);
},[]);

const isExpired = post.type===‘hot_take’ && !timer;

async function react(e,type){
e.stopPropagation();
if(!user){onNeedAuth(‘signup’);return;}
const prev=mine,r={…reactions};
if(prev===type){r[type]=Math.max(0,(r[type]||1)-1);setMine(null);}
else{if(prev)r[prev]=Math.max(0,(r[prev]||1)-1);r[type]=(r[type]||0)+1;setMine(type);}
setReactions(r);
if(supabase&&user.id!==‘demo’){
if(prev) await supabase.from(‘reactions’).delete().match({post_id:post.id,user_id:user.id,type:prev});
if(prev!==type){
await supabase.from(‘reactions’).insert({post_id:post.id,user_id:user.id,type});
// Notify post owner
if(post.user_id&&post.user_id!==user.id)
await supabase.from(‘notifications’).insert({user_id:post.user_id,type:‘reaction’,post_id:post.id,actor_name:user.anonymous_name,message:`@${user.anonymous_name} reacted ${type} to your confession`,read:false});
}
}
}

const totalRx=Object.values(reactions).reduce((s,v)=>s+v,0);
const topRx=Object.entries(reactions).sort(([,a],[,b])=>b-a)[0];
const isBoosted=post.boosted;

return (
<>
<div className={`post-card ${isBoosted?'boosted':''} ${post.type==='hot_take'?'hot-take':''}`}
onClick={onClick} style={{animationDelay:`${delay}s`}}>
{isBoosted&&<div className="boost-banner">⚡ Boosted</div>}
<div style={{display:‘flex’,justifyContent:‘space-between’,alignItems:‘flex-start’,marginBottom:10}}>
<div style={{display:‘flex’,flexDirection:‘column’,gap:6}}>
<span className={`post-type-badge ${post.type}`}>
{post.type===‘confession’?‘💔 Confession’:post.type===‘advice’?‘💬 Seeking Advice’:‘🌶 Hot Take’}
</span>
{post.type===‘hot_take’&&(
<span className="hot-timer">
{isExpired?‘⏰ Expired’:‘⏱ ‘+timer+’ left’}
</span>
)}
</div>
<div style={{display:‘flex’,gap:6,flexWrap:‘wrap’,justifyContent:‘flex-end’,alignItems:‘center’}}>
{post.tags?.slice(0,2).map(t=><span key={t} className={`tag tag-${t}`}>{t}</span>)}
<button style={{background:‘none’,border:‘none’,color:‘var(–text3)’,cursor:‘pointer’,fontSize:16,padding:‘0 4px’}}
onClick={e=>{e.stopPropagation();setShowReport(true);}}>⋯</button>
</div>
</div>
<h2 className="post-title">{post.title}</h2>
<div className="post-meta">
<span className="anon-name">@{post.anonymous_name}</span>
<span className="post-meta-dot"/>
<span>{timeAgo(post.created_at)}</span>
{totalRx>0&&<><span className="post-meta-dot"/><span>{topRx[0]} {totalRx.toLocaleString()}</span></>}
</div>
{user?(
<p className="post-preview">{post.content}</p>
):(
<>
<div className="blur-wrap"><p style={{fontSize:14,lineHeight:1.7,color:‘var(–text2)’}}>{post.content.slice(0,160)}…</p></div>
<Paywall onSignup={()=>onNeedAuth(‘signup’)} onLogin={()=>onNeedAuth(‘login’)}/>
</>
)}
{user&&(
<div className="post-reactions">
{REACTIONS.map(r=>(
<button key={r} className={`reaction-btn ${mine===r?'active':''}`} onClick={e=>react(e,r)}>
{r} <span>{(reactions[r]||0)>0?(reactions[r]||0).toLocaleString():’’}</span>
</button>
))}
<div className="comment-count">💬 {(post.comment_count||0).toLocaleString()}</div>
<button style={{background:‘none’,border:‘none’,color:‘var(–text3)’,cursor:‘pointer’,fontSize:13,marginLeft:‘auto’,fontFamily:‘var(–font-body)’,display:‘flex’,alignItems:‘center’,gap:4}}
onClick={e=>{e.stopPropagation();shareAsImage(post);}}>
↗ Share
</button>
</div>
)}
</div>
{showReport&&<ReportModal postId={post.id} user={user} onClose={()=>setShowReport(false)} addToast={()=>{}}/>}
</>
);
}

/* ═══════════════════════════════════════════════════════════════  COMMENTS  */
function Comments({postId,postOwnerId,user,onNeedAuth}){
const [comments,setComments]=useState(DEMO_COMMENTS[postId]||[]);
const [text,setText]=useState(’’);
const [sending,setSending]=useState(false);
const [upvoted,setUpvoted]=useState({});
const [showReport,setShowReport]=useState(null);

useEffect(()=>{
if(!supabase) return;
supabase.from(‘comments’).select(’*’).eq(‘post_id’,postId).order(‘upvotes’,{ascending:false})
.then(({data})=>{if(data?.length) setComments(data);});
const ch=supabase.channel(`comments-${postId}`)
.on(‘postgres_changes’,{event:‘INSERT’,schema:‘public’,table:‘comments’,filter:`post_id=eq.${postId}`},
p=>setComments(prev=>[p.new,…prev])).subscribe();
return()=>supabase.removeChannel(ch);
},[postId]);

async function post(){
if(!user){onNeedAuth();return;}
if(!text.trim()) return;
setSending(true);
const c={id:Date.now()+’’,anonymous_name:user.anonymous_name,content:text.trim(),created_at:new Date().toISOString(),upvotes:0,user_id:user.id};
setComments(prev=>[c,…prev]);
setText(’’);
if(supabase&&user.id!==‘demo’){
await supabase.from(‘comments’).insert({post_id:postId,user_id:user.id,content:c.content});
if(postOwnerId&&postOwnerId!==user.id)
await supabase.from(‘notifications’).insert({user_id:postOwnerId,type:‘comment’,post_id:postId,actor_name:user.anonymous_name,message:`@${user.anonymous_name} commented on your confession`,read:false});
}
setSending(false);
}

function upvote(cId){
if(!user){onNeedAuth();return;}
if(upvoted[cId]) return;
setComments(p=>p.map(c=>c.id===cId?{…c,upvotes:(c.upvotes||0)+1}:c));
setUpvoted(p=>({…p,[cId]:true}));
}

const sorted=[…comments].sort((a,b)=>{
const topId=[…comments].sort((x,y)=>(y.upvotes||0)-(x.upvotes||0))[0]?.id;
if(a.id===topId) return -1; if(b.id===topId) return 1;
return (b.upvotes||0)-(a.upvotes||0);
});
const bestId=comments.length>2?[…comments].sort((a,b)=>(b.upvotes||0)-(a.upvotes||0))[0]?.id:null;

return (
<div>
<div className="section-header" style={{marginBottom:16}}>
<span className="section-title" style={{fontSize:18}}>Comments</span>
<span className="section-badge">{comments.length}</span>
</div>
<div className="comment-input-row">
<div className="avatar">{user?user.anonymous_name?.charAt(0):’?’}</div>
<div style={{flex:1}}>
<textarea className=“input” rows={3} style={{minHeight:76}}
placeholder={user?`Reply as @${user.anonymous_name}…`:‘Log in to comment’}
value={text} onChange={e=>setText(e.target.value)} disabled={!user}/>
{user
?<button className="btn btn-primary" style={{marginTop:8}} onClick={post} disabled={!text.trim()||sending}>
{sending?<span className="spinner"/>:‘Post comment’}</button>
:<button className="btn btn-secondary" style={{marginTop:8}} onClick={onNeedAuth}>Log in to comment</button>
}
</div>
</div>
{sorted.map(c=>(
<div key={c.id} className={`comment-card ${c.id===bestId?'best':''}`}>
{c.id===bestId&&<div className="best-badge">✅ Top answer</div>}
<div style={{display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’}}>
<span className="comment-author">@{c.anonymous_name}</span>
<div style={{display:‘flex’,gap:8,alignItems:‘center’}}>
<span className="comment-time">{timeAgo(c.created_at)}</span>
<button style={{background:‘none’,border:‘none’,color:‘var(–text3)’,cursor:‘pointer’,fontSize:14}} onClick={()=>setShowReport(c.id)}>⋯</button>
</div>
</div>
<p className="comment-body">{c.content}</p>
<div className="comment-actions">
<button className={`c-btn ${upvoted[c.id]?'upvoted':''}`} onClick={()=>upvote(c.id)}>
{upvoted[c.id]?‘❤️’:‘🤍’} {(c.upvotes||0).toLocaleString()}
</button>
<button className="c-btn">↩ Reply</button>
</div>
</div>
))}
{showReport&&<ReportModal commentId={showReport} user={user} onClose={()=>setShowReport(null)} addToast={()=>{}}/>}
</div>
);
}

function AdminPanel({user,addToast}){
const [reports,setReports]=useState([]);
const [loading,setLoading]=useState(true);

useEffect(()=>{
if(!supabase) return;
supabase.from(‘reports’).select(’*,posts(title),comments(content)’).order(‘created_at’,{ascending:false})
.then(({data})=>{if(data) setReports(data);setLoading(false);});
},[]);

async function dismiss(id){
setReports(p=>p.filter(r=>r.id!==id));
if(supabase) await supabase.from(‘reports’).delete().eq(‘id’,id);
addToast(‘Report dismissed’,‘success’);
}
async function remove(report){
if(supabase){
if(report.post_id) await supabase.from(‘posts’).delete().eq(‘id’,report.post_id);
if(report.comment_id) await supabase.from(‘comments’).delete().eq(‘id’,report.comment_id);
await supabase.from(‘reports’).delete().eq(‘id’,report.id);
}
setReports(p=>p.filter(r=>r.id!==report.id));
addToast(‘Content removed’,‘success’);
}

return (
<div className="fade-up">
<button style={{background:‘none’,border:‘none’,color:‘var(–text2)’,cursor:‘pointer’,fontFamily:‘var(–font-body)’,fontSize:14,marginBottom:20,display:‘flex’,alignItems:‘center’,gap:7}} onClick={()=>window.history.back()}>← Back</button>
<div style={{marginBottom:24}}>
<h1 style={{fontFamily:‘var(–font-display)’,fontSize:28,fontWeight:900}}>Admin Panel</h1>
<p style={{color:‘var(–text2)’,fontSize:14}}>Moderation queue · {reports.length} open reports</p>
</div>
{loading?<div style={{display:‘flex’,justifyContent:‘center’,padding:40}}><span className="spinner" style={{width:32,height:32}}/></div>
:reports.length===0?(<div className="empty-state"><div className="empty-icon">✅</div><div className="empty-title">Queue clear</div><p>No pending reports.</p></div>)
:reports.map(r=>(
<div key={r.id} className="admin-report">
<div style={{flex:1}}>
<div style={{fontSize:12,color:‘var(–rose)’,fontWeight:700,marginBottom:6,textTransform:‘uppercase’}}>
{r.reason}
</div>
<p style={{fontSize:14,color:‘var(–text2)’,marginBottom:6}}>
{r.posts?.title||r.comments?.content||‘Content unavailable’}
</p>
<div style={{fontSize:12,color:‘var(–text3)’}}>{timeAgo(r.created_at)}</div>
</div>
<div style={{display:‘flex’,gap:8,flexShrink:0,flexDirection:‘column’}}>
<button className=“btn btn-secondary” style={{padding:‘6px 12px’,fontSize:12}} onClick={()=>dismiss(r.id)}>Dismiss</button>
<button className=“btn btn-danger” style={{padding:‘6px 12px’,fontSize:12}} onClick={()=>remove(r)}>Remove</button>
</div>
</div>
))}
</div>
);
}

function App(){
const [user,setUser]=useState(null);
const [page,setPage]=useState(‘home’);
const [posts,setPosts]=useState(DEMO_POSTS);
const [active,setActive]=useState(null);
const [tagFilter,setTagFilter]=useState(‘all’);
const [auth,setAuth]=useState(null);
const [toasts,setToasts]=useState([]);
const [loading,setLoading]=useState(false);
const [showPro,setShowPro]=useState(false);
const streak=getStreak();

function addToast(msg,type=‘info’){
const id=Date.now();
setToasts(p=>[…p,{id,msg,type}]);
setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3600);
}

/* Supabase session */
useEffect(()=>{
if(!supabase) return;
supabase.auth.getSession().then(({data:{session}})=>{
if(session?.user)
supabase.from(‘users’).select(’*’).eq(‘id’,session.user.id).single()
.then(({data})=>setUser({…session.user,anonymous_name:data?.anonymous_name}));
});
supabase.auth.onAuthStateChange(ev=>{if(ev===‘SIGNED_OUT’) setUser(null);});
},[]);

/* Load posts */
useEffect(()=>{
if(!supabase) return;
setLoading(true);
supabase.from(‘posts’).select(’*,users(anonymous_name)’).order(‘created_at’,{ascending:false}).limit(60)
.then(({data})=>{
if(data?.length) setPosts(data.map(p=>({…p,anonymous_name:p.users?.anonymous_name})));
setLoading(false);
});
},[]);

/* Realtime new posts */
useEffect(()=>{
if(!supabase) return;
const ch=supabase.channel(‘feed-posts’)
.on(‘postgres_changes’,{event:‘INSERT’,schema:‘public’,table:‘posts’},async p=>{
const{data:u}=await supabase.from(‘users’).select(‘anonymous_name’).eq(‘id’,p.new.user_id).single();
setPosts(prev=>[{…p.new,anonymous_name:u?.anonymous_name,reaction_counts:{},comment_count:0,vote_a:0,vote_b:0},…prev]);
}).subscribe();
return()=>supabase.removeChannel(ch);
},[]);

function handleAuth(u){
setUser(u); setAuth(null);
bumpStreak();
addToast(`Welcome, @${u.anonymous_name}! 💔`,‘success’);
}
function logout(){
if(supabase) supabase.auth.signOut();
setUser(null); setPage(‘home’);
addToast(‘Logged out. Your secrets are safe.’,‘info’);
}
function openPost(post){setActive(post);setPage(‘detail’);window.scrollTo({top:0,behavior:‘smooth’});}
function handleNewPost(post){setPosts(p=>[post,…p]);setPage(‘home’);}
function needAuth(mode=‘signup’){setAuth(mode);}

/* Feed filtering + ranking */
function getFeed(){
let f=page===‘confessions’?posts.filter(p=>p.type===‘confession’)
:page===‘advice’?posts.filter(p=>p.type===‘advice’)
:posts;
if(tagFilter!==‘all’) f=f.filter(p=>p.tags?.includes(tagFilter));
// Boosted posts first, then ranked
const boosted=f.filter(p=>p.boosted);
const rest=[…f.filter(p=>!p.boosted)].sort((a,b)=>feedScore(b)-feedScore(a));
return […boosted,…rest];
}

const feed=getFeed();
const isFeed=[‘home’,‘confessions’,‘advice’].includes(page);
const titles={home:‘Latest Stories’,confessions:‘Confessions’,advice:‘Seeking Advice’};
const isAdmin=user?.email===ADMIN_EMAIL;

const navTabs=[
{id:‘home’,label:‘Home’},
{id:‘confessions’,label:‘Confessions’},
{id:‘advice’,label:‘Advice’},
{id:‘trending’,label:‘🔥 Trending’},
{id:‘profile’,label:‘👤 Profile’},
…(isAdmin?[{id:‘admin’,label:‘🛡 Admin’}]:[]),
];

return (
<ErrorBoundary>
{/* NAV */}
<nav className="nav">
<div className=“nav-logo” onClick={()=>{setPage(‘home’);setActive(null);}}>💔 HC</div>
<div className="nav-tabs">
{navTabs.map(tab=>(
<button key={tab.id} className={`nav-tab ${page===tab.id?'active':''}`}
onClick={()=>{setPage(tab.id);setActive(null);}}>
{tab.label}
</button>
))}
</div>
<div style={{display:‘flex’,alignItems:‘center’,gap:8,flexShrink:0}}>
{user&&streak.count>0&&(
<div className=“streak-chip” onClick={()=>setPage(‘profile’)} title=“Your posting streak”>
🔥{streak.count}
</div>
)}
{user&&<NotifBell user={user}/>}
{user?(
<>
<button className=“btn btn-primary” style={{padding:‘7px 12px’,fontSize:13}} onClick={()=>setPage(‘create’)}>+ Post</button>
<button className=“btn btn-ghost” style={{fontSize:12,padding:‘6px 10px’}} onClick={logout}>Out</button>
</>
):(
<>
<button className=“btn btn-ghost” style={{fontSize:12}} onClick={()=>setAuth(‘login’)}>Login</button>
<button className=“btn btn-primary” style={{padding:‘7px 12px’,fontSize:13}} onClick={()=>setAuth(‘signup’)}>Join free</button>
</>
)}
</div>
</nav>

-- Extensions
create extension if not exists "uuid-ossp";

-- Users
create table public.users (
  id             uuid references auth.users(id) on delete cascade primary key,
  email          text not null,
  anonymous_name text not null unique,
  is_pro         boolean default false,
  created_at     timestamptz default now()
);

-- Posts
create table public.posts (
  id         uuid default uuid_generate_v4() primary key,
  user_id    uuid references public.users(id) on delete cascade not null,
  title      text not null,
  content    text not null,
  type       text not null check (type in ('confession','advice','hot_take')),
  tags       text[] default '{}',
  boosted    boolean default false,
  created_at timestamptz default now()
);

-- Comments
create table public.comments (
  id         uuid default uuid_generate_v4() primary key,
  post_id    uuid references public.posts(id) on delete cascade not null,
  user_id    uuid references public.users(id) on delete cascade not null,
  content    text not null,
  upvotes    int default 0,
  created_at timestamptz default now()
);

-- Reactions
create table public.reactions (
  id         uuid default uuid_generate_v4() primary key,
  post_id    uuid references public.posts(id) on delete cascade not null,
  user_id    uuid references public.users(id) on delete cascade not null,
  type       text not null check (type in ('🔥','😂','😢','😡')),
  created_at timestamptz default now(),
  unique(post_id, user_id, type)
);

-- Votes
create table public.votes (
  id         uuid default uuid_generate_v4() primary key,
  post_id    uuid references public.posts(id) on delete cascade not null,
  user_id    uuid references public.users(id) on delete cascade not null,
  vote_type  text not null check (vote_type in ('A','B')),
  created_at timestamptz default now(),
  unique(post_id, user_id)
);

-- Notifications (in-app)
create table public.notifications (
  id         uuid default uuid_generate_v4() primary key,
  user_id    uuid references public.users(id) on delete cascade not null,
  type       text not null,  -- 'comment' | 'reaction' | 'vote' | 'trending' | 'reply'
  post_id    uuid references public.posts(id) on delete cascade,
  actor_name text,
  message    text not null,
  read       boolean default false,
  created_at timestamptz default now()
);

-- Reports
create table public.reports (
  id          uuid default uuid_generate_v4() primary key,
  reporter_id uuid references public.users(id) on delete cascade not null,
  post_id     uuid references public.posts(id) on delete cascade,
  comment_id  uuid references public.comments(id) on delete cascade,
  reason      text not null,
  created_at  timestamptz default now()
);

-- Post updates (OP continue the story)
create table public.post_updates (
  id         uuid default uuid_generate_v4() primary key,
  post_id    uuid references public.posts(id) on delete cascade not null,
  user_id    uuid references public.users(id) on delete cascade not null,
  content    text not null,
  created_at timestamptz default now()
);

-- RLS
alter table public.users       enable row level security;
alter table public.posts       enable row level security;
alter table public.comments    enable row level security;
alter table public.reactions   enable row level security;
alter table public.votes       enable row level security;
alter table public.notifications enable row level security;
alter table public.reports     enable row level security;
alter table public.post_updates enable row level security;

-- Policies
create policy "read users"       on public.users       for select using (true);
create policy "insert own user"  on public.users       for insert with check (auth.uid()=id);
create policy "update own user"  on public.users       for update using (auth.uid()=id);
create policy "delete own user"  on public.users       for delete using (auth.uid()=id);

create policy "read posts"       on public.posts       for select using (true);
create policy "insert post"      on public.posts       for insert with check (auth.uid()=user_id);
create policy "delete own post"  on public.posts       for delete using (auth.uid()=user_id);

create policy "read comments"    on public.comments    for select using (true);
create policy "insert comment"   on public.comments    for insert with check (auth.uid()=user_id);
create policy "delete own comm"  on public.comments    for delete using (auth.uid()=user_id);

create policy "read reactions"   on public.reactions   for select using (true);
create policy "own reactions"    on public.reactions   for all   using (auth.uid()=user_id);

create policy "read votes"       on public.votes       for select using (true);
create policy "insert vote"      on public.votes       for insert with check (auth.uid()=user_id);

create policy "own notifications" on public.notifications for select using (auth.uid()=user_id);
create policy "insert notif"      on public.notifications for insert with check (auth.role()='authenticated');
create policy "update own notif"  on public.notifications for update using (auth.uid()=user_id);

create policy "insert report"    on public.reports     for insert with check (auth.uid()=reporter_id);
create policy "admin read"       on public.reports     for select using (true);
create policy "admin delete"     on public.reports     for delete using (true);

create policy "read updates"     on public.post_updates for select using (true);
create policy "insert update"    on public.post_updates for insert with check (auth.uid()=user_id);
