<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>HeartConfia · anonymous confessions</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --card: #1e1e32;
      --text: #f0e9ff;
      --text-secondary: #b0a0cc;
      --accent: #ff4d7a;
      --accent-glow: #ff3366;
      --border: #2a2a40;
      --shadow: 0 8px 20px rgba(0,0,0,0.6);
      --radius: 20px;
      --radius-sm: 14px;
      --success: #4ade80;
      --warning: #fbbf24;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: contain;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      padding: 12px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ff4d7a, #ff8fa3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      background: transparent;
      border: none;
      color: var(--text);
      font-weight: 500;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: all 0.2s;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      font-family: inherit;
    }

    button.primary {
      background: var(--accent);
      border: none;
      color: white;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(255,77,122,0.4);
      border: none;
    }

    button.primary:hover {
      background: #ff3366;
    }

    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.5; pointer-events: none; }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 8px 0;
      scrollbar-width: thin;
      background: var(--bg);
      position: sticky;
      top: 60px;
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    .tab {
      padding: 8px 18px;
      border-radius: 30px;
      background: var(--surface);
      white-space: nowrap;
      font-weight: 500;
      border: 1px solid var(--border);
      cursor: pointer;
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.2s;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-title {
      font-weight: 700;
      font-size: 1.3rem;
      line-height: 1.3;
      word-break: break-word;
    }

    .preview-text {
      color: var(--text-secondary);
      line-height: 1.5;
      font-size: 0.95rem;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .blurred-text {
      filter: blur(5px);
      user-select: none;
      pointer-events: none;
      opacity: 0.6;
    }

    .paywall-overlay {
      background: rgba(15,15,26,0.9);
      backdrop-filter: blur(8px);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px dashed var(--accent);
    }

    .reaction-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .reaction-btn {
      background: transparent;
      border: none;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .reaction-btn:hover { background: rgba(255,255,255,0.05); }
    .reaction-btn.active-reaction { background: rgba(255,77,122,0.2); }

    .vote-section {
      display: flex;
      gap: 12px;
      align-items: center;
      font-weight: 600;
      flex-wrap: wrap;
    }

    .vote-btn {
      background: #2a2a40;
      padding: 8px 16px;
      border-radius: 30px;
      cursor: pointer;
    }

    .vote-btn.voted { background: var(--accent); }

    .comment-section {
      margin-top: 8px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .comment {
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .nested-comments {
      margin-left: 20px;
      border-left: 2px solid var(--border);
      padding-left: 12px;
    }

    input, textarea, select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      color: white;
      font-family: inherit;
      width: 100%;
      margin: 6px 0;
      outline: none;
      font-size: 0.95rem;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-content {
      background: var(--surface);
      padding: 24px;
      border-radius: 28px;
      width: 90%;
      max-width: 420px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .hidden { display: none !important; }
    .flex-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      z-index: 200;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.8);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .loader {
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
    }

    .skeleton {
      background: linear-gradient(90deg, #1e1e32 25%, #2a2a45 50%, #1e1e32 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
      height: 20px;
      margin: 8px 0;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <script>
    // ============ SUPABASE CONFIGURATION ============
    // ⚠️ REPLACE with your actual Supabase project URL and anon key
    const SUPABASE_URL = 'https://your-project-id.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvdXItcHJvamVjdC1pZCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNjc5ODIwMDAwLCJleHAiOjE5OTUzOTYwMDB9.placeholder';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ============ GLOBAL STATE ============
    let currentUser = null;
    let currentTab = 'home';
    let realtimeSubscription = null;
    let commentSubscriptions = {};
    const PAGE_SIZE = 10;
    
    // ============ UTILITY FUNCTIONS ============
    function generateAnonName() {
      const prefix = ['Heart', 'Confess', 'Shadow', 'Mystic', 'Hidden', 'Silent', 'Secret', 'Veiled'];
      const num = Math.floor(1000 + Math.random() * 9000);
      return `${prefix[Math.floor(Math.random() * prefix.length)]}_${num}`;
    }

    function sanitize(str) {
      return DOMPurify.sanitize(str, { ALLOWED_TAGS: [] });
    }

    function sanitizeHtml(str) {
      return DOMPurify.sanitize(str, { ALLOWED_TAGS: ['br', 'b', 'i', 'em', 'strong'] });
    }

    function showToast(message, duration = 3000) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), duration);
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diff = now - date;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'Just now';
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // ============ AUTH FUNCTIONS ============
    async function signUp(email, password) {
      const { data, error } = await supabase.auth.signUp({ 
        email, 
        password,
        options: { emailRedirectTo: window.location.origin }
      });
      if (error) { showToast(error.message); return null; }
      if (data.user) {
        const anonName = generateAnonName();
        const { error: profileError } = await supabase.from('users').upsert({
          id: data.user.id,
          email: email,
          anonymous_name: anonName,
          created_at: new Date().toISOString()
        });
        if (profileError) console.error('Profile creation error:', profileError);
        showToast('Account created! Check your email to verify.');
        return data.user;
      }
      return null;
    }

    async function login(email, password) {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) { showToast(error.message); return null; }
      return data.user;
    }

    async function fetchUserProfile(userId) {
      const { data } = await supabase.from('users').select('*').eq('id', userId).single();
      return data;
    }

    async function refreshSession() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        const profile = await fetchUserProfile(session.user.id);
        currentUser = { 
          ...session.user, 
          anonymous_name: profile?.anonymous_name || generateAnonName() 
        };
      } else {
        currentUser = null;
      }
      updateAuthUI();
      loadFeed(currentTab);
    }

    function updateAuthUI() {
      const authBtns = document.getElementById('authButtons');
      const userInfo = document.getElementById('userInfo');
      const floatingBtn = document.getElementById('createFloatingBtn');
      const anonDisplay = document.getElementById('anonNameDisplay');
      
      if (currentUser) {
        authBtns?.classList.add('hidden');
        userInfo?.classList.remove('hidden');
        floatingBtn?.classList.remove('hidden');
        if (anonDisplay) anonDisplay.textContent = currentUser.anonymous_name;
      } else {
        authBtns?.classList.remove('hidden');
        userInfo?.classList.add('hidden');
        floatingBtn?.classList.add('hidden');
      }
    }

    // ============ REALTIME SUBSCRIPTIONS ============
    function subscribeToRealtime() {
      if (realtimeSubscription) supabase.removeChannel(realtimeSubscription);
      
      realtimeSubscription = supabase
        .channel('public-changes')
        .on('postgres_changes', 
          { event: '*', schema: 'public', table: 'posts' },
          () => loadFeed(currentTab)
        )
        .on('postgres_changes',
          { event: '*', schema: 'public', table: 'comments' },
          (payload) => {
            const postId = payload.new?.post_id || payload.old?.post_id;
            if (postId && document.querySelector(`[data-post-id="${postId}"]`)) {
              loadCommentsForPost(postId);
              updateCommentCount(postId);
            }
          }
        )
        .on('postgres_changes',
          { event: '*', schema: 'public', table: 'reactions' },
          (payload) => {
            const postId = payload.new?.post_id || payload.old?.post_id;
            if (postId) updateReactionCounts(postId);
          }
        )
        .on('postgres_changes',
          { event: '*', schema: 'public', table: 'votes' },
          (payload) => {
            const postId = payload.new?.post_id || payload.old?.post_id;
            if (postId) updateVoteCounts(postId);
          }
        )
        .subscribe();
    }

    // ============ DATA FETCHING ============
    async function fetchPosts(tab, page = 0) {
      let query = supabase
        .from('posts')
        .select('*, users!posts_user_id_fkey(anonymous_name)')
        .order('created_at', { ascending: false })
        .range(page * PAGE_SIZE, (page + 1) * PAGE_SIZE - 1);

      if (tab === 'confessions') query = query.eq('type', 'confession');
      else if (tab === 'advice') query = query.eq('type', 'advice');
      else if (tab === 'trending') {
        // Trending: order by reaction count + comment count (simplified)
        query = supabase
          .from('posts')
          .select('*, users!posts_user_id_fkey(anonymous_name)')
          .order('created_at', { ascending: false })
          .range(page * PAGE_SIZE, (page + 1) * PAGE_SIZE - 1);
      }

      const { data, error } = await query;
      if (error) console.error('Fetch posts error:', error);
      return data || [];
    }

    async function fetchReactions(postId) {
      const { data } = await supabase
        .from('reactions')
        .select('type, user_id')
        .eq('post_id', postId);
      return data || [];
    }

    async function fetchVotes(postId) {
      const { data } = await supabase
        .from('votes')
        .select('vote_type, user_id')
        .eq('post_id', postId);
      return data || [];
    }

    async function fetchComments(postId) {
      const { data } = await supabase
        .from('comments')
        .select('*, users!comments_user_id_fkey(anonymous_name)')
        .eq('post_id', postId)
        .order('created_at', { ascending: true });
      return data || [];
    }

    async function loadFeed(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
      });
      
      const feedContainer = document.getElementById('feedContainer');
      feedContainer.innerHTML = '<div class="loader"><div class="skeleton" style="width:80%;height:24px;"></div><div class="skeleton" style="width:60%;height:16px;"></div><div class="skeleton" style="width:90%;height:16px;"></div></div>';
      
      const posts = await fetchPosts(tab);
      if (posts.length === 0) {
        feedContainer.innerHTML = '<p style="color:gray; text-align:center; padding:40px;">No confessions yet. Be the first 💔</p>';
        return;
      }
      
      // Fetch reactions and votes for all posts
      const postsWithMeta = await Promise.all(posts.map(async (post) => {
        const [reactions, votes, comments] = await Promise.all([
          fetchReactions(post.id),
          fetchVotes(post.id),
          fetchComments(post.id)
        ]);
        return { ...post, reactions, votes, comments };
      }));
      
      renderFeed(postsWithMeta);
    }

    function renderFeed(posts) {
      const container = document.getElementById('feedContainer');
      container.innerHTML = posts.map(post => renderPostCard(post)).join('');
      
      // Attach event listeners
      document.querySelectorAll('.reaction-btn').forEach(btn => {
        btn.addEventListener('click', (e) => handleReaction(e));
      });
      document.querySelectorAll('.vote-btn').forEach(btn => {
        btn.addEventListener('click', (e) => handleVote(e));
      });
      document.querySelectorAll('.toggle-comments').forEach(btn => {
        btn.addEventListener('click', (e) => toggleComments(e));
      });
      document.querySelectorAll('.submit-comment').forEach(btn => {
        btn.addEventListener('click', (e) => submitComment(e));
      });
    }

    function renderPostCard(post) {
      const isGuest = !currentUser;
      const anonName = post.users?.anonymous_name || 'Anonymous';
      const previewLength = 150;
      let contentDisplay = sanitizeHtml(post.content);
      let paywallHtml = '';
      
      if (isGuest) {
        const truncated = post.content.substring(0, previewLength);
        contentDisplay = `<span>${sanitizeHtml(truncated)}${post.content.length > previewLength ? '...' : ''}</span>`;
        if (post.content.length > previewLength) {
          contentDisplay += `<div class="blurred-text">${sanitizeHtml(post.content.substring(previewLength))}</div>`;
        }
        paywallHtml = `
          <div class="paywall-overlay">
            <span>🔒 Sign up to read full confessions 💔</span>
            <button class="primary" onclick="document.getElementById('loginBtn').click()">Unlock Full Story</button>
          </div>`;
      }

      // Reaction counts
      const reactionCounts = { '🔥': 0, '😂': 0, '😢': 0, '😡': 0 };
      (post.reactions || []).forEach(r => { reactionCounts[r.type] = (reactionCounts[r.type] || 0) + 1; });
      
      // Vote counts
      const voteCounts = { A: 0, B: 0 };
      (post.votes || []).forEach(v => { voteCounts[v.vote_type] = (voteCounts[v.vote_type] || 0) + 1; });
      
      const commentCount = (post.comments || []).length;

      return `
        <div class="card" data-post-id="${post.id}">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="color:#ff8fa3; font-weight:600;">${sanitize(anonName)}</span>
            <span style="color:gray; font-size:0.8rem;">${formatDate(post.created_at)}</span>
          </div>
          <div class="post-title">${sanitize(post.title || 'Untitled')}</div>
          <div class="preview-text">${contentDisplay}</div>
          ${paywallHtml}
          ${post.tags?.length ? `<div style="display:flex;gap:6px;flex-wrap:wrap;">${post.tags.map(t => `<span style="background:#2a2a40;padding:4px 10px;border-radius:12px;font-size:0.75rem;">#${sanitize(t)}</span>`).join('')}</div>` : ''}
          <div class="reaction-row" data-post-id="${post.id}">
            <span class="reaction-btn" data-type="🔥">🔥 ${reactionCounts['🔥']}</span>
            <span class="reaction-btn" data-type="😂">😂 ${reactionCounts['😂']}</span>
            <span class="reaction-btn" data-type="😢">😢 ${reactionCounts['😢']}</span>
            <span class="reaction-btn" data-type="😡">😡 ${reactionCounts['😡']}</span>
          </div>
          ${post.type === 'advice' ? `
            <div class="vote-section">
              <span style="font-weight:700;">Who is right?</span>
              <button class="vote-btn" data-vote="A" data-post-id="${post.id}">❤️ Side A (${voteCounts.A})</button>
              <button class="vote-btn" data-vote="B" data-post-id="${post.id}">💔 Side B (${voteCounts.B})</button>
            </div>` : ''}
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <button class="toggle-comments" data-post-id="${post.id}" style="font-size:0.85rem; color:var(--text-secondary);">💬 ${commentCount} comments</button>
          </div>
          <div class="comments-container hidden" id="comments-${post.id}">
            <div class="comments-list" id="comments-list-${post.id}"></div>
            ${currentUser ? `
              <div class="flex-row" style="margin-top:8px;">
                <input type="text" class="comment-input" data-post-id="${post.id}" placeholder="Add a comment..." style="flex:1;">
                <button class="submit-comment primary" data-post-id="${post.id}" style="padding:8px 16px;">Post</button>
              </div>` : ''}
          </div>
        </div>`;
    }

    async function loadCommentsForPost(postId) {
      const comments = await fetchComments(postId);
      const listEl = document.getElementById(`comments-list-${postId}`);
      if (!listEl) return;
      
      if (comments.length === 0) {
        listEl.innerHTML = '<p style="color:gray;font-size:0.85rem;">No comments yet.</p>';
        return;
      }
      
      // Build nested structure
      const rootComments = comments.filter(c => !c.parent_id);
      const childMap = {};
      comments.forEach(c => {
        if (c.parent_id) {
          childMap[c.parent_id] = childMap[c.parent_id] || [];
          childMap[c.parent_id].push(c);
        }
      });
      
      listEl.innerHTML = rootComments.map(c => renderComment(c, childMap)).join('');
    }

    function renderComment(comment, childMap, depth = 0) {
      const children = childMap[comment.id] || [];
      const anonName = comment.users?.anonymous_name || 'Anonymous';
      return `
        <div class="comment" style="margin-left:${depth * 16}px;">
          <div style="display:flex;justify-content:space-between;">
            <span style="color:#ff8fa3;font-weight:600;font-size:0.85rem;">${sanitize(anonName)}</span>
            <span style="color:gray;font-size:0.7rem;">${formatDate(comment.created_at)}</span>
          </div>
          <p style="font-size:0.9rem;margin:4px 0;">${sanitizeHtml(comment.content)}</p>
          ${currentUser ? `<button class="reply-btn" data-parent-id="${comment.id}" data-post-id="${comment.post_id}" style="font-size:0.75rem;color:var(--accent);background:none;border:none;cursor:pointer;">↩️ Reply</button>` : ''}
          <div class="reply-input hidden" id="reply-${comment.id}">
            <div class="flex-row" style="margin-top:4px;">
              <input type="text" class="reply-text" data-parent-id="${comment.id}" data-post-id="${comment.post_id}" placeholder="Write a reply..." style="flex:1;font-size:0.85rem;">
              <button class="submit-reply primary" data-parent-id="${comment.id}" data-post-id="${comment.post_id}" style="padding:4px 12px;font-size:0.8rem;">Reply</button>
            </div>
          </div>
          ${children.map(c => renderComment(c, childMap, depth + 1)).join('')}
        </div>`;
    }

    async function updateCommentCount(postId) {
      const { count } = await supabase
        .from('comments')
        .select('*', { count: 'exact', head: true })
        .eq('post_id', postId);
      const btn = document.querySelector(`.toggle-comments[data-post-id="${postId}"]`);
      if (btn) btn.textContent = `💬 ${count || 0} comments`;
    }

    async function updateReactionCounts(postId) {
      const reactions = await fetchReactions(postId);
      const counts = { '🔥': 0, '😂': 0, '😢': 0, '😡': 0 };
      reactions.forEach(r => { counts[r.type] = (counts[r.type] || 0) + 1; });
      const row = document.querySelector(`.reaction-row[data-post-id="${postId}"]`);
      if (row) {
        row.querySelectorAll('.reaction-btn').forEach(btn => {
          const type = btn.dataset.type;
          btn.textContent = `${type} ${counts[type] || 0}`;
        });
      }
    }

    async function updateVoteCounts(postId) {
      const votes = await fetchVotes(postId);
      const counts = { A: 0, B: 0 };
      votes.forEach(v => { counts[v.vote_type] = (counts[v.vote_type] || 0) + 1; });
      const section = document.querySelector(`.vote-section [data-post-id="${postId}"]`)?.parentElement;
      if (section) {
        const btnA = section.querySelector('[data-vote="A"]');
        const btnB = section.querySelector('[data-vote="B"]');
        if (btnA) btnA.textContent = `❤️ Side A (${counts.A})`;
        if (btnB) btnB.textContent = `💔 Side B (${counts.B})`;
      }
    }

    // ============ INTERACTIONS ============
    async function handleReaction(e) {
      if (!currentUser) { showToast('Login to react 💔'); return; }
      const btn = e.target.closest('.reaction-btn');
      if (!btn) return;
      const type = btn.dataset.type;
      const postId = btn.closest('[data-post-id]')?.dataset.postId;
      if (!postId) return;
      
      // Toggle reaction
      const { data: existing } = await supabase
        .from('reactions')
        .select('*')
        .eq('post_id', postId)
        .eq('user_id', currentUser.id)
        .eq('type', type)
        .single();
      
      if (existing) {
        await supabase.from('reactions').delete().eq('id', existing.id);
      } else {
        await supabase.from('reactions').insert({
          post_id: postId,
          user_id: currentUser.id,
          type: type
        });
      }
      updateReactionCounts(postId);
    }

    async function handleVote(e) {
      if (!currentUser) { showToast('Login to vote 💔'); return; }
      const btn = e.target.closest('.vote-btn');
      if (!btn) return;
      const voteType = btn.dataset.vote;
      const postId = btn.dataset.postId;
      
      // Remove existing vote, then insert new
      await supabase.from('votes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
      await supabase.from('votes').insert({
        post_id: postId,
        user_id: currentUser.id,
        vote_type: voteType
      });
      updateVoteCounts(postId);
    }

    function toggleComments(e) {
      const postId = e.target.dataset.postId;
      const container = document.getElementById(`comments-${postId}`);
      if (container) {
        const isHidden = container.classList.contains('hidden');
        if (isHidden) {
          container.classList.remove('hidden');
          loadCommentsForPost(postId);
        } else {
          container.classList.add('hidden');
        }
      }
    }

    async function submitComment(e) {
      if (!currentUser) { showToast('Login to comment'); return; }
      const postId = e.target.dataset.postId;
      const input = document.querySelector(`.comment-input[data-post-id="${postId}"]`);
      const content = input?.value?.trim();
      if (!content) return;
      
      const { error } = await supabase.from('comments').insert({
        post_id: postId,
        user_id: currentUser.id,
        content: sanitize(content)
      });
      if (error) showToast('Error posting comment');
      else {
        input.value = '';
        loadCommentsForPost(postId);
        updateCommentCount(postId);
      }
    }

    // ============ EVENT DELEGATION FOR DYNAMIC ELEMENTS ============
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('submit-reply')) {
        const parentId = e.target.dataset.parentId;
        const postId = e.target.dataset.postId;
        const input = document.querySelector(`.reply-text[data-parent-id="${parentId}"]`);
        const content = input?.value?.trim();
        if (!content || !currentUser) return;
        
        supabase.from('comments').insert({
          post_id: postId,
          user_id: currentUser.id,
          content: sanitize(content),
          parent_id: parentId
        }).then(({ error }) => {
          if (!error) {
            input.value = '';
            loadCommentsForPost(postId);
            updateCommentCount(postId);
          }
        });
      }
      
      if (e.target.classList.contains('reply-btn')) {
        const parentId = e.target.dataset.parentId;
        const replyDiv = document.getElementById(`reply-${parentId}`);
        if (replyDiv) replyDiv.classList.toggle('hidden');
      }
    });

    // ============ MODAL HANDLERS ============
    document.getElementById('loginBtn')?.addEventListener('click', () => {
      document.getElementById('authModal').classList.remove('hidden');
    });
    document.getElementById('signupBtn')?.addEventListener('click', () => {
      document.getElementById('authModal').classList.remove('hidden');
    });
    document.getElementById('closeAuthModal')?.addEventListener('click', () => {
      document.getElementById('authModal').classList.add('hidden');
    });
    document.getElementById('submitSignup')?.addEventListener('click', async () => {
      const email = document.getElementById('authEmail').value;
      const password = document.getElementById('authPassword').value;
      if (email && password) {
        await signUp(email, password);
        document.getElementById('authModal').classList.add('hidden');
      }
    });
    document.getElementById('submitLogin')?.addEventListener('click', async () => {
      const email = document.getElementById('authEmail').value;
      const password = document.getElementById('authPassword').value;
      if (email && password) {
        const user = await login(email, password);
        if (user) {
          document.getElementById('authModal').classList.add('hidden');
          await refreshSession();
        }
      }
    });
    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
      await supabase.auth.signOut();
      currentUser = null;
      updateAuthUI();
      loadFeed('home');
      showToast('Logged out');
    });

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        const tabName = e.target.dataset.tab;
        if (tabName) loadFeed(tabName);
      });
    });

    // Create post modal
    document.getElementById('createFloatingBtn')?.addEventListener('click', () => {
      if (!currentUser) { showToast('Login required'); return; }
      document.getElementById('createPostModal').classList.remove('hidden');
    });
    document.getElementById('cancelPost')?.addEventListener('click', () => {
      document.getElementById('createPostModal').classList.add('hidden');
    });
    document.getElementById('publishPost')?.addEventListener('click', async () => {
      if (!currentUser) return;
      const title = document.getElementById('postTitle').value.trim();
      const content = document.getElementById('postContent').value.trim();
      const type = document.getElementById('postType').value;
      const tagsStr = document.getElementById('postTags').value;
      const tags = tagsStr.split(',').map(t => t.trim()).filter(Boolean);
      
      if (!title || !content) { showToast('Title and content required'); return; }
      
      const { error } = await supabase.from('posts').insert({
        user_id: currentUser.id,
        title: sanitize(title),
        content: sanitize(content),
        type,
        tags
      });
      if (error) showToast(error.message);
      else {
        document.getElementById('createPostModal').classList.add('hidden');
        document.getElementById('postTitle').value = '';
        document.getElementById('postContent').value = '';
        document.getElementById('postTags').value = '';
        loadFeed(currentTab);
        showToast('Confession posted anonymously! 🔥');
      }
    });

    // ============ INFINITE SCROLL (Intersection Observer) ============
    let isLoadingMore = false;
    let currentPage = 0;
    const sentinel = document.createElement('div');
    sentinel.id = 'scrollSentinel';
    sentinel.style.height = '20px';
    document.getElementById('feedContainer')?.after(sentinel);

    const observer = new IntersectionObserver(async (entries) => {
      if (entries[0].isIntersecting && !isLoadingMore) {
        isLoadingMore = true;
        currentPage++;
        const morePosts = await fetchPosts(currentTab, currentPage);
        if (morePosts.length > 0) {
          const postsWithMeta = await Promise.all(morePosts.map(async (post) => {
            const [reactions, votes, comments] = await Promise.all([
              fetchReactions(post.id),
              fetchVotes(post.id),
              fetchComments(post.id)
            ]);
            return { ...post, reactions, votes, comments };
          }));
          const container = document.getElementById('feedContainer');
          container.insertAdjacentHTML('beforeend', postsWithMeta.map(p => renderPostCard(p)).join(''));
          // Re-attach listeners for new elements
          container.querySelectorAll('.reaction-btn').forEach(b => b.addEventListener('click', handleReaction));
          container.querySelectorAll('.vote-btn').forEach(b => b.addEventListener('click', handleVote));
          container.querySelectorAll('.toggle-comments').forEach(b => b.addEventListener('click', toggleComments));
          container.querySelectorAll('.submit-comment').forEach(b => b.addEventListener('click', submitComment));
        }
        isLoadingMore = false;
      }
    }, { rootMargin: '200px' });
    observer.observe(sentinel);

    // ============ INITIALIZATION ============
    window.addEventListener('load', async () => {
      await refreshSession();
      subscribeToRealtime();
      
      // Auth state listener
      supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
          refreshSession();
        } else if (event === 'SIGNED_OUT') {
          currentUser = null;
          updateAuthUI();
          loadFeed('home');
        }
      });
    });
  </script>

  <!-- ============ UI TEMPLATES ============ -->
  <header class="app-header">
    <div class="logo">HeartConfia</div>
    <div class="nav-actions" id="authButtons">
      <button id="loginBtn" class="primary">Login</button>
      <button id="signupBtn">Sign up</button>
    </div>
    <div id="userInfo" class="hidden nav-actions">
      <span id="anonNameDisplay" style="font-weight:600; color:#ff8fa3;"></span>
      <button id="logoutBtn">Logout</button>
    </div>
  </header>

  <div class="container" id="appContainer">
    <div class="tabs" id="tabNavigation">
      <div class="tab active" data-tab="home">🔥 Home</div>
      <div class="tab" data-tab="confessions">Confessions</div>
      <div class="tab" data-tab="advice">Advice</div>
      <div class="tab" data-tab="trending">Trending</div>
    </div>
    <div id="feedContainer"></div>
  </div>

  <button id="createFloatingBtn" class="primary hidden" style="position:fixed; bottom:24px; right:24px; z-index:20; border-radius:40px; padding:14px 24px; box-shadow:0 8px 24px rgba(255,77,122,0.5);">+ New Post</button>

  <!-- Auth Modal -->
  <div id="authModal" class="modal hidden">
    <div class="modal-content">
      <h2 style="margin-bottom:16px;">💔 Join HeartConfia</h2>
      <input type="email" id="authEmail" placeholder="Email" autocomplete="email">
      <input type="password" id="authPassword" placeholder="Password" minlength="6">
      <div class="flex-row" style="justify-content: space-between; margin: 16px 0;">
        <button id="submitLogin" class="primary">Login</button>
        <button id="submitSignup">Sign Up</button>
      </div>
      <button id="closeAuthModal" style="width:100%;">Cancel</button>
      <p style="font-size:0.75rem; color:var(--text-secondary); margin-top:12px; text-align:center;">Email verification required</p>
    </div>
  </div>

  <!-- Create Post Modal -->
  <div id="createPostModal" class="modal hidden">
    <div class="modal-content">
      <h3 style="margin-bottom:12px;">New anonymous post</h3>
      <select id="postType">
        <option value="confession">Confession</option>
        <option value="advice">Advice</option>
      </select>
      <input id="postTitle" placeholder="Title" maxlength="100">
      <textarea id="postContent" placeholder="Your story..."></textarea>
      <input id="postTags" placeholder="tags: cheating, breakup (comma separated)">
      <div class="flex-row" style="justify-content: flex-end; margin-top:12px;">
        <button id="cancelPost">Cancel</button>
        <button id="publishPost" class="primary">Publish anonymously</button>
      </div>
    </div>
  </div>
</body>
</html>
