<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartConfia - Anonymous Confessions</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0a1a;
            --surface: #1a1a2e;
            --card: #16213e;
            --accent: #e94560;
            --text: #eee;
            --text-secondary: #aaa;
            --border: #2a2a4a;
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--surface);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #c73e54;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            background: var(--surface);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            padding: 16px 20px;
            overflow-x: auto;
            background: var(--bg);
            position: sticky;
            top: 65px;
            z-index: 99;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .tab:hover {
            opacity: 0.8;
        }

        /* Feed */
        .feed {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Card */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .anon-name {
            color: #ff6b6b;
            font-weight: 600;
            font-size: 14px;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .card-content {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 16px;
            font-size: 15px;
        }

        .blurred {
            filter: blur(5px);
            user-select: none;
        }

        .paywall {
            background: rgba(233, 69, 96, 0.1);
            border: 1px dashed var(--accent);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin: 12px 0;
        }

        .paywall p {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* Reactions */
        .reactions {
            display: flex;
            gap: 16px;
            margin: 12px 0;
        }

        .reaction-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            color: var(--text);
        }

        .reaction-btn:hover {
            background: rgba(233, 69, 96, 0.2);
        }

        .reaction-btn.active {
            background: rgba(233, 69, 96, 0.3);
            border-color: var(--accent);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            padding: 30px;
            border-radius: var(--radius);
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
        }

        .modal-content textarea {
            min-height: 120px;
            resize: vertical;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .modal-buttons .btn {
            flex: 1;
        }

        /* Floating button */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            font-size: 28px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(233, 69, 96, 0.4);
            z-index: 99;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .fab.visible {
            display: flex;
        }

        /* Comments */
        .comments-section {
            margin-top: 16px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        .comment {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .comment-author {
            color: #ff6b6b;
            font-weight: 600;
            font-size: 13px;
        }

        .comment-text {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 4px 0;
        }

        .comment-input-container {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .comment-input-container input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
        }

        .hidden {
            display: none !important;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            z-index: 2000;
            font-weight: 500;
            border: 1px solid var(--border);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-name {
            color: #ff6b6b;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">💔 HeartConfia</div>
        <div id="authArea">
            <button class="btn btn-primary" id="loginBtn" onclick="openAuthModal('login')">Login</button>
            <button class="btn btn-outline" id="signupBtn" onclick="openAuthModal('signup')">Sign Up</button>
        </div>
        <div id="userArea" class="user-info hidden">
            <span class="user-name" id="displayName"></span>
            <button class="btn btn-outline" id="logoutBtn">Logout</button>
        </div>
    </header>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="home" onclick="switchTab('home')">🏠 Home</div>
        <div class="tab" data-tab="confessions" onclick="switchTab('confessions')">💬 Confessions</div>
        <div class="tab" data-tab="advice" onclick="switchTab('advice')">🤔 Advice</div>
        <div class="tab" data-tab="trending" onclick="switchTab('trending')">🔥 Trending</div>
    </div>

    <!-- Feed -->
    <div class="feed" id="feedContainer">
        <p style="text-align:center;color:var(--text-secondary);padding:40px;">Loading confessions...</p>
    </div>

    <!-- Floating Action Button -->
    <button class="fab" id="fabBtn" onclick="openCreatePostModal()">+</button>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <h2 id="authModalTitle">Login to HeartConfia</h2>
            <input type="email" id="authEmail" placeholder="Email address">
            <input type="password" id="authPassword" placeholder="Password (min 6 characters)">
            <div class="modal-buttons">
                <button class="btn btn-outline" onclick="closeModal('authModal')">Cancel</button>
                <button class="btn btn-primary" id="authSubmitBtn">Login</button>
            </div>
            <p style="text-align:center;margin-top:12px;font-size:13px;color:var(--text-secondary);">
                <span id="authToggleText">Don't have an account?</span>
                <a href="#" id="authToggleLink" style="color:var(--accent);">Sign Up</a>
            </p>
        </div>
    </div>

    <!-- Create Post Modal -->
    <div class="modal" id="createPostModal">
        <div class="modal-content">
            <h2>Create Anonymous Post</h2>
            <select id="postType">
                <option value="confession">Confession</option>
                <option value="advice">Advice</option>
            </select>
            <input type="text" id="postTitle" placeholder="Title" maxlength="100">
            <textarea id="postContent" placeholder="Share your story..."></textarea>
            <input type="text" id="postTags" placeholder="Tags: cheating, breakup (comma separated)">
            <div class="modal-buttons">
                <button class="btn btn-outline" onclick="closeModal('createPostModal')">Cancel</button>
                <button class="btn btn-primary" id="publishBtn">Publish Anonymously</button>
            </div>
        </div>
    </div>

    <script>
        // Supabase Configuration - REPLACE THESE WITH YOUR ACTUAL CREDENTIALS
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_KEY =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvdXItcHJvamVjdC1pZCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNjc5ODIwMDAwLCJleHAiOjE5OTUzOTYwMDB9.placeholder';

        // Create Supabase client - wrapped in try-catch for safety
        let supabase;
        try {
            supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error('Failed to initialize Supabase:', e);
            alert('Please configure your Supabase credentials in the code.');
        }

        // State
        let currentUser = null;
        let currentTab = 'home';
        let authMode = 'login';

        // Generate random anonymous name
        function generateAnonName() {
            const prefixes = ['Heart', 'Confess', 'Shadow', 'Mystic', 'Hidden', 'Silent', 'Secret'];
            const number = Math.floor(1000 + Math.random() * 9000);
            return prefixes[Math.floor(Math.random() * prefixes.length)] + '_' + number;
        }

        // Toast notification
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Modal functions
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function openAuthModal(mode) {
            authMode = mode;
            const title = document.getElementById('authModalTitle');
            const submitBtn = document.getElementById('authSubmitBtn');
            const toggleText = document.getElementById('authToggleText');
            const toggleLink = document.getElementById('authToggleLink');

            if (mode === 'login') {
                title.textContent = 'Login to HeartConfia';
                submitBtn.textContent = 'Login';
                toggleText.textContent = "Don't have an account?";
                toggleLink.textContent = 'Sign Up';
            } else {
                title.textContent = 'Create Account';
                submitBtn.textContent = 'Sign Up';
                toggleText.textContent = 'Already have an account?';
                toggleLink.textContent = 'Login';
            }
            openModal('authModal');
        }

        function openCreatePostModal() {
            if (!currentUser) {
                showToast('Please login first 💔');
                openAuthModal('login');
                return;
            }
            openModal('createPostModal');
        }

        // Update UI based on auth state
        function updateUI() {
            const authArea = document.getElementById('authArea');
            const userArea = document.getElementById('userArea');
            const fabBtn = document.getElementById('fabBtn');
            const displayName = document.getElementById('displayName');

            if (currentUser) {
                authArea.classList.add('hidden');
                userArea.classList.remove('hidden');
                fabBtn.classList.add('visible');
                displayName.textContent = currentUser.anonymous_name || 'Anonymous';
            } else {
                authArea.classList.remove('hidden');
                userArea.classList.add('hidden');
                fabBtn.classList.remove('visible');
            }
        }

        // Authentication
        async function signUp(email, password) {
            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                });

                if (error) throw error;

                if (data.user) {
                    // Create user profile
                    const anonName = generateAnonName();
                    await supabase.from('users').upsert({
                        id: data.user.id,
                        email: email,
                        anonymous_name: anonName,
                        created_at: new Date().toISOString(),
                    });

                    showToast('Account created! Check your email to verify.');
                    return true;
                }
            } catch (error) {
                showToast('Error: ' + error.message);
                return false;
            }
        }

        async function login(email, password) {
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password,
                });

                if (error) throw error;

                if (data.user) {
                    // Get user profile
                    const { data: profile } = await supabase
                        .from('users')
                        .select('*')
                        .eq('id', data.user.id)
                        .single();

                    currentUser = {
                        ...data.user,
                        anonymous_name: profile?.anonymous_name || generateAnonName(),
                    };

                    updateUI();
                    showToast('Welcome back! 💔');
                    loadFeed();
                    return true;
                }
            } catch (error) {
                showToast('Error: ' + error.message);
                return false;
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            currentUser = null;
            updateUI();
            loadFeed();
            showToast('Logged out');
        }

        // Load session
        async function loadSession() {
            try {
                const {
                    data: { session },
                } = await supabase.auth.getSession();

                if (session?.user) {
                    const { data: profile } = await supabase
                        .from('users')
                        .select('*')
                        .eq('id', session.user.id)
                        .single();

                    currentUser = {
                        ...session.user,
                        anonymous_name: profile?.anonymous_name || generateAnonName(),
                    };
                } else {
                    currentUser = null;
                }
            } catch (error) {
                console.error('Session load error:', error);
                currentUser = null;
            }
            updateUI();
            loadFeed();
        }

        // Fetch and render posts
        async function fetchPosts(tab) {
            try {
                let query = supabase
                    .from('posts')
                    .select('*, users(anonymous_name)')
                    .order('created_at', { ascending: false })
                    .limit(20);

                if (tab === 'confessions') {
                    query = query.eq('type', 'confession');
                } else if (tab === 'advice') {
                    query = query.eq('type', 'advice');
                }

                const { data, error } = await query;
                if (error) throw error;
                return data || [];
            } catch (error) {
                console.error('Fetch posts error:', error);
                return [];
            }
        }

        async function fetchReactions(postId) {
            try {
                const { data } = await supabase
                    .from('reactions')
                    .select('type')
                    .eq('post_id', postId);
                return data || [];
            } catch (e) {
                return [];
            }
        }

        async function fetchComments(postId) {
            try {
                const { data } = await supabase
                    .from('comments')
                    .select('*, users(anonymous_name)')
                    .eq('post_id', postId)
                    .order('created_at', { ascending: true });
                return data || [];
            } catch (e) {
                return [];
            }
        }

        async function renderPostCard(post) {
            const anonName = post.users?.anonymous_name || 'Anonymous';
            const reactions = await fetchReactions(post.id);
            const comments = await fetchComments(post.id);

            const reactionCounts = { '🔥': 0, '😂': 0, '😢': 0, '😡': 0 };
            reactions.forEach(r => reactionCounts[r.type]++);

            const isGuest = !currentUser;
            const previewLength = 120;
            let contentHtml = '';
            let paywallHtml = '';

            if (isGuest && post.content.length > previewLength) {
                contentHtml = `
                    <p>${escapeHtml(post.content.substring(0, previewLength))}...</p>
                    <p class="blurred">${escapeHtml(post.content.substring(previewLength))}</p>
                    <div class="paywall">
                        <p>🔒 Sign up to read full confessions 💔</p>
                        <button class="btn btn-primary" onclick="openAuthModal('signup')">Unlock Full Story</button>
                    </div>
                `;
            } else {
                contentHtml = `<p>${escapeHtml(post.content)}</p>`;
            }

            const date = new Date(post.created_at).toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
            });

            let tagsHtml = '';
            if (post.tags && post.tags.length > 0) {
                tagsHtml = post.tags.map(t => `<span style="background:rgba(255,255,255,0.1);padding:2px 8px;border-radius:10px;font-size:12px;">#${escapeHtml(t)}</span>`).join(' ');
            }

            const cardId = `post-${post.id}`;
            const commentsHtml = comments.map(c => `
                <div class="comment">
                    <div class="comment-author">${escapeHtml(c.users?.anonymous_name || 'Anonymous')}</div>
                    <div class="comment-text">${escapeHtml(c.content)}</div>
                </div>
            `).join('');

            return `
                <div class="card" id="${cardId}">
                    <div class="card-header">
                        <span class="anon-name">${escapeHtml(anonName)}</span>
                        <span class="post-date">${date}</span>
                    </div>
                    <div class="card-title">${escapeHtml(post.title || 'Untitled')}</div>
                    <div class="card-content">${contentHtml}</div>
                    ${tagsHtml ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;">${tagsHtml}</div>` : ''}
                    <div class="reactions">
                        <button class="reaction-btn" onclick="addReaction('${post.id}', '🔥')">🔥 ${reactionCounts['🔥']}</button>
                        <button class="reaction-btn" onclick="addReaction('${post.id}', '😂')">😂 ${reactionCounts['😂']}</button>
                        <button class="reaction-btn" onclick="addReaction('${post.id}', '😢')">😢 ${reactionCounts['😢']}</button>
                        <button class="reaction-btn" onclick="addReaction('${post.id}', '😡')">😡 ${reactionCounts['😡']}</button>
                    </div>
                    ${post.type === 'advice' ? `
                        <div style="margin:8px 0;">
                            <strong>Who is right?</strong>
                            <button class="btn btn-outline" onclick="addVote('${post.id}', 'A')" style="margin-left:8px;">❤️ Side A</button>
                            <button class="btn btn-outline" onclick="addVote('${post.id}', 'B')">💔 Side B</button>
                        </div>
                    ` : ''}
                    <div class="comments-section">
                        <strong>💬 ${comments.length} Comments</strong>
                        ${commentsHtml}
                        ${currentUser ? `
                            <div class="comment-input-container">
                                <input type="text" id="commentInput-${post.id}" placeholder="Add a comment...">
                                <button class="btn btn-primary" onclick="addComment('${post.id}')">Post</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadFeed() {
            const container = document.getElementById('feedContainer');
            container.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:40px;">Loading...</p>';

            try {
                const posts = await fetchPosts(currentTab);
                if (posts.length === 0) {
                    container.innerHTML =
                        '<p style="text-align:center;color:var(--text-secondary);padding:60px;">No confessions yet. Be the first to share 💔</p>';
                    return;
                }

                const htmlPromises = posts.map(post => renderPostCard(post));
                const htmlArray = await Promise.all(htmlPromises);
                container.innerHTML = htmlArray.join('');
            } catch (error) {
                container.innerHTML =
                    '<p style="text-align:center;color:var(--text-secondary);padding:40px;">Error loading feed. Please try again.</p>';
                console.error(error);
            }
        }

        // Actions
        async function addReaction(postId, type) {
            if (!currentUser) {
                showToast('Please login to react 💔');
                openAuthModal('login');
                return;
            }

            try {
                // Check existing reaction
                const { data: existing } = await supabase
                    .from('reactions')
                    .select('*')
                    .eq('post_id', postId)
                    .eq('user_id', currentUser.id)
                    .eq('type', type)
                    .single();

                if (existing) {
                    await supabase.from('reactions').delete().eq('id', existing.id);
                } else {
                    await supabase.from('reactions').insert({
                        post_id: postId,
                        user_id: currentUser.id,
                        type: type,
                    });
                }
                loadFeed(); // Refresh to update counts
            } catch (error) {
                console.error('Reaction error:', error);
            }
        }

        async function addVote(postId, voteType) {
            if (!currentUser) {
                showToast('Please login to vote 💔');
                openAuthModal('login');
                return;
            }

            try {
                await supabase.from('votes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
                await supabase.from('votes').insert({
                    post_id: postId,
                    user_id: currentUser.id,
                    vote_type: voteType,
                });
                showToast('Vote recorded!');
                loadFeed();
            } catch (error) {
                console.error('Vote error:', error);
            }
        }

        async function addComment(postId) {
            if (!currentUser) {
                showToast('Please login to comment 💔');
                return;
            }

            const input = document.getElementById(`commentInput-${postId}`);
            const content = input?.value?.trim();
            if (!content) return;

            try {
                await supabase.from('comments').insert({
                    post_id: postId,
                    user_id: currentUser.id,
                    content: content,
                });
                input.value = '';
                loadFeed();
            } catch (error) {
                console.error('Comment error:', error);
                showToast('Error posting comment');
            }
        }

        async function createPost() {
            if (!currentUser) return;

            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            const type = document.getElementById('postType').value;
            const tagsStr = document.getElementById('postTags').value;
            const tags = tagsStr.split(',').map(t => t.trim()).filter(Boolean);

            if (!title || !content) {
                showToast('Title and content are required');
                return;
            }

            try {
                const { error } = await supabase.from('posts').insert({
                    user_id: currentUser.id,
                    title: title,
                    content: content,
                    type: type,
                    tags: tags,
                });

                if (error) throw error;

                closeModal('createPostModal');
                document.getElementById('postTitle').value = '';
                document.getElementById('postContent').value = '';
                document.getElementById('postTags').value = '';
                showToast('Posted anonymously! 🔥');
                loadFeed();
            } catch (error) {
                showToast('Error: ' + error.message);
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === tab);
            });
            loadFeed();
        }

        // Event Listeners
        document.getElementById('authSubmitBtn').addEventListener('click', async () => {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;

            if (!email || !password) {
                showToast('Please fill in all fields');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters');
                return;
            }

            let success;
            if (authMode === 'login') {
                success = await login(email, password);
            } else {
                success = await signUp(email, password);
            }

            if (success) {
                closeModal('authModal');
                document.getElementById('authEmail').value = '';
                document.getElementById('authPassword').value = '';
            }
        });

        document.getElementById('authToggleLink').addEventListener('click', (e) => {
            e.preventDefault();
            openAuthModal(authMode === 'login' ? 'signup' : 'login');
        });

        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('publishBtn').addEventListener('click', createPost);

        // Close modals on background click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal(modal.id);
                }
            });
        });

        // Keyboard shortcut to close modals
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal.active').forEach(m => closeModal(m.id));
            }
        });

        // Initialize
        window.addEventListener('load', () => {
            loadSession();

            // Listen for auth changes
            supabase.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_IN') {
                    loadSession();
                } else if (event === 'SIGNED_OUT') {
                    currentUser = null;
                    updateUI();
                    loadFeed();
                }
            });
        });
    </script>
</body>
</html>
