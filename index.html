<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HeartConfia 💔 — Anonymous Relationship Confessions</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--s1:#0f0f18;--s2:#161622;--s3:#1e1e30;--s4:#252538;
  --bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.11);--bd3:rgba(255,255,255,0.18);
  --tx:#f2f0ff;--tx2:#a09cbd;--tx3:#5f5b7a;--tx4:#3d3a55;
  --rose:#ff3d5a;--rdim:rgba(255,61,90,0.14);--rglow:rgba(255,61,90,0.3);
  --violet:#8b5cf6;--vdim:rgba(139,92,246,0.14);
  --amber:#f59e0b;--teal:#10b981;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
#root{min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes hb{0%,100%{transform:scale(1)}15%{transform:scale(1.3)}30%{transform:scale(1)}45%{transform:scale(1.14)}60%{transform:scale(1)}}
@keyframes popIn{0%{transform:scale(0.85);opacity:0}65%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes bounceVote{0%{transform:scale(1)}30%{transform:scale(1.45)}60%{transform:scale(0.9)}100%{transform:scale(1)}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(1.7)}}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes liveBlip{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}
@keyframes borderPulse{0%,100%{border-color:rgba(255,61,90,.25)}50%{border-color:rgba(255,61,90,.65)}}
@keyframes countUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-family:‘DM Sans’,sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.bp{background:linear-gradient(135deg,var(–rose),#c9184a);color:#fff;box-shadow:0 4px 20px var(–rglow)}
.bp:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(–rglow)}
.bs{background:var(–s2);color:var(–tx);border:1px solid var(–bd2)}
.bs:hover{background:var(–s3);border-color:var(–bd3)}
.bg{background:transparent;color:var(–tx2);padding:8px 14px}
.bg:hover{color:var(–tx);background:var(–s2)}
.bv{background:linear-gradient(135deg,var(–violet),#6d28d9);color:#fff;box-shadow:0 4px 20px rgba(139,92,246,.3)}
.bt{background:linear-gradient(135deg,var(–teal),#059669);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

.inp{width:100%;padding:13px 16px;background:var(–s2);border:1px solid var(–bd);border-radius:12px;color:var(–tx);font-family:‘DM Sans’,sans-serif;font-size:15px;outline:none;transition:all .2s}
.inp:focus{border-color:var(–rose);box-shadow:0 0 0 3px rgba(255,61,90,.1)}
.inp::placeholder{color:var(–tx3)}
textarea.inp{resize:vertical;min-height:120px;line-height:1.7}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;height:62px;z-index:200;background:rgba(7,7,13,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(–bd);display:flex;align-items:center;padding:0 16px;gap:10px}
.nlogo{font-family:‘Playfair Display’,serif;font-size:20px;font-weight:900;color:var(–rose);cursor:pointer;flex-shrink:0;user-select:none;animation:hb 4s ease-in-out infinite;display:inline-block;text-shadow:0 0 28px rgba(255,61,90,.5)}
.ntabs{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.ntabs::-webkit-scrollbar{display:none}
.ntab{padding:7px 14px;border-radius:50px;font-size:13px;font-weight:500;cursor:pointer;color:var(–tx2);transition:all .2s;border:none;background:transparent;white-space:nowrap;font-family:‘DM Sans’,sans-serif}
.ntab:hover{color:var(–tx);background:var(–s2)}
.ntab.on{color:var(–rose);background:var(–rdim);font-weight:600}

/* Live ticker */
.ticker-wrap{background:rgba(255,61,90,.07);border-bottom:1px solid rgba(255,61,90,.12);height:34px;overflow:hidden;display:flex;align-items:center;position:fixed;top:62px;left:0;right:0;z-index:199}
.ticker-track{display:inline-flex;animation:ticker 50s linear infinite;white-space:nowrap}
.ticker-item{font-size:12px;font-weight:500;color:var(–tx2);padding:0 28px;display:inline-flex;align-items:center;gap:8px}
.ticker-dot{width:5px;height:5px;border-radius:50%;background:var(–rose);animation:liveBlip 1.2s ease infinite;flex-shrink:0}

/* Layout */
.lay{display:grid;grid-template-columns:1fr min(720px,100%) 1fr;min-height:100vh;padding-top:96px}
.lc{grid-column:2;padding:20px 16px 100px}

/* Emotional badges */
.ebadge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.eb-hot{background:linear-gradient(135deg,rgba(255,61,90,.2),rgba(245,158,11,.2));color:#fbbf24;border:1px solid rgba(255,61,90,.3);animation:borderPulse 2s ease infinite}
.eb-trending{background:rgba(245,158,11,.14);color:var(–amber);border:1px solid rgba(245,158,11,.28)}
.eb-sad{background:rgba(99,102,241,.14);color:#818cf8;border:1px solid rgba(99,102,241,.28)}
.eb-toxic{background:rgba(239,68,68,.14);color:#f87171;border:1px solid rgba(239,68,68,.28)}
.eb-wild{background:rgba(234,179,8,.14);color:#facc15;border:1px solid rgba(234,179,8,.28)}
.eb-debated{background:rgba(139,92,246,.14);color:#a78bfa;border:1px solid rgba(139,92,246,.28)}

/* Post card */
.pc{background:var(–s1);border:1px solid var(–bd);border-radius:20px;padding:22px;margin-bottom:14px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);animation:fadeUp .45s ease both;position:relative;overflow:hidden}
.pc::before{content:’’;position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(–rose),var(–violet),var(–amber));opacity:0;transition:opacity .3s}
.pc:hover{border-color:rgba(255,61,90,.22);transform:translateY(-3px);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.pc:hover::before{opacity:1}
.ptb{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.ptb.confession{color:var(–rose)}.ptb.advice{color:#a78bfa}.ptb.hot_take{color:var(–amber)}
.ptitle{font-family:‘Playfair Display’,serif;font-size:19px;font-weight:900;line-height:1.32;color:var(–tx);margin-bottom:10px;letter-spacing:-.01em}
.pprev{font-size:14px;line-height:1.75;color:var(–tx2);margin-bottom:16px}
.pprev-clamp{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.pmeta{display:flex;align-items:center;gap:8px;font-size:13px;color:var(–tx3);margin-bottom:14px;flex-wrap:wrap}
.pdot{width:3px;height:3px;border-radius:50%;background:var(–tx4);flex-shrink:0}
.aname{color:var(–tx2);font-weight:600}

/* Reactions */
.rxrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rxb{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:50px;background:var(–s2);border:1px solid var(–bd);cursor:pointer;font-size:13px;font-weight:600;color:var(–tx2);transition:all .2s;font-family:‘DM Sans’,sans-serif;position:relative;overflow:hidden}
.rxb:hover{border-color:rgba(255,61,90,.3);color:var(–tx);transform:scale(1.06)}
.rxb.on{background:var(–rdim);border-color:rgba(255,61,90,.4);color:var(–rose)}
.float-emoji{position:fixed;pointer-events:none;font-size:22px;animation:floatUp .9s ease forwards;z-index:9999}

/* Engagement bar */
.eng-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 16px;background:var(–s2);border-radius:12px;margin-top:14px;flex-wrap:wrap}
.eng-stat{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(–tx2)}
.eng-stat.hot{color:var(–amber)}

/* Blur / Paywall */
.blw{position:relative;max-height:90px;overflow:hidden}
.blw::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:75px;background:linear-gradient(transparent,var(–s1))}
.pw{padding:24px 20px;background:linear-gradient(to bottom,transparent,rgba(15,15,24,.98) 22%);text-align:center;border-top:1px solid rgba(255,61,90,.14);margin:0 -22px -22px;border-radius:0 0 20px 20px}
.pw-head{font-family:‘Playfair Display’,serif;font-size:18px;font-weight:900;color:var(–tx);margin-bottom:7px;line-height:1.3}
.pw-sub{font-size:13px;color:var(–tx2);margin-bottom:18px;line-height:1.65}
.pw-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* Modal */
.mov{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.mod{background:var(–s1);border:1px solid var(–bd2);border-radius:24px;padding:34px;width:100%;max-width:430px;position:relative;animation:popIn .3s ease;max-height:92vh;overflow-y:auto}
.mclose{position:absolute;top:14px;right:14px;background:var(–s2);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(–tx2);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mclose:hover{background:var(–s3);color:var(–tx)}
.flbl{font-size:13px;font-weight:600;color:var(–tx2);margin-bottom:6px;display:block}
.mswitch{text-align:center;font-size:14px;color:var(–tx2);margin-top:16px}
.mswitch button{background:none;border:none;color:var(–rose);cursor:pointer;font-weight:700;font-size:14px;font-family:‘DM Sans’,sans-serif}
.mtabs{display:flex;gap:4px;background:var(–s2);border-radius:12px;padding:4px;margin-bottom:22px}
.mtab{flex:1;padding:9px;border-radius:9px;border:none;background:transparent;color:var(–tx2);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:‘DM Sans’,sans-serif}
.mtab.on{background:var(–rdim);color:var(–rose)}

/* WHO IS WRONG */
.wiw{background:linear-gradient(135deg,rgba(255,61,90,.06),rgba(139,92,246,.06));border:1px solid rgba(255,61,90,.18);border-radius:16px;padding:18px;margin:18px 0}
.wiw-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(–tx3);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.wiw-title::after{content:’’;flex:1;height:1px;background:var(–bd)}
.wiw-opts{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.wiw-btn{flex:1;min-width:80px;padding:14px 8px;border-radius:14px;border:2px solid var(–bd2);background:var(–s2);cursor:pointer;text-align:center;font-family:‘DM Sans’,sans-serif;font-weight:700;font-size:13px;transition:all .25s;line-height:1.5;color:var(–tx2)}
.wiw-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.wiw-btn.he.sel,.wiw-btn.he:hover{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.5);color:#f87171}
.wiw-btn.she.sel,.wiw-btn.she:hover{background:rgba(139,92,246,.15);border-color:rgba(139,92,246,.5);color:#a78bfa}
.wiw-btn.both.sel,.wiw-btn.both:hover{background:rgba(156,163,175,.14);border-color:rgba(156,163,175,.45);color:#d1d5db}
.wiw-btn.sel{animation:bounceVote .4s ease}
.wiw-icon{font-size:20px;display:block;margin-bottom:5px}
.wiw-bars{display:flex;flex-direction:column;gap:8px}
.wiw-row{display:flex;align-items:center;gap:10px}
.wiw-lbl{width:68px;font-weight:600;color:var(–tx2);flex-shrink:0;font-size:12px}
.wiw-track{flex:1;height:8px;border-radius:4px;background:var(–s3);overflow:hidden}
.wiw-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.wiw-fill.he{background:linear-gradient(90deg,#ef4444,#dc2626)}
.wiw-fill.she{background:linear-gradient(90deg,#8b5cf6,#6d28d9)}
.wiw-fill.both{background:linear-gradient(90deg,#9ca3af,#6b7280)}
.wiw-pct{font-weight:700;font-size:12px;min-width:32px;text-align:right}
.wiw-total{text-align:center;font-size:12px;color:var(–tx3);margin-top:10px;font-weight:500}
.wiw-verdict{text-align:center;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;margin-top:10px}
.wiw-verdict.he{background:rgba(239,68,68,.1);color:#f87171}
.wiw-verdict.she{background:rgba(139,92,246,.1);color:#a78bfa}
.wiw-verdict.both{background:rgba(156,163,175,.1);color:#d1d5db}

/* Comments */
.cmt-sort{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;scrollbar-width:none}
.cmt-sort::-webkit-scrollbar{display:none}
.csb{padding:6px 14px;border-radius:50px;font-size:12px;font-weight:600;border:1px solid var(–bd);background:var(–s2);color:var(–tx2);cursor:pointer;white-space:nowrap;transition:all .2s;font-family:‘DM Sans’,sans-serif}
.csb.on{background:var(–rdim);border-color:rgba(255,61,90,.4);color:var(–rose)}
.cmt-row{display:flex;gap:12px;margin-bottom:24px;align-items:flex-start}
.ava{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(–rose),var(–violet));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.ava.sm{width:30px;height:30px;font-size:11px}
.cc{padding:16px 18px;background:var(–s2);border:1px solid var(–bd);border-radius:14px;margin-bottom:10px;animation:fadeUp .3s ease;transition:border-color .2s}
.cc:hover{border-color:var(–bd2)}
.cc.top{border-color:rgba(245,158,11,.3);background:linear-gradient(135deg,rgba(245,158,11,.04),var(–s2))}
.cc.heated{border-color:rgba(239,68,68,.22)}
.cc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cc-body{font-size:14px;line-height:1.7;color:var(–tx2)}
.cc-foot{display:flex;align-items:center;gap:12px;margin-top:10px}
.cc-rxb{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:50px;background:var(–s3);border:1px solid var(–bd);cursor:pointer;font-size:12px;font-weight:600;color:var(–tx3);transition:all .2s;font-family:‘DM Sans’,sans-serif}
.cc-rxb:hover,.cc-rxb.on{color:var(–rose);border-color:rgba(255,61,90,.3)}
.cc-reply{font-size:12px;color:var(–tx3);background:none;border:none;cursor:pointer;font-family:‘DM Sans’,sans-serif;transition:color .2s;font-weight:600;display:flex;align-items:center;gap:4px}
.cc-reply:hover{color:var(–rose)}
.top-lbl{font-size:10px;font-weight:700;color:var(–amber);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.hot-lbl{font-size:10px;font-weight:700;color:#f87171;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;gap:4px}

/* Trending */
.trn{font-family:‘Playfair Display’,serif;font-size:38px;font-weight:900;line-height:1;min-width:46px}
.trn.g{background:linear-gradient(135deg,#f59e0b,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.trn.s{background:linear-gradient(135deg,#9ca3af,#6b7280);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.trn.b{background:linear-gradient(135deg,#b45309,#92400e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.trn.d{color:var(–s4)}

/* Pills */
.pills{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:20px}
.pills::-webkit-scrollbar{display:none}
.pill{padding:7px 18px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(–bd);background:var(–s1);color:var(–tx2);transition:all .2s;white-space:nowrap;font-family:‘DM Sans’,sans-serif}
.pill:hover{border-color:rgba(255,61,90,.35);color:var(–rose)}
.pill.on{background:var(–rdim);border-color:rgba(255,61,90,.45);color:var(–rose)}

/* Hero */
.hero{text-align:center;padding:36px 0 28px;position:relative}
.hero::before{content:’’;position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(255,61,90,.08),transparent 70%);pointer-events:none}
.hey{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(–rose);margin-bottom:10px}
.htitle{font-family:‘Playfair Display’,serif;font-size:clamp(36px,9vw,58px);font-weight:900;line-height:1.06;background:linear-gradient(140deg,var(–tx) 30%,var(–rose) 65%,var(–violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;background-size:200% 200%;animation:gradShift 6s ease infinite}
.hsub{font-size:15px;color:var(–tx2);max-width:380px;margin:0 auto 28px;line-height:1.7}

/* Stats */
.statg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.statb{background:var(–s2);border:1px solid var(–bd);border-radius:14px;padding:18px;text-align:center}
.statn{font-family:‘Playfair Display’,serif;font-size:30px;font-weight:900;color:var(–tx)}
.statl{font-size:12px;color:var(–tx3);margin-top:4px;font-weight:500}

/* Misc */
.sh{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.st{font-family:‘Playfair Display’,serif;font-size:22px;font-weight:900;color:var(–tx)}
.sbadge{padding:3px 11px;border-radius:50px;background:var(–rdim);color:var(–rose);font-size:12px;font-weight:700}
.cpbar{background:linear-gradient(135deg,rgba(255,61,90,.07),rgba(139,92,246,.05));border:1px solid rgba(255,61,90,.15);border-radius:16px;padding:16px 20px;margin-bottom:20px;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:14px}
.cpbar:hover{border-color:rgba(255,61,90,.32);transform:translateY(-1px)}
.bkbtn{display:inline-flex;align-items:center;gap:7px;color:var(–tx2);font-size:14px;font-weight:600;cursor:pointer;background:none;border:none;padding:8px 0;margin-bottom:20px;transition:color .2s;font-family:‘DM Sans’,sans-serif}
.bkbtn:hover{color:var(–tx)}
.div{height:1px;background:var(–bd);margin:24px 0}
.spin{width:20px;height:20px;border:2px solid var(–bd);border-top-color:var(–rose);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;display:inline-block}
.empty{text-align:center;padding:60px 20px;color:var(–tx3)}
.empi{font-size:48px;margin-bottom:12px}
.empt{font-family:‘Playfair Display’,serif;font-size:20px;color:var(–tx2);margin-bottom:8px}
.twrap{position:fixed;bottom:24px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{padding:13px 18px;border-radius:14px;background:var(–s2);border:1px solid var(–bd2);font-size:14px;color:var(–tx);box-shadow:0 12px 40px rgba(0,0,0,.5);animation:fadeUp .3s ease;display:flex;align-items:center;gap:10px;min-width:200px;max-width:320px}
.toast.suc{border-color:rgba(16,185,129,.4)}.toast.er{border-color:rgba(255,61,90,.4)}
.cnote{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:14px;padding:14px 16px;margin-bottom:20px;font-size:13px;color:var(–amber);line-height:1.65}
.cnote code{background:rgba(245,158,11,.15);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:12px}
