DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HeartConfia 💔</title>
<!-- System fonts only — no external font request that can block -->
<style>
:root{
  --bg:#07070d;--s1:#0f0f18;--s2:#161622;--s3:#1e1e2e;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.14);
  --tx:#f0eeff;--tx2:#9d99b8;--tx3:#5a566f;
  --rose:#ff3d5a;--rdim:rgba(255,61,90,.14);
  --violet:#8b5cf6;--amber:#f59e0b;--teal:#10b981;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font-family:var(--font);min-height:100vh}
#root{min-height:100vh}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#252538;border-radius:2px}

/* Animations — kept minimal */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes in{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes hb{0%,100%{transform:scale(1)}20%{transform:scale(1.25)}40%{transform:scale(1)}}
@keyframes tk{to{transform:translateX(-50%)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 22px;border-radius:50px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .15s;white-space:nowrap;text-decoration:none}
.btn:active{opacity:.8;transform:scale(.97)}
.bp{background:linear-gradient(135deg,#ff3d5a,#c9184a);color:#fff;box-shadow:0 4px 18px rgba(255,61,90,.3)}
.bs{background:var(--s2);color:var(--tx);border:1px solid var(--bd2)}
.bg{background:transparent;color:var(--tx2)}
.btn:disabled{opacity:.4;pointer-events:none}

/* Inputs */
.inp{width:100%;padding:13px 15px;background:var(--s2);border:1px solid var(--bd);border-radius:12px;color:var(--tx);font-family:var(--font);font-size:15px;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--rose)}
.inp::placeholder{color:var(--tx3)}
textarea.inp{resize:vertical;min-height:110px;line-height:1.65}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;height:56px;z-index:100;background:rgba(7,7,13,.97);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:8px}
.logo{font-size:18px;font-weight:800;color:var(--rose);cursor:pointer;flex-shrink:0;animation:hb 4s ease-in-out infinite;display:inline-block}
.tabs{display:flex;gap:2px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 12px;border-radius:50px;font-size:13px;font-weight:500;cursor:pointer;color:var(--tx2);border:none;background:transparent;white-space:nowrap;font-family:var(--font)}
.tab.on{color:var(--rose);background:var(--rdim);font-weight:600}

/* Ticker */
.ticker{position:fixed;top:56px;left:0;right:0;height:30px;background:rgba(255,61,90,.07);border-bottom:1px solid rgba(255,61,90,.12);overflow:hidden;display:flex;align-items:center;z-index:99}
.tick-track{display:inline-flex;animation:tk 45s linear infinite;white-space:nowrap}
.tick-item{font-size:11px;color:var(--tx2);padding:0 20px;display:inline-flex;align-items:center;gap:7px}
.tick-dot{width:5px;height:5px;border-radius:50%;background:var(--rose);animation:blink 1.2s ease infinite;flex-shrink:0}

/* Layout */
.wrap{max-width:680px;margin:0 auto;padding:86px 12px 90px}

/* Cards */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:18px;margin-bottom:12px;cursor:pointer;animation:up .35s ease both;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--rose),var(--violet));opacity:0;transition:opacity .2s}
.card:active::before{opacity:1}

/* Post elements */
.ptype{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em}
.ptype.confession{color:var(--rose)}.ptype.advice{color:#a78bfa}.ptype.hot_take{color:var(--amber)}
.ptitle{font-size:17px;font-weight:700;line-height:1.35;color:var(--tx);margin:8px 0}
.pmeta{font-size:12px;color:var(--tx3);margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pname{color:var(--tx2);font-weight:600}
.pbody{font-size:14px;line-height:1.7;color:var(--tx2);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:14px}
.pbody.full{display:block;-webkit-line-clamp:unset}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:50px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.b-hot{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.b-trnd{background:var(--rdim);color:var(--rose);border:1px solid rgba(255,61,90,.25)}
.b-sad{background:rgba(99,102,241,.14);color:#818cf8;border:1px solid rgba(99,102,241,.28)}
.b-toxic{background:rgba(239,68,68,.14);color:#f87171;border:1px solid rgba(239,68,68,.28)}
.b-dbt{background:rgba(139,92,246,.14);color:#a78bfa;border:1px solid rgba(139,92,246,.28)}

/* Tags */
.tag{display:inline-flex;padding:2px 9px;border-radius:50px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.tc{background:rgba(239,68,68,.12);color:#f87171}
.tb{background:var(--rdim);color:var(--rose)}
.td{background:rgba(139,92,246,.14);color:#a78bfa}
.tm{background:rgba(16,185,129,.12);color:#10b981}
.ts{background:rgba(245,158,11,.12);color:#f59e0b}

/* Reactions */
.rx-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rxb{display:flex;align-items:center;gap:4px;padding:6px 11px;border-radius:50px;background:var(--s2);border:1px solid var(--bd);cursor:pointer;font-size:13px;font-weight:600;color:var(--tx2);font-family:var(--font);-webkit-tap-highlight-color:transparent}
.rxb.on{background:var(--rdim);border-color:rgba(255,61,90,.4);color:var(--rose)}
.eng-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 13px;background:var(--s2);border-radius:10px;margin-top:10px;font-size:13px;color:var(--tx2);font-weight:500;flex-wrap:wrap;gap:10px}

/* WIW */
.wiw{background:linear-gradient(135deg,rgba(255,61,90,.06),rgba(139,92,246,.06));border:1px solid rgba(255,61,90,.18);border-radius:14px;padding:16px;margin:14px 0}
.wiw-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);margin-bottom:12px}
.wiw-opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.wb{flex:1;min-width:80px;padding:12px 8px;border-radius:12px;border:2px solid var(--bd2);background:var(--s2);cursor:pointer;text-align:center;font-family:var(--font);font-weight:700;font-size:12px;color:var(--tx2);-webkit-tap-highlight-color:transparent}
.wb.he{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.12);color:#f87171}
.wb.she{border-color:rgba(139,92,246,.5);background:rgba(139,92,246,.12);color:#a78bfa}
.wb.both{border-color:rgba(156,163,175,.5);background:rgba(156,163,175,.1);color:#d1d5db}
.wi{font-size:18px;display:block;margin-bottom:4px}
.wbar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.wbar-lbl{width:64px;font-size:11px;font-weight:600;color:var(--tx2);flex-shrink:0}
.wbar-track{flex:1;height:7px;border-radius:4px;background:var(--s3);overflow:hidden}
.wbar-fill{height:100%;border-radius:4px;transition:width .7s}
.wbar-fill.he{background:linear-gradient(90deg,#ef4444,#dc2626)}
.wbar-fill.she{background:linear-gradient(90deg,#8b5cf6,#6d28d9)}
.wbar-fill.both{background:#9ca3af}
.wpct{font-size:11px;font-weight:700;min-width:30px;text-align:right}
.wtot{text-align:center;font-size:12px;color:var(--tx3);margin-top:8px}
.wverd{text-align:center;padding:9px;border-radius:9px;font-size:13px;font-weight:700;margin-top:8px}
.wverd.he{background:rgba(239,68,68,.1);color:#f87171}
.wverd.she{background:rgba(139,92,246,.1);color:#a78bfa}
.wverd.both{background:rgba(156,163,175,.1);color:#d1d5db}

/* Paywall */
.blw{position:relative;max-height:75px;overflow:hidden}
.blw::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,var(--s1))}
.pw{padding:20px 16px;text-align:center;border-top:1px solid rgba(255,61,90,.14);margin:0 -18px -18px;border-radius:0 0 18px 18px;background:linear-gradient(to bottom,transparent,rgba(15,15,24,.97) 18%)}
.pw-h{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:6px}
.pw-s{font-size:13px;color:var(--tx2);margin-bottom:14px;line-height:1.55}

/* Comments */
.cmt-sort{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cmt-sort::-webkit-scrollbar{display:none}
.csb{padding:6px 13px;border-radius:50px;font-size:12px;font-weight:600;border:1px solid var(--bd);background:var(--s2);color:var(--tx2);cursor:pointer;white-space:nowrap;font-family:var(--font);-webkit-tap-highlight-color:transparent}
.csb.on{background:var(--rdim);border-color:rgba(255,61,90,.4);color:var(--rose)}
.crow{display:flex;gap:10px;margin-bottom:18px;align-items:flex-start}
.ava{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--rose),var(--violet));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.ava.sm{width:28px;height:28px;font-size:10px}
.cc{padding:13px 15px;background:var(--s2);border:1px solid var(--bd);border-radius:12px;margin-bottom:8px;animation:up .3s ease}
.cc.top{border-color:rgba(245,158,11,.3)}
.cc.hot{border-color:rgba(239,68,68,.22)}
.ccfoot{display:flex;align-items:center;gap:10px;margin-top:8px}
.ccrxb{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:50px;background:var(--s3);border:1px solid var(--bd);cursor:pointer;font-size:12px;font-weight:600;color:var(--tx3);font-family:var(--font);-webkit-tap-highlight-color:transparent}
.ccrxb.on{color:var(--rose);border-color:rgba(255,61,90,.3)}

/* Modal */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;padding:14px;animation:in .2s ease}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:20px;padding:26px;width:100%;max-width:400px;position:relative;animation:pop .25s ease;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mclose{position:absolute;top:12px;right:12px;background:var(--s2);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;color:var(--tx2);font-size:14px;display:flex;align-items:center;justify-content:center;font-family:var(--font)}
.flbl{font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:5px;display:block}
.mtabs{display:flex;gap:3px;background:var(--s2);border-radius:10px;padding:3px;margin-bottom:18px}
.mtab{flex:1;padding:8px;border-radius:8px;border:none;background:transparent;color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}
.mtab.on{background:var(--rdim);color:var(--rose)}

/* Toggle */
.tgl{width:42px;height:23px;border-radius:12px;background:var(--s3);border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.tgl::after{content:'';position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:transform .2s}
.tgl.on{background:var(--rose)}
.tgl.on::after{transform:translateX(19px)}

/* Onboarding */
.ob-step{width:7px;height:7px;border-radius:50%;background:var(--s3);transition:all .3s}
.ob-step.on{background:var(--rose);width:22px;border-radius:4px}

/* Search */
.search-wrap{position:relative;margin-bottom:14px}
.search-inp{width:100%;padding:11px 40px 11px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:50px;color:var(--tx);font-family:var(--font);font-size:14px;outline:none;-webkit-appearance:none}
.search-inp:focus{border-color:var(--rose)}
.search-inp::placeholder{color:var(--tx3)}
.search-ico{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none}
.search-results{background:var(--s1);border:1px solid var(--bd2);border-radius:12px;margin-top:6px;overflow:hidden}
.sr{padding:12px 14px;border-bottom:1px solid var(--bd);cursor:pointer;-webkit-tap-highlight-color:transparent}
.sr:last-child{border-bottom:none}
.sr:active{background:var(--s2)}

/* Pills */
.pills{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px;padding-bottom:2px}
.pills::-webkit-scrollbar{display:none}
.pill{padding:7px 15px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--tx2);white-space:nowrap;font-family:var(--font);-webkit-tap-highlight-color:transparent}
.pill.on{background:var(--rdim);border-color:rgba(255,61,90,.4);color:var(--rose)}

/* Hero */
.hero{text-align:center;padding:28px 0 22px}
.htitle{font-size:clamp(32px,10vw,52px);font-weight:800;color:var(--tx);margin-bottom:10px;line-height:1.1}
.htitle span{color:var(--rose)}
.hsub{font-size:14px;color:var(--tx2);max-width:320px;margin:0 auto 22px;line-height:1.65}

/* Stats */
.statg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.statb{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center}
.statn{font-size:26px;font-weight:800;color:var(--tx)}
.statl{font-size:12px;color:var(--tx3);margin-top:3px}

/* Trending ranks */
.trn{font-size:32px;font-weight:800;line-height:1;min-width:40px;color:var(--s3)}
.trn.g{color:#d97706}.trn.s{color:#6b7280}.trn.b{color:#92400e}

/* Misc */
.sh{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sttl{font-size:19px;font-weight:800;color:var(--tx)}
.sbadge{padding:3px 10px;border-radius:50px;background:var(--rdim);color:var(--rose);font-size:12px;font-weight:700}
.cpbar{background:linear-gradient(135deg,rgba(255,61,90,.07),rgba(139,92,246,.05));border:1px solid rgba(255,61,90,.15);border-radius:14px;padding:13px 16px;margin-bottom:16px;cursor:pointer;display:flex;align-items:center;gap:10px;-webkit-tap-highlight-color:transparent}
.bkbtn{display:inline-flex;align-items:center;gap:6px;color:var(--tx2);font-size:14px;font-weight:600;cursor:pointer;background:none;border:none;padding:6px 0;margin-bottom:14px;font-family:var(--font)}
.div{height:1px;background:var(--bd);margin:18px 0}
.spin{width:22px;height:22px;border:2px solid rgba(255,61,90,.25);border-top-color:var(--rose);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;display:inline-block}
.empty{text-align:center;padding:50px 16px;color:var(--tx3)}
.err{color:var(--rose);font-size:13px;margin-top:5px}
.mswitch{text-align:center;font-size:14px;color:var(--tx2);margin-top:14px}
.mswitch button{background:none;border:none;color:var(--rose);font-weight:700;font-size:14px;font-family:var(--font);cursor:pointer}
.upcard{background:rgba(16,185,129,.04);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:11px 14px;margin-bottom:7px}
.uplbl{font-size:10px;color:#10b981;font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
.repopt{display:flex;align-items:center;gap:8px;padding:10px 13px;border-radius:10px;border:1px solid var(--bd);background:var(--s2);cursor:pointer;font-size:13px;color:var(--tx2);margin-bottom:7px;-webkit-tap-highlight-color:transparent}
.repopt.sel{background:var(--rdim);border-color:rgba(255,61,90,.45);color:var(--rose)}
.cnote{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:#f59e0b;line-height:1.6}
.cnote code{background:rgba(245,158,11,.15);padding:1px 4px;border-radius:4px;font-family:monospace;font-size:12px}
.rate-warn{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:#f87171;display:flex;align-items:center;gap:8px}
.toasts{position:fixed;bottom:20px;right:14px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:11px 15px;border-radius:12px;background:var(--s2);border:1px solid var(--bd2);font-size:14px;color:var(--tx);box-shadow:0 8px 32px rgba(0,0,0,.5);animation:up .3s ease;display:flex;align-items:center;gap:8px;max-width:280px}
.toast.suc{border-color:rgba(16,185,129,.4)}.toast.er{border-color:rgba(255,61,90,.4)}
.nbtn{background:var(--s2);border:1px solid var(--bd);border-radius:50%;width:34px;height:34px;cursor:pointer;color:var(--tx2);font-size:14px;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.nbadge{position:absolute;top:-4px;right:-4px;background:var(--rose);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.npanel{position:absolute;top:calc(100% + 8px);right:0;width:270px;background:var(--s1);border:1px solid var(--bd2);border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,.6);z-index:200;max-height:340px;overflow-y:auto}
.nitem{padding:12px 14px;border-bottom:1px solid var(--bd);cursor:pointer}
.nitem:last-child{border-bottom:none}
.nitem.unread{background:rgba(255,61,90,.05)}
.ndot{width:6px;height:6px;border-radius:50%;background:var(--rose);flex-shrink:0;margin-top:4px}
.streakc{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:50px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);color:#f59e0b;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.adm{background:var(--s2);border:1px solid var(--bd);border-radius:11px;padding:14px;margin-bottom:9px;display:flex;justify-content:space-between;gap:12px}
.tgl-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd)}
.tgl-row:last-child{border-bottom:none}
.share-prev{background:var(--s2);border:1px solid rgba(255,61,90,.2);border-radius:12px;padding:16px;margin-bottom:16px;position:relative;overflow:hidden}
.share-prev::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--rose),var(--violet))}
.push-bar{background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(255,61,90,.07));border:1px solid rgba(139,92,246,.25);border-radius:12px;padding:13px 15px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}

@media(max-width:480px){
  .nav{padding:0 8px}
  .wrap{padding:86px 10px 90px}
  .modal{padding:20px 14px;border-radius:18px}
  .wiw-opts{flex-direction:column}
}
</style>
</head>
<body>
<!-- Visible loading state before JS runs -->
<div id="root" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px;background:#07070d">
  <div style="font-size:32px;animation:hb 2s ease infinite">💔</div>
  <div style="width:28px;height:28px;border:2px solid rgba(255,61,90,.25);border-top-color:#ff3d5a;border-radius:50%;animation:spin .7s linear infinite"></div>
  <p style="color:#5a566f;font-size:13px;font-family:sans-serif">HeartConfia</p>
</div>

<!-- Load scripts WITHOUT defer/async so they execute in order -->
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* Check deps loaded */

/* ════════════ UTILS ════════════ */
function ago(iso) {
  var s = (Date.now() - new Date(iso).getTime()) / 1000;
  if (s < 60)    return 'just now';
  if (s < 3600)  return Math.floor(s/60)  + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
function name() {
  var p=['Heart','Confess','Soul','Echo','Ache','Muse','Pulse','Veil','Rift','Dusk'];
  return p[Math.floor(Math.random()*p.length)] + '_' + Math.floor(1000+Math.random()*9000);
}
function score(p) {
  var rx=Object.values(p.reaction_counts||{}).reduce(function(a,v){return a+v;},0);
  var eng=rx+(p.comment_count||0)*3+((p.vote_a||0)+(p.vote_b||0))*1.5;
  var age=(Date.now()-new Date(p.created_at).getTime())/3600000;
  return eng/Math.pow(age+2,1.8);
}
function cscore(p) {
  var t=(p.vote_a||0)+(p.vote_b||0);
  if(t<3) return 0;
  return Math.pow(t,1.5)/(Math.abs((p.vote_a||0)-(p.vote_b||0))+1);
}
function hotLeft(c) {
  var r=new Date(c).getTime()+172800000-Date.now();
  if(r<=0) return null;
  return Math.floor(r/3600000)+'h '+Math.floor((r%3600000)/60000)+'m';
}
function getStreak() {
  try { return JSON.parse(localStorage.getItem('hc_sk')||'{"c":0,"l":""}'); }
  catch(e) { return {c:0,l:''}; }
}
function bumpStreak() {
  var t=new Date().toDateString();
  var d=getStreak();
  if(d.l===t) return d;
  var nd={c:d.l===new Date(Date.now()-86400000).toDateString()?d.c+1:1,l:t};
  localStorage.setItem('hc_sk',JSON.stringify(nd));
  return nd;
}
function karma(posts) {
  return posts.reduce(function(k,p){
    return k+Object.values(p.reaction_counts||{}).reduce(function(a,v){return a+v;},0)+(p.comment_count||0)+10;
  },0);
}
function badges(k,posts,streak) {
  var b=[];
  if(posts.length>=1)  b.push({i:'🌱',l:'First Confession'});
  if(k>=50)            b.push({i:'⭐',l:'Rising Star'});
  if(k>=250)           b.push({i:'🔥',l:'On Fire'});
  if(k>=1000)          b.push({i:'👑',l:'Legend'});
  if(streak>=3)        b.push({i:'📅',l:'Dedicated'});
  if(streak>=7)        b.push({i:'🏆',l:'Week Warrior'});
  return b;
}
function emoBadges(p) {
  var b=[];
  var rx=Object.values(p.reaction_counts||{}).reduce(function(a,v){return a+v;},0);
  var ageH=(Date.now()-new Date(p.created_at).getTime())/3600000;
  var s=score(p);
  if(s>200&&ageH<24) b.push({cls:'b-hot',i:'🔥',l:'Trending Now'});
  else if(s>80)      b.push({cls:'b-trnd',i:'🔥',l:'Trending'});
  if((p.reaction_counts&&p.reaction_counts['😢']||0)>200)  b.push({cls:'b-sad',i:'💔',l:'Saddest'});
  if((p.reaction_counts&&p.reaction_counts['😡']||0)>300)  b.push({cls:'b-toxic',i:'😳',l:'Toxic'});
  if((p.reaction_counts&&p.reaction_counts['😂']||0)>150)  b.push({cls:'b-dbt',i:'😂',l:'Wildest'});
  return b.slice(0,2);
}

            :h('div',{style:{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}},h('button',{className:'btn bp',onClick:function(){setAuth('signup');}},h('span',null,'💔'),' Join anonymously'),h('button',{className:'btn bs',onClick:function(){setAuth('login');}},'Log in'))),
        page!=='home'&&h('div',{className:'sh'},h('div',{className:'sttl'},page==='confessions'?'Confessions':'Seeking Advice'),h('span',{className:'sbadge'},feed.length)),
        h(Search,{posts:posts,onOpen:openPost}),
        h('div',{className:'pills'},[{id:'all',l:'All'}].concat(TAGS.map(function(t){return {id:t,l:t};})).map(function(t){return h('button',{key:t.id,className:'pill '+(tagFilter===t.id?'on':''),onClick:function(){setTagFilter(t.id);}},t.l);})),
        user&&h('div',{className:'cpbar',onClick:function(){setPage('create');}},h('div',{className:'ava'},user.anonymous_name.charAt(0)),h('span',{style:{fontSize:13,color:'var(--tx3)'}},"Something's weighing on you. Share it as ",h('strong',{style:{color:'var(--tx2)'}},'@'+user.anonymous_name),'…')),
        loading?h('div',{style:{display:'flex',justifyContent:'center',padding:'50px 0'}},h('span',{className:'spin',style:{width:30,height:30}}))
          :feed.length===0?h('div',{className:'empty'},h('div',{style:{fontSize:40,marginBottom:10}},'🕊️'),h('div',null,'Nothing here yet'))
          :feed.map(function(post,i){return h(PostCard,{key:post.id,post:post,user:user,onClick:function(){openPost(post);},onNeedAuth:needAuth,delay:Math.min(i*.06,.4)});})),

      page==='trending'&&h(Trending,{posts:posts,user:user,onOpen:openPost,onNeedAuth:needAuth}),
      page==='create'&&(user?h(CreatePost,{user:user,onBack:function(){setPage('home');},onPost:newPost,addToast:addToast})

      page==='profile'&&h(Profile,{user:user,posts:posts,onBack:function(){setPage('home');},addToast:addToast,onNeedAuth:needAuth}),
      page==='admin'&&isAdmin&&h(Admin,{user:user,addToast:addToast})),

    auth&&h(AuthModal,{initMode:auth,onClose:function(){setAuth(null);},onAuth:handleAuth}),
    h(Toasts,{items:toasts}));
}
